<style>

.sol{margin-top:14px;padding:16px;border-radius:10px;animation:fadeUp .25s;border:1px solid rgba(168,85,247,0.1);background:rgba(168,85,247,0.02)}.sol-tag{font:700 9px var(--m);letter-spacing:.12em;color:var(--acc);margin-bottom:8px;text-transform:uppercase}
.stp{font:400 12px/2 var(--m);color:var(--pl)}.stp .lb{color:rgba(180,165,250,0.4);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}.stp .ans{color:var(--grn);font-weight:700;font-size:13px}

.opt{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:11px 14px;cursor:pointer;color:#b0bec5;font:400 13px/1.5 var(--f);transition:all .2s;outline:none;width:100%;text-align:left;margin-bottom:6px}.opt:not(.done):hover{background:rgba(168,85,247,0.06);border-color:rgba(168,85,247,0.25)}.opt.done{cursor:default}.opt.c-ok{background:rgba(45,212,160,0.08);border-color:rgba(45,212,160,0.3);color:var(--grn)}.opt.c-no{background:rgba(240,107,107,0.08);border-color:rgba(240,107,107,0.3);color:var(--red)}
.opt-ltr{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font:700 11px var(--m);flex-shrink:0;background:rgba(255,255,255,0.04);color:var(--dim)}.opt.c-ok .opt-ltr{background:rgba(45,212,160,0.15);color:var(--grn)}.opt.c-no .opt-ltr{background:rgba(240,107,107,0.15);color:var(--red)}
.opts{display:flex;flex-direction:column;margin-top:14px}
textarea.v-ta{width:100%;padding:12px;background:rgba(255,255,255,0.035);border:1.5px solid rgba(255,255,255,0.09);border-radius:10px;color:var(--txt);font:400 14px var(--f);outline:none;resize:vertical;min-height:70px;line-height:1.6}
.cs-sec{font:700 11px var(--m);letter-spacing:.1em;color:var(--acc);text-transform:uppercase;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(168,85,247,0.15)}
.cs-card{border-radius:10px;padding:16px;margin-bottom:10px;background:var(--card);border:1px solid var(--bdr);animation:fadeUp .3s}
.cs-title{font:700 13px var(--f);color:var(--txt);margin-bottom:6px}
.cs-fm{background:rgba(168,85,247,0.05);border:1px solid rgba(168,85,247,0.1);border-radius:8px;padding:10px 14px;font:500 12.5px/1.8 var(--m);color:var(--acc);margin-bottom:8px}
.cs-vr{font:400 11.5px/1.8 var(--m);color:var(--mut);margin-bottom:6px}.cs-vr b{color:var(--cyn);font-weight:600}
.cs-ex{background:rgba(45,212,160,0.03);border:1px solid rgba(45,212,160,0.1);border-radius:8px;padding:10px 12px;font:400 12px/1.9 var(--m);color:var(--grn)}.cs-ex .lb{color:rgba(45,212,160,0.4);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.lesson-wrap{max-width:700px;margin:0 auto}
.lesson-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:28px;animation:fadeUp .3s;margin-bottom:16px}
.lesson-type{font:700 9px var(--m);letter-spacing:.15em;color:var(--acc);text-transform:uppercase;margin-bottom:14px}
.lesson-body{font:400 15px/1.9 var(--s);color:var(--mut);margin-bottom:14px}.lesson-body b{color:#fff;font-weight:600}.lesson-body em{color:var(--cyn);font-style:italic;font-weight:500}
.lesson-eq{background:rgba(32,211,232,0.04);border:1px solid rgba(32,211,232,0.1);border-radius:8px;padding:14px 18px;margin:12px 0;font:500 14px/1.9 var(--m);color:var(--cyn);text-align:center}
@media(max-width:600px){.hdr{padding:14px 12px 10px}.modes{padding:8px 12px}.toolbar{padding:6px 12px}.cnt{padding:12px 12px 70px}.pc{padding:18px 14px}.aa{flex-direction:column}.lesson-card{padding:20px 16px}.ir{flex-direction:column}}
.dtbl{width:100%;border-collapse:collapse;margin:14px 0;font:400 13px var(--m);color:var(--pl)}
.dtbl th{padding:9px 12px;text-align:center;font:700 11px/1.3 var(--m);letter-spacing:.05em;color:var(--acc);border-bottom:2px solid rgba(168,85,247,0.25);border-top:1px solid rgba(168,85,247,0.1);background:rgba(168,85,247,0.04)}
.dtbl th .unit{display:block;font:500 9px var(--m);color:var(--dim);letter-spacing:.04em;margin-top:2px;text-transform:none}
.dtbl td{padding:9px 12px;text-align:center;border-bottom:1px solid var(--bdr);font:500 13px var(--m)}
.dtbl tbody tr:nth-child(odd){background:rgba(255,255,255,0.012)}
.dtbl tr:last-child td{border-bottom:none}
</style>

<body>
<div class="hdr"><div class="hdr-in">
<div><div class="hdr-lab">Semester 2 · Exam Review</div><h1 class="hdr-t"><i>Final Exam</i> — Complete Study Tool</h1></div>
<div class="hdr-r"><div class="stats">
<div class="stat-box"><div class="stat-n" id="sC">0</div><div class="stat-l">Correct</div></div>
<div class="stat-box"><div class="stat-n" id="sA">0</div><div class="stat-l">Attempted</div></div>
<div class="stat-box"><div class="stat-n pct-n" id="sP">—</div><div class="stat-l">Accuracy</div></div>
<div class="stat-box"><div class="stat-n streak-n" id="sS"><span id="fire">🔥</span> 0</div><div class="stat-l">Streak</div></div>
</div><button class="btn-r" onclick="resetStats()">Reset</button></div>
</div></div>
<div id="modeBar" class="modes"></div>
<div id="ctrlBar" class="toolbar"></div>
<div class="cnt" id="main"></div>
<script>
function R(a,b,d){d=d||0;const f=Math.pow(10,d);return Math.round((Math.random()*(b-a)+a)*f)/f}
function rd(v,d){return Math.round(v*Math.pow(10,d))/Math.pow(10,d)}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

// ========== RATE LAW HELPERS (ported from Ch.16) ==========
const RXN_TEMPLATES=[
  {eq:"2NO(g) + Cl₂(g) → 2NOCl(g)",A:"NO",B:"Cl₂"},
  {eq:"2NO(g) + 2H₂(g) → N₂(g) + 2H₂O(l)",A:"NO",B:"H₂"},
  {eq:"2NO(g) + Br₂(g) → 2NOBr(g)",A:"NO",B:"Br₂"},
  {eq:"H₂(g) + I₂(g) → 2HI(g)",A:"H₂",B:"I₂"},
  {eq:"CHCl₃(g) + Cl₂(g) → CCl₄(g) + HCl(g)",A:"CHCl₃",B:"Cl₂"},
  {eq:"2NO₂(g) + F₂(g) → 2NO₂F(g)",A:"NO₂",B:"F₂"},
  {eq:"CO(g) + NO₂(g) → CO₂(g) + NO(g)",A:"CO",B:"NO₂"}
];
const CONC_FACTORS=[2,3];
const ORDERS=[0,1,2];
const BASE_CONCS=[0.10,0.15,0.20,0.25,0.30,0.40,0.50];
function fmtRate(r){
  if(r===0)return"0";
  if(r<0.001){const e=Math.floor(Math.log10(r));return`${Math.round(r/Math.pow(10,e)*1000)/1000} × 10<sup>${e}</sup>`}
  if(r>=10)return r.toFixed(1);if(r>=1)return r.toFixed(2);
  if(r>=0.1)return r.toFixed(3);if(r>=0.01)return r.toFixed(4);
  return r.toFixed(5);
}
function buildCanonical(A,B,m,n){let s="k";if(m>0){s+=`[${A}]`;if(m>1)s+=m;}if(n>0){s+=`[${B}]`;if(n>1)s+=n;}return s}
function buildDisplay(A,B,m,n){let s="k";if(m>0){s+=`[${A}]`;if(m>1)s+=`<sup>${m}</sup>`;}if(n>0){s+=`[${B}]`;if(n>1)s+=`<sup>${n}</sup>`;}return s}
function genRateLawProblem(){
  const rxn=pick(RXN_TEMPLATES),m=pick(ORDERS),n=pick(ORDERS);
  const fA=pick(CONC_FACTORS),fB=pick(CONC_FACTORS);
  const cA1=pick(BASE_CONCS),cB1=pick(BASE_CONCS);
  const cA2=Math.round(cA1*fA*100)/100,cB3=Math.round(cB1*fB*100)/100;
  const niceRates=[0.0050,0.0080,0.0100,0.0120,0.0150,0.0200,0.0250,0.0300,0.0500,0.100,0.150,0.200];
  const rate1=pick(niceRates);
  const mA=Math.pow(fA,m),mB=Math.pow(fB,n);
  const rate2=rate1*mA,rate3=rate1*mB;
  const fStr=f=>f===2?"doubles":f===3?"triples":"changes";
  const oN=o=>o===0?"zero":o===1?"first":"second";
  const steps=[];
  steps.push(`<span class='lb'>COMPARE T1 & T2</span> [${rxn.A}] ${fStr(fA)} (×${fA}), [${rxn.B}] stays the same`);
  steps.push(m===0?`Rate ratio = 1 (no change) → ${fA}^m = 1 → <b>m = 0</b> (zero order in ${rxn.A})`:
    `Rate ratio = ${fmtRate(rate2)} ÷ ${fmtRate(rate1)} = ${mA} → ${fA}^m = ${mA} → <b>m = ${m}</b> (${oN(m)} order in ${rxn.A})`);
  steps.push(`<span class='lb'>COMPARE T1 & T3</span> [${rxn.B}] ${fStr(fB)} (×${fB}), [${rxn.A}] stays the same`);
  steps.push(n===0?`Rate ratio = 1 (no change) → ${fB}^n = 1 → <b>n = 0</b> (zero order in ${rxn.B})`:
    `Rate ratio = ${fmtRate(rate3)} ÷ ${fmtRate(rate1)} = ${mB} → ${fB}^n = ${mB} → <b>n = ${n}</b> (${oN(n)} order in ${rxn.B})`);
  steps.push(`<span class='lb'>RATE LAW</span> <span class='ans'>rate = ${buildDisplay(rxn.A,rxn.B,m,n)}</span>`);
  return{rxn,m,n,canonical:buildCanonical(rxn.A,rxn.B,m,n),
    trials:[{a:cA1,b:cB1,rate:fmtRate(rate1)},{a:cA2,b:cB1,rate:fmtRate(rate2)},{a:cA1,b:cB3,rate:fmtRate(rate3)}],
    steps,note:`[${rxn.A}] ×${fA} → rate ×${mA} (${fA}^${m}=${mA}), so m=${m}. [${rxn.B}] ×${fB} → rate ×${mB} (${fB}^${n}=${mB}), so n=${n}.`};
}

// ========== I. KEY TERMS (26 from review sheet) ==========
const VOCAB=[
{t:"anode",d:"the electrode where oxidation occurs (AN OX)"},
{t:"Avogadro's number",d:"the number of particles in one mole: 6.022 × 10²³"},
{t:"catalyst",d:"a substance that changes a reaction's rate without being consumed; lowers activation energy"},
{t:"cathode",d:"the electrode where reduction occurs (RED CAT)"},
{t:"diffusion",d:"the process by which fluid matter spreads from a region of higher concentration to a region of lower concentration"},
{t:"empirical formula",d:"a formula that gives the simplest whole-number ratio of atoms in a compound"},
{t:"endothermic",d:"a reaction that absorbs energy from its surroundings; ΔH is positive (+)"},
{t:"enthalpy",d:"the thermal energy content of a system at constant pressure; symbol H"},
{t:"entropy",d:"a measure of the dispersal of energy in a system; symbol S; positive ΔS = more favorable"},
{t:"exothermic",d:"a reaction that releases energy to its surroundings; ΔH is negative (−)"},
{t:"kinetics",d:"the study of the rates of chemical reactions and the steps by which they occur"},
{t:"molality",d:"moles of solute per kilogram of solvent (mol/kg); symbol b; not affected by temperature"},
{t:"molar mass",d:"the mass of one mole of any pure substance, measured in g/mol; calculated from the formula using atomic masses"},
{t:"molarity",d:"moles of solute per liter of solution (mol/L); symbol c; also called amount concentration"},
{t:"molecular formula",d:"a formula that indicates the actual types and numbers of atoms in a molecule"},
{t:"oxidation",d:"the process by which an atom loses electrons; its oxidation number becomes more positive (OIL)"},
{t:"percent yield",d:"the percentage of the theoretical yield that is actually produced; (actual / theoretical) × 100%"},
{t:"rate law",d:"a mathematical expression relating the concentration of reactants to the rate of a reaction; rate = k[A]ᵐ[B]ⁿ"},
{t:"reduction",d:"the process by which an atom gains electrons; its oxidation number becomes more negative (RIG)"},
{t:"reversible reaction",d:"a reaction that can occur in both the forward and reverse directions; shown with ⇌"},
{t:"saturated solution",d:"a solution containing the maximum amount of solute it can hold at current conditions"},
{t:"specific heat",d:"the amount of thermal energy required to raise the temperature of 1 g of a substance by 1 °C; symbol csp"},
{t:"stoichiometry",d:"the mathematical relationship between the quantities of substances in a chemical reaction; uses mole ratios from balanced equations"},
{t:"supersaturated solution",d:"a solution containing more than the maximum amount of solute it can normally hold at current conditions"},
{t:"thermochemistry",d:"the branch of science that studies the transfer of energy during phase or chemical changes"},
{t:"theoretical yield",d:"the maximum amount of product that could be produced from a given amount of reactant"}
];

// ========== IV. SYMBOLS ==========
const SYMBOLS=[
{sym:"→",meaning:"yields; indicates products are formed from reactants (irreversible)"},
{sym:"(g)",meaning:"gas phase"},
{sym:"(s)",meaning:"solid phase"},
{sym:"|",meaning:"a single bond or separator in notation"},
{sym:"Δ",meaning:"heat is applied; or 'change in' (e.g., ΔT = change in temperature)"},
{sym:"(aq)",meaning:"aqueous; dissolved in water"},
{sym:"⇌",meaning:"reversible reaction; both forward and reverse reactions occur"},
{sym:"(l)",meaning:"liquid phase"},
{sym:"ΔH",meaning:"change in enthalpy (heat content); negative = exothermic, positive = endothermic"},
{sym:"ΔS",meaning:"change in entropy (energy dispersal); positive = more disorder, favorable"},

stoich(){const r=pick(RXNS),mG=R(10,200,1),nG=rd(mG/r.gM,4),nP=rd(nG*(r.pc/r.gc),4),mP=rd(nP*r.pM,1);return{ref:"Review III-M",q:`Given: <b>${r.eq}</b><br><br>What mass of <b>${r.pN}</b> is produced from <b>${mG} g ${r.gN}</b>?`,gv:`m(${r.gN}) = ${mG} g\nM(${r.gN}) = ${r.gM}\nM(${r.pN}) = ${r.pM}`,fm:`g → mol → mol → g\n(stoichiometry roadmap)`,fi:`m(${r.pN}) = ? g`,u:"g",a:mP,tol:Math.max(mP*0.025,0.3),st:[`<span class='lb'>STEP 1 — g→mol</span> n(${r.gN}) = ${mG}/${r.gM} = ${rd(nG,4)} mol`,`<span class='lb'>STEP 2 — MOLE RATIO</span> ${rd(nG,4)} × (${r.pc}/${r.gc}) = ${rd(nP,4)} mol ${r.pN}`,`<span class='lb'>STEP 3 — mol→g</span> ${rd(nP,4)} × ${r.pM} = <span class='ans'>${mP} g</span>`],nt:`The stoichiometry roadmap: grams A → moles A → moles B → grams B. Always go through moles!`}},

rate_multiplier(){

function switchMode(m){mode=m;renderModes();renderCtrls();if(m==="problems")genP();else if(m==="vocab")genV();else if(m==="learn")renderLearn();else renderCS()}
function renderCtrls(){const el=document.getElementById("ctrlBar");if(mode==="problems"){let h=SEC.map(s=>`<button class="cb${active===s.id?" on":""}" onclick="active='${s.id}';subType=null;genP()">${s.icon} ${s.title}</button>`).join("");h+=`<span style="width:6px;display:inline-block"></span><span class="cl">Hide:</span><button class="tg" id="tg-given" onclick="tglH('given')"><span class="tg-dot"></span>Givens</button><button class="tg" id="tg-formula" onclick="tglH('formula')"><span class="tg-dot"></span>Formulas</button><button class="tg" id="tg-find" onclick="tglH('find')"><span class="tg-dot"></span>Solve-For</button><button class="tg" id="tg-all" onclick="tglAll()"><span class="tg-dot"></span>Exam</button>`;el.innerHTML=h;syncToggles()}else if(mode==="vocab")el.innerHTML=`<span class="cl">Format:</span><button class="cb${vMode==="mc"?" on":""}" onclick="vMode='mc';genV()">MC</button><button class="cb${vMode==="written"?" on":""}" onclick="vMode='written';genV()">Written</button><button class="cb${vMode==="tf"?" on":""}" onclick="vMode='tf';genV()">T/F</button>`;else if(mode==="learn")el.innerHTML=`<span class="cl">Brief chapter skims — key concepts from Ch.11 through Ch.19</span>`;else el.innerHTML=`<span class="cl">All formulas, vocab, and symbols from the semester 2 review</span>`}

// ========== PROBLEMS ==========
function genP(){const sec=SEC.find(s=>s.id===active),tid=subType||pick(sec.types).id;prob=G[tid]();answered=false;solShown=false;userVal="";renderCtrls();renderProb()}
function chkP(){if(answered)return;if(prob.isMC)return;const inp=document.getElementById("inp");if(!inp)return;const raw=inp.value.trim();if(!raw)return;userVal=raw;answered=true;nA++;let ok=false;if(prob.isText){const norm=s=>s.toLowerCase().replace(/\s+/g,'').replace(/[²³⁻⁺₂₃₄]/g,c=>({'²':'2','³':'3','⁻':'-','⁺':'+','₂':'2','₃':'3','₄':'4'}[c]||c)).replace(/×/g,'').replace(/·/g,'');ok=norm(raw)===norm(prob.a)}else{const v=parseFloat(raw.replace(/[+,]/g,""));if(isNaN(v)){inp.classList.add("v-no");setTimeout(()=>{const e=document.getElementById("inp");if(e)e.classList.remove("v-no")},400);answered=false;nA--;return}ok=Math.abs(v-prob.a)<=prob.tol}if(ok){nC++;streak++}else streak=0;updS();renderProb()}
function chkMC(i){if(answered)return;answered=true;userVal=i;nA++;if(i===prob.ci){nC++;streak++}else streak=0;updS();renderProb()}
function showPS(){userVal=document.getElementById("inp")?document.getElementById("inp").value:"";solShown=true;if(!answered){answered=true;nA++;streak=0;updS()}renderProb()}
function renderProb(){const el=document.getElementById("main"),p=prob;if(!p){el.innerHTML="";return}let isOk=false;if(answered){if(p.isMC)isOk=userVal===p.ci;else if(p.isText){const norm=s=>s.toLowerCase().replace(/\s+/g,'').replace(/[²³⁻⁺₂₃₄]/g,c=>({'²':'2','³':'3','⁻':'-','⁺':'+','₂':'2','₃':'3','₄':'4'}[c]||c));isOk=norm(String(userVal))===norm(p.a)}else{const v=parseFloat(String(userVal).replace(/[+,]/g,""));isOk=!isNaN(v)&&Math.abs(v-p.a)<=p.tol}}const cc=answered?(isOk?"ok":"no"):"",bc=answered?(isOk?"bg-ok":"bg-no"):"bg-q",sec=SEC.find(s=>s.id===active);const hc=(hide.given?1:0)+(hide.formula?1:0)+(hide.find?1:0),dl=hc===3?"EXAM MODE":hc>=2?"HARD+":hc===1?"HARD":"";let h=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px"><button class="cb${!subType?" on":""}" onclick="subType=null;genP()">Random</button>`;sec.types.forEach(t=>{h+=`<button class="cb${subType===t.id?" on":""}" onclick="subType='${t.id}';genP()">${t.name}</button>`});h+=`</div>`;h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${bc}">${answered?(isOk?"✓ Correct":"✗ Incorrect"):"Problem"}</span><span class="bg bg-ty">${p.ref}</span>${dl?`<span class="bg bg-hard">${dl}</span>`:""}</div><div class="q-txt">${p.q}</div>`;if(p.isMC){h+=`<div class="opts">`;p.opts.forEach((o,i)=>{let cls="opt";if(answered){cls+=" done";if(i===p.ci)cls+=" c-ok";else if(i===userVal)cls+=" c-no"}h+=`<button class="${cls}" onclick="chkMC(${i})"><span class="opt-ltr">${answered&&i===p.ci?"✓":answered&&i===userVal?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`});h+=`</div>`}else{const gH=hide.given&&!answered&&!solShown,fH=hide.formula&&!answered&&!solShown,wH=hide.find&&!answered&&!solShown;if(p.gv&&(!gH||!fH||!wH)){h+=`<div class="ir">`;if(!gH)h+=`<div class="ib ib-g"><span class="ib-l">Given</span>${p.gv.replace(/\n/g,"<br>")}</div>`;if(p.fm&&!fH)h+=`<div class="ib ib-f"><span class="ib-l">Formula</span>${p.fm.replace(/\n/g,"<br>")}</div>`;if(p.fi&&!wH)h+=`<div class="ib ib-w"><span class="ib-l">Solve For</span>${p.fi.replace(/\n/g,"<br>")}</div>`;h+=`</div>`}if(!answered)h+=`<div class="aa"><div class="aw"><input class="ai" id="inp" type="text" inputmode="decimal" placeholder="Type answer…" value="${userVal}" onkeydown="if(event.key==='Enter')chkP()"><span class="au">${p.u}</span></div><button class="ab" onclick="chkP()">Check</button></div><div class="btn-row"><button class="btn-sh" onclick="showPS()">Show Solution</button></div>`;else{h+=`<div class="aa"><div class="aw"><input class="ai ${isOk?"v-ok":"v-no"}" value="${userVal}" disabled><span class="au">${p.u||""}</span></div></div><div class="fb ${isOk?"fb-ok":"fb-no"}">${isOk?`✓ Correct! Streak: ${streak} 🔥`:"✗ Not quite"}</div>`;if(!isOk)h+=`<div class="fb-v">Answer: ${p.a} ${p.u||""}</div>`}}if(answered||solShown){h+=`<div class="sol"><div class="sol-tag">Solution</div>`;p.st.forEach(s=>{h+=`<div class="stp">${s}</div>`});h+=`<div class="sol-note">${p.nt}</div></div>`}if(answered)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genP()">Next →</button></div>`;h+=`</div>`;el.innerHTML=h;if(!answered&&!p.isMC){const i=document.getElementById("inp");if(i)setTimeout(()=>i.focus(),50)}}

// ========== VOCAB ==========
function genV(){vAns=false;vUA=null;if(vMode==="mc")genVMC();else if(vMode==="tf")genVTF();else genVW();renderCtrls();renderVocab()}
function genVMC(){const c=pick(VOCAB),wr=shuffle(VOCAB.filter(v=>v.t!==c.t)).slice(0,3),askT=Math.random()<0.5,opts=shuffle([c,...wr]);vQ={type:"mc",c,opts,askT,ci:opts.indexOf(c)}}
function genVTF(){const c=pick(VOCAB),isT=Math.random()<0.5;vQ={type:"tf",t:c.t,sd:isT?c.d:pick(VOCAB.filter(v=>v.t!==c.t)).d,isT,cd:c.d}}
function genVW(){vQ={type:"written",c:pick(VOCAB),askT:Math.random()<0.5}}
function chkVM(i){if(vAns)return;vAns=true;vUA=i;nA++;if(i===vQ.ci){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVT(a){if(vAns)return;vAns=true;vUA=a;nA++;if(a===vQ.isT){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVW(){if(vAns)return;const inp=document.getElementById("vi");if(!inp||!inp.value.trim())return;vAns=true;const u=inp.value.trim().toLowerCase(),tgt=vQ.askT?vQ.c.d.toLowerCase():vQ.c.t.toLowerCase(),tw=tgt.split(/\s+/).filter(w=>w.length>3),mc=tw.filter(w=>u.includes(w)).length;vUA=tw.length>0&&(mc/tw.length>=0.4);nA++;if(vUA){nC++;streak++}else streak=0;updS();renderVocab()}
function renderVocab(){const el=document.getElementById("main"),q=vQ;if(!q){el.innerHTML="";return}let h="";if(q.type==="mc"){const ok=vAns&&vUA===q.ci,cc=vAns?(ok?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div>`;if(q.askT)h+=`<div class="q-txt">Define: <b>${q.c.t}</b></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}return`<button class="${c}" onclick="chkVM(${i})"><span class="opt-ltr">${vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i)}</span><span>${o.d}</span></button>`}).join("")}</div>`;else h+=`<div class="q-txt">Which term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}return`<button class="${c}" onclick="chkVM(${i})"><span class="opt-ltr">${vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`}).join("")}</div>`;if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`}else if(q.type==="tf"){const ok=vAns&&vUA===q.isT,cc=vAns?(ok?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div><div class="q-txt"><b>${q.t}</b> — <span style="color:var(--cyn);font-style:italic">"${q.sd}"</span></div><div class="opts" style="flex-direction:row;gap:8px;margin-top:10px">`;["True","False"].forEach(l=>{const v=l==="True";let c="opt";if(vAns){c+=" done";if(v===q.isT)c+=" c-ok";else if(v===vUA)c+=" c-no"}h+=`<button class="${c}" style="flex:1;justify-content:center" onclick="chkVT(${v})">${l}</button>`});h+=`</div>`;if(vAns&&!ok)h+=`<div class="sol" style="margin-top:12px"><div class="sol-tag">Correct</div><div class="stp">${q.cd}</div></div>`;if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`}else{const cc=vAns?(vUA?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(vUA?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div>`;h+=q.askT?`<div class="q-txt">Define: <b>${q.c.t}</b></div>`:`<div class="q-txt">Which term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div>`;if(!vAns)h+=`<div style="margin-top:12px"><textarea class="v-ta" id="vi" placeholder="${q.askT?"Type definition…":"Type the term…"}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chkVW()}"></textarea></div><div class="btn-row"><button class="ab" onclick="chkVW()">Check</button></div>`;else{h+=`<div class="fb ${vUA?"fb-ok":"fb-no"}" style="margin-top:8px">${vUA?"✓ Matched!":"✗ Review below"}</div><div class="sol" style="margin-top:10px"><div class="sol-tag">Answer</div>`;h+=q.askT?`<div class="stp">${q.c.d}</div>`:`<div class="stp" style="font-size:14px;font-weight:600">${q.c.t}</div>`;h+=`</div><div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`}h+=`</div>`}el.innerHTML=h}

// ========== LEARN MODE ==========
function renderLearn(){renderCtrls();let h=`<div class="lesson-wrap">`;h+=`<div style="text-align:center;padding:20px 0 16px"><div style="font-size:36px;margin-bottom:8px">🎓</div><div style="font:400 22px/1.3 var(--s);margin-bottom:6px">Semester 2 Quick Review</div><div style="font:400 13px var(--f);color:var(--dim)">Key concepts from every chapter — read through before the exam</div></div>`;
LEARN_TOPICS.forEach(topic=>{h+=`<div class="lesson-card"><div class="lesson-type">${topic.icon} ${topic.title}</div>`;topic.cards.forEach(card=>{h+=`<div class="lesson-body" style="margin-bottom:10px">${card}</div>`});h+=`</div>`});
h+=`<div class="cs-sec" style="margin-top:30px">🔣 Symbols You Must Know</div>`;
SYMBOLS.forEach(s=>{h+=`<div class="cs-card" style="padding:10px 14px;margin-bottom:5px;display:flex;align-items:center;gap:12px"><span style="font:700 18px var(--m);color:var(--cyn);min-width:40px;text-align:center">${s.sym}</span><span style="color:var(--mut);font-size:12px">${s.meaning}</span></div>`});
h+=`</div>`;document.getElementById("main").innerHTML=h}

// ========== CHEATSHEET ==========
function renderCS(){renderCtrls();let h=`<div class="cs-sec">📐 All Formulas from the Review</div>`;CS.forEach(c=>{h+=`<div class="cs-card"><div class="cs-title">${c.title}</div><div class="cs-fm">${c.fm.join("<br>")}</div><div class="cs-vr">${c.vr.replace(/\n/g,"<br>")}</div><div class="cs-ex"><div style="font:400 12px/1.5 var(--f);color:var(--mut);margin-bottom:4px">${c.ex.q}</div>${c.ex.st.map(s=>`<div class="stp">${s}</div>`).join("")}</div></div>`});h+=`<div class="cs-sec">📖 All 26 Key Terms</div>`;VOCAB.forEach((v,i)=>{h+=`<div class="cs-card" style="padding:10px 12px;margin-bottom:5px"><span style="font:700 10px var(--m);color:var(--acc);margin-right:6px">${String.fromCharCode(65+i)}.</span><b>${v.t}</b><span style="margin:0 6px;color:var(--dim)">—</span><span style="color:var(--mut);font-size:12px">${v.d}</span></div>`});h+=`<div class="cs-sec">🔣 All 14 Symbols</div>`;SYMBOLS.forEach(s=>{h+=`<div class="cs-card" style="padding:10px 14px;margin-bottom:5px;display:flex;align-items:center;gap:12px"><span style="font:700 18px var(--m);color:var(--cyn);min-width:40px;text-align:center">${s.sym}</span><span style="color:var(--mut);font-size:12px">${s.meaning}</span></div>`});document.getElementById("main").innerHTML=h}

renderModes();renderCtrls();genP();genV();updS();
</script>
</body>
