// VOCAB
const V=[

  {t:"reduction",d:"process by which an atom gains electrons; oxidation number becomes smaller (more negative)"},
  {t:"reducing agent",d:"substance that causes reduction of another; it is itself always oxidized in the reaction"},
  {t:"oxidizing agent",d:"substance that causes oxidation of another; it is itself always reduced in the reaction"},
  {t:"electrochemistry",d:"field of chemistry studying how electricity and redox reactions are related"},
  {t:"electrolyte",d:"substance that, when dissolved in water, allows the solution to conduct electricity by forming ions"},
  {t:"electrochemical cell",d:"device that uses a spontaneous reaction to produce electricity OR uses electricity to drive a nonspontaneous reaction"},
  {t:"electrolytic cell",d:"electrochemical cell that uses electrical energy to force a nonspontaneous redox reaction to occur"},
  {t:"voltaic cell",d:"electrochemical cell that uses a spontaneous redox reaction to produce electrical energy"},
  {t:"electrolysis",d:"using electrical current to force an otherwise nonspontaneous redox reaction to occur"},

// OXIDATION NUMBER Q's
const OX=[

  {compound:"NaCl",el:"Na",ans:+1,wr:[0,-1,+2],ex:"Alkali metals are always +1 in compounds."},

  {compound:"KClOтВГ",el:"Cl",ans:+5,wr:[-1,0,+3],ex:"K=+1, O=тИТ2 each; (+1)+Cl+3(тИТ2)=0 тЖТ Cl=+5."},
  {compound:"HтВВS",el:"S",ans:-2,wr:[0,+2,+4],ex:"H=+1 each; 2(+1)+S=0 тЖТ S=тИТ2."},

// CONCEPTUAL MC
const CM=[
  {q:"What defines a redox reaction?",o:["Produces a precipitate","Involves transfer of electrons","Reaction between acid and base","Always releases heat"],c:1,ex:"Redox reactions involve electron transfer. Oxidation numbers must change for at least one element."},

  {q:"What is the purpose of a salt bridge?",o:["Supplies electrical energy","Allows ion flow between half-cells while preventing solution mixing","Increases oxidation rate","Stores electrons"],c:1,ex:"The salt bridge maintains electrical neutrality by allowing ions to migrate between half-cells without mixing the solutions."},

  {q:"In the Zn-Cu voltaic cell, the theoretical voltage is approximately:",o:["0 V","0.76 V","1.1 V","2.0 V"],c:2,ex:"Standard cell potential: E┬░cell = 0.34 V (Cu) тИТ (тИТ0.76 V) (Zn) = 1.10 V."},
  {q:"Which battery generates electricity from a continuous supply of HтВВ and OтВВ?",o:["Lead-acid battery","Zinc-carbon dry cell","Alkaline battery","Fuel cell"],c:3,ex:"Fuel cells produce electricity from a continuous external fuel supply (HтВВ) and oxidant (OтВВ)."}
];

   p:"Strategy: assign known elements first (O=тИТ2, H=+1, alkali=+1, alk.earth=+2), solve algebraically.\n<b>Example:</b> KClOтВГ тЖТ K=+1, O=тИТ2 each\n(+1)+Cl+3(тИТ2)=0 тЖТ Cl = +5",

  {t:"Electrochemical Cells",

  document.getElementById("sA").textContent=nA;
  document.getElementById("sP").textContent=nA?Math.round(nC/nA*100)+"%":"тАФ";
  document.getElementById("sS").textContent="ЁЯФе"+str;
}
function RS(){nC=nA=str=0;upS();if(mode==="problems")gP();else if(mode==="vocab")gV();else rCS()}

const CATS=[{id:"ox_num",l:"ЁЯФв Ox. Numbers"},{id:"is_redox",l:"тЪб Redox ID"},{id:"agents",l:"ЁЯОп Agents"},{id:"cells",l:"ЁЯФЛ Cells"},{id:"concept",l:"ЁЯТб Conceptual"}];

function rModes(){
  document.getElementById("mb").innerHTML=
    [{id:"problems",l:"тЪб Problems"},{id:"vocab",l:"ЁЯУЦ Vocab"},{id:"cheatsheet",l:"ЁЯУЛ Cheatsheet"}]
    .map(m=>`<button class="mb${mode===m.id?" on":""}" onclick="SW('${m.id}')">${m.l}</button>`).join("");
}
function SW(m){mode=m;rModes();rTB();if(m==="problems")gP();else if(m==="vocab")gV();else rCS()}

function rTB(){
  const el=document.getElementById("tb");
  if(mode==="problems"){
    el.innerHTML=CATS.map(c=>`<button class="tb${cat===c.id?" on":""}" onclick="cat='${c.id}';sub=null;gP()">${c.l}</button>`).join("");
  } else if(mode==="vocab"){
    el.innerHTML=`<span style="font:700 9px var(--m);color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-right:4px">Format:</span>`+
    ["mc","written","tf"].map(f=>`<button class="tb${vmode===f?" on":""}" onclick="vmode='${f}';gV()">${f==="mc"?"Multiple Choice":f==="written"?"Written":"True/False"}</button>`).join("");
  } else el.innerHTML=`<span style="font:700 9px var(--m);color:var(--dim);letter-spacing:.1em;text-transform:uppercase">All Chapter 19 Content</span>`;
}

// GENERATORS
function mkOpts(arr,ci){
  return{opts:arr,ci,isMC:true};
}

function gP(){
  done=false;uv=null;
  if(cat==="ox_num"){
    const d=P(OX);const ch=SH([d.ans,...d.wr]);const ci=ch.indexOf(d.ans);
    prob={ref:"Ox. Numbers",q:`Oxidation number of <b>${d.el}</b> in <b>${d.compound}</b>?`,
      opts:ch.map(c=>({t:FN(c),ok:c===d.ans})),ci,isMC:true,
      st:[`<span class='ans'>${FN(d.ans)}</span>`],nt:d.ex};
  } else if(cat==="is_redox"){
    const r=P(RX);const a={t:"Yes тАФ this IS a redox reaction",ok:r.is},b={t:"No тАФ NOT a redox reaction",ok:!r.is};
    const ch=SH([a,b]);const ci=ch.findIndex(o=>o.ok);
    const st=r.is?[`<span class='ans'>YES тАФ redox</span>`,`${r.ox}: ${r.oc} тЖТ oxidized`,`${r.rd}: ${r.rc} тЖТ reduced`]
      :[`<span class='ans'>NOT a redox reaction</span>`,r.ex||"No oxidation numbers change."];
    prob={ref:"Redox ID",q:`Is this a redox reaction?<br><br><b>${r.eq}</b>`,opts:ch,ci,isMC:true,st,nt:r.ex||`${r.is?"Oxidation numbers change тАФ redox confirmed.":"No oxidation numbers change тАФ not a redox reaction."}`};
  } else if(cat==="agents"){
    const rd=RX.filter(r=>r.is);const r=P(rd);const askOx=Math.random()<0.5;
    const ans=askOx?r.oa:r.ra;const others=RX.map(r=>r.eq.split("тЖТ")[0].trim()).filter(s=>s!==ans);
    const wr=SH(others).slice(0,3);const ch=SH([{t:ans,ok:true},...wr.map(w=>({t:w,ok:false}))]);const ci=ch.findIndex(o=>o.ok);
    const st=askOx?[`<span class='ans'>Oxidizing agent: ${r.oa}</span>`,`${r.rd}: ${r.rc} тАФ gains eтБ╗ (reduced)`,`The substance containing the reduced element = oxidizing agent.`]
      :[`<span class='ans'>Reducing agent: ${r.ra}</span>`,`${r.ox}: ${r.oc} тАФ loses eтБ╗ (oxidized)`,`The substance containing the oxidized element = reducing agent.`];
    prob={ref:"Agents",q:`Identify the <b>${askOx?"oxidizing":"reducing"} agent</b> in:<br><br><b>${r.eq}</b>`,opts:ch,ci,isMC:true,st,nt:`The ${askOx?"oxidizing":"reducing"} agent is <b>${ans}</b>.`};
  } else if(cat==="cells"){
    const c=P(CM.slice(6));const ch=c.o.map((o,i)=>({t:o,ok:i===c.c}));
    prob={ref:"Cells",q:c.q,opts:ch,ci:c.c,isMC:true,st:[`<span class='ans'>${c.o[c.c]}</span>`],nt:c.ex};
  } else {
    const c=P(CM);const ch=c.o.map((o,i)=>({t:o,ok:i===c.c}));
    prob={ref:"Conceptual",q:c.q,opts:ch,ci:c.c,isMC:true,st:[`<span class='ans'>${c.o[c.c]}</span>`],nt:c.ex};
  }
  rTB();rP();
}

function chkP(i){
  if(done)return;done=true;uv=i;nA++;
  if(i===prob.ci){nC++;str++}else str=0;
  upS();rP();
}

function rP(){
  const el=document.getElementById("main"),p=prob;if(!p){el.innerHTML="";return}
  const ok=done&&uv===p.ci,cc=done?(ok?"ok":"no"):"";
  const bc=done?(ok?"tok":"tno"):"tq";
  let h=`<div class="pc ${cc}">
    <div><span class="tag ${bc}">${done?(ok?"тЬУ Correct":"тЬЧ Incorrect"):"Question"}</span><span class="tag tty">${p.ref}</span></div>
    <div class="qt">${p.q}</div><div class="opts">`;
  p.opts.forEach((o,i)=>{
    let c="opt";if(done){c+=" dn";if(i===p.ci)c+=" co";else if(i===uv)c+=" cx"}
    const l=done&&i===p.ci?"тЬУ":done&&i===uv?"тЬЧ":String.fromCharCode(65+i);
    h+=`<button class="${c}" onclick="chkP(${i})"><span class="ol">${l}</span>${o.t}</button>`;
  });
  h+=`</div>`;
  if(done){
    h+=`<div class="sol"><div class="sol-h">Explanation</div>`;
    p.st.forEach(s=>{h+=`<div class="sl-ln">${s}</div>`});
    h+=`<div class="sol-note">${p.nt}</div></div><button class="nx" onclick="gP()">Next тЖТ</button>`;
  }
  h+=`</div>`;el.innerHTML=h;
}

// VOCAB
function gV(){
  vdone=false;uva=null;
  if(vmode==="mc"){
    const c=P(V),wr=SH(V.filter(v=>v.t!==c.t)).slice(0,3),askT=Math.random()<0.5,opts=SH([c,...wr]);
    vq={type:"mc",c,opts,askT,ci:opts.indexOf(c)};
  } else if(vmode==="tf"){
    const c=P(V),isT=Math.random()<0.5;
    const sd=isT?c.d:P(V.filter(v=>v.t!==c.t)).d;
    vq={type:"tf",t:c.t,sd,isT,cd:c.d};
  } else {
    const c=P(V),askT=Math.random()<0.5;vq={type:"written",c,askT};
  }
  rTB();rV();
}

function chkVMC(i){if(vdone)return;vdone=true;uva=i;nA++;if(i===vq.ci){nC++;str++}else str=0;upS();rV()}
function chkVTF(a){if(vdone)return;vdone=true;uva=a;nA++;if(a===vq.isT){nC++;str++}else str=0;upS();rV()}
function chkVW(){
  if(vdone)return;const inp=document.getElementById("vi");if(!inp?.value.trim())return;
  vdone=true;const u=inp.value.trim().toLowerCase();
  const tgt=(vq.askT?vq.c.d:vq.c.t).toLowerCase();
  const tw=tgt.split(/\s+/).filter(w=>w.length>3);
  const ok=tw.length>0&&tw.filter(w=>u.includes(w)).length/tw.length>=0.45;
  uva=ok;nA++;if(ok){nC++;str++}else str=0;upS();rV();
}

function rV(){
  const el=document.getElementById("main"),q=vq;if(!q){el.innerHTML="";return}
  let h="";
  if(q.type==="mc"){
    const ok=vdone&&uva===q.ci,cc=vdone?(ok?"ok":"no"):"";
    h+=`<div class="pc ${cc}"><div><span class="tag ${vdone?(ok?"tok":"tno"):"tq}"}">Vocab</span><span class="tag tty">MC</span></div>`;
    h+=`<div class="qt">${q.askT?`Define: <b>${q.c.t}</b>`:`Which term? "<span style="color:var(--cy)">${q.c.d}</span>"`}</div><div class="opts">`;
    q.opts.forEach((o,i)=>{
      let c="opt";if(vdone){c+=" dn";if(i===q.ci)c+=" co";else if(i===uva)c+=" cx"}
      const l=vdone&&i===q.ci?"тЬУ":vdone&&i===uva?"тЬЧ":String.fromCharCode(65+i);
      h+=`<button class="${c}" onclick="chkVMC(${i})"><span class="ol">${l}</span>${q.askT?o.d:o.t}</button>`;
    });
    h+=`</div>`;
    if(vdone)h+=`<button class="nx" onclick="gV()">Next тЖТ</button>`;
    h+=`</div>`;
  } else if(q.type==="tf"){
    const ok=vdone&&uva===q.isT,cc=vdone?(ok?"ok":"no"):"";
    h+=`<div class="pc ${cc}"><div><span class="tag ${vdone?(ok?"tok":"tno"):"tq}"}">Vocab</span><span class="tag tty">T/F</span></div>`;
    h+=`<div class="qt"><b>${q.t}</b><br><span style="color:var(--cy);font-style:italic;font-size:13px">"${q.sd}"</span></div>`;
    h+=`<div style="margin-top:10px;color:var(--mut);font-size:12px">Is this definition correct?</div>`;
    h+=`<div style="display:flex;gap:8px;margin-top:8px">`;
    ["True","False"].forEach(l=>{
      const v=l==="True";let c="opt";if(vdone){c+=" dn";if(v===q.isT)c+=" co";else if(v===uva)c+=" cx"}
      h+=`<button class="${c}" style="flex:1;justify-content:center" onclick="chkVTF(${v})">${l}</button>`;
    });
    h+=`</div>`;
    if(vdone&&!ok)h+=`<div class="sol" style="margin-top:10px"><div class="sol-h">Correct Definition</div><div class="sl-ln">${q.cd}</div></div>`;
    if(vdone)h+=`<button class="nx" onclick="gV()">Next тЖТ</button>`;
    h+=`</div>`;
  } else {
    const cc=vdone?(uva?"ok":"no"):"";
    h+=`<div class="pc ${cc}"><div><span class="tag ${vdone?(uva?"tok":"tno"):"tq}"}">Vocab</span><span class="tag tty">Written</span></div>`;
    h+=`<div class="qt">${q.askT?`Define: <b>${q.c.t}</b>`:`What term?<br><span style="color:var(--cy);font-style:italic;font-size:13px">"${q.c.d}"</span>`}</div>`;
    if(!vdone){
      h+=`<textarea class="vi" id="vi" placeholder="${q.askT?"Type definitionтАж":"Type the termтАж"}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chkVW()}"></textarea>`;
      h+=`<br><button class="chk" onclick="chkVW()">Check</button>`;
    } else {
      h+=`<div style="margin-top:8px;font:600 11px var(--m);color:${uva?"var(--gn)":"var(--rd)"}">${uva?"тЬУ Key concepts matched!":"тЬЧ Review the answer below"}</div>`;
      h+=`<div class="sol" style="margin-top:8px"><div class="sl-ln">${q.askT?q.c.d:`<b>${q.c.t}</b>`}</div></div>`;
      h+=`<button class="nx" onclick="gV()">Next тЖТ</button>`;
    }
    h+=`</div>`;
  }
  el.innerHTML=h;
}

// CHEATSHEET
function rCS(){
  rTB();
  let h=`<div class="cs-h">тЪб Electrode Conventions (Table 19-1)</div>`;
  h+=`<div class="cs-c"><table class="etbl"><thead><tr><th>Property</th><th>Cathode</th><th>Anode</th></tr></thead><tbody>
    <tr><td>Half-reaction</td><td>Reduction</td><td>Oxidation</td></tr>
    <tr><td>Ions attracted</td><td>Cations (+)</td><td>Anions (тИТ)</td></tr>
    <tr><td>Electron movement</td><td>Into cell</td><td>Out of cell</td></tr>
    <tr><td>Sign тАФ electrolytic</td><td>Negative (тИТ)</td><td>Positive (+)</td></tr>
    <tr><td>Sign тАФ voltaic</td><td>Positive (+)</td><td>Negative (тИТ)</td></tr>
  </tbody></table></div>`;
  h+=`<div class="cs-h">ЁЯУЪ Key Concepts &amp; Worked Examples</div>`;
  CS.forEach(c=>{
    h+=`<div class="cs-c"><div class="cs-t">${c.t}</div>
    <div class="cs-fm">${c.fm.join("<br>")}</div>
    <div class="cs-p">${c.p.replace(/\n/g,"<br>")}</div>
    <div class="cs-ex">${c.ex.replace(/\n/g,"<br>")}</div></div>`;
  });
  h+=`<div class="cs-h">ЁЯУЦ All ${V.length} Vocabulary Terms</div>`;
  V.forEach((v,i)=>{
    h+=`<div class="cs-c" style="padding:10px 12px;margin-bottom:5px">
      <span style="font:700 9px var(--m);color:var(--tl);margin-right:6px">${i+1}.</span>
      <b>${v.t}</b> <span style="color:var(--dim)">тАФ</span>
      <span style="color:var(--mut);font-size:12px"> ${v.d}</span></div>`;
  });
  document.getElementById("main").innerHTML=h;
}

rModes();rTB();gP();upS();
</script>
