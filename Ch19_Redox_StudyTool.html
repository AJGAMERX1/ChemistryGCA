<script>
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function rd(v,d){return Math.round(v*Math.pow(10,d))/Math.pow(10,d)}

// ========== VOCAB ==========
const VOCAB=[
{t:"oxidation-reduction reaction",d:"a class of chemical reactions involving the transfer of electrons; also called a redox reaction"},
{t:"oxidation",d:"the process by which an atom loses electrons; its oxidation number becomes more positive"},
{t:"reduction",d:"the process by which an atom gains electrons; its oxidation number becomes less positive (more negative)"},
{t:"reducing agent",d:"a substance that causes the reduction of another substance; the reducing agent itself is oxidized"},
{t:"oxidizing agent",d:"a substance that causes the oxidation of another substance; the oxidizing agent itself is reduced"},
{t:"electrochemistry",d:"the field of chemistry that studies how electricity and redox reactions are related"},
{t:"electrochemical cell",d:"a device that uses either a spontaneous reaction to produce electricity or electricity to drive a nonspontaneous reaction"},
{t:"voltaic cell",d:"an electrochemical cell that uses a spontaneous chemical reaction to produce electrical energy"},
{t:"electrolysis",d:"the process of forcing a nonspontaneous redox reaction to occur using an electrical current"},
{t:"electrolytic cell",d:"an electrochemical cell that uses electrical energy to force a nonspontaneous chemical reaction to occur"},
{t:"cathode",d:"the electrode where reduction occurs"},
{t:"anode",d:"the electrode where oxidation occurs"},
{t:"electroplating",d:"a type of electrolysis in which the object to be plated is the cathode and the plating metal is the anode"},
{t:"half-reaction",d:"the oxidation or reduction portion of a redox reaction; together two half-reactions form a complete redox reaction"},
{t:"half-cell",d:"one part of a voltaic cell where either oxidation or reduction takes place"},
{t:"salt bridge",d:"a tube of electrolytic gel connecting the two half-cells; allows ion flow but prevents solution mixing"},
{t:"battery",d:"a voltaic cell or group of voltaic cells used as a source of direct current"},
{t:"fuel cell",d:"a voltaic cell in which a fuel substance is continuously supplied and undergoes a redox reaction to produce electricity"}
];

// ========== OXIDATION NUMBER DATABASE ==========
const OX_NUMS=[
// --- FREE ELEMENTS (rule: always 0) ---
{compound:"F₂",element:"F",answer:0,work:"Free element → oxidation number = 0",cat:"free"},
{compound:"O₂",element:"O",answer:0,work:"Free element → oxidation number = 0",cat:"free"},
{compound:"N₂",element:"N",answer:0,work:"Free element → oxidation number = 0",cat:"free"},
{compound:"Fe",element:"Fe",answer:0,work:"Free element → oxidation number = 0",cat:"free"},
{compound:"Cu",element:"Cu",answer:0,work:"Free element → oxidation number = 0",cat:"free"},
{compound:"Br₂",element:"Br",answer:0,work:"Free element → oxidation number = 0",cat:"free"},
{compound:"Zn",element:"Zn",answer:0,work:"Free element → oxidation number = 0",cat:"free"},
// --- MONATOMIC IONS (rule: = charge) ---
{compound:"Cr⁻",element:"Cr",answer:-1,work:"Monatomic ion → ox # = charge = −1",cat:"ion"},
{compound:"Na⁺",element:"Na",answer:1,work:"Monatomic ion → ox # = charge = +1",cat:"ion"},
{compound:"Fe²⁺",element:"Fe",answer:2,work:"Monatomic ion → ox # = charge = +2",cat:"ion"},
{compound:"Fe³⁺",element:"Fe",answer:3,work:"Monatomic ion → ox # = charge = +3",cat:"ion"},
{compound:"Al³⁺",element:"Al",answer:3,work:"Monatomic ion → ox # = charge = +3",cat:"ion"},
{compound:"Cl⁻",element:"Cl",answer:-1,work:"Monatomic ion → ox # = charge = −1",cat:"ion"},
{compound:"O²⁻",element:"O",answer:-2,work:"Monatomic ion → ox # = charge = −2",cat:"ion"},
{compound:"Ca²⁺",element:"Ca",answer:2,work:"Monatomic ion → ox # = charge = +2",cat:"ion"},
// --- SIMPLE BINARY COMPOUNDS ---
{compound:"NaCl",element:"Na",answer:1,work:"Na is Group 1 → always +1. Cl = −1.",cat:"binary"},
{compound:"NaCl",element:"Cl",answer:-1,work:"Cl is a halogen → −1. Na = +1.",cat:"binary"},
{compound:"MgO",element:"Mg",answer:2,work:"O = −2. Mg + (−2) = 0 → Mg = +2",cat:"binary"},
{compound:"MgO",element:"O",answer:-2,work:"O is almost always −2",cat:"binary"},
{compound:"CaF₂",element:"Ca",answer:2,work:"F = −1 (×2 = −2). Ca + (−2) = 0 → Ca = +2",cat:"binary"},
{compound:"Al₂O₃",element:"Al",answer:3,work:"O = −2 (×3 = −6). 2(Al) + (−6) = 0 → 2Al = +6 → Al = +3",cat:"binary"},
{compound:"H₂O",element:"H",answer:1,work:"H = +1 in most compounds. O = −2. Check: 2(+1) + (−2) = 0 ✓",cat:"binary"},
{compound:"H₂O",element:"O",answer:-2,work:"O = −2 in most compounds. H = +1.",cat:"binary"},
// --- COMPOUNDS WITH POLYATOMIC IONS (from PDF Review 3-4) ---
{compound:"Cu(NO₃)₂",element:"Cu",answer:2,work:"NO₃ = −1 (×2 = −2). Cu + (−2) = 0 → Cu = +2",cat:"poly"},
{compound:"Cu(NO₃)₂",element:"N",answer:5,work:"In NO₃⁻: O = −2 (×3 = −6). N + (−6) = −1 → N = +5",cat:"poly"},
{compound:"Fe(OH)₂",element:"Fe",answer:2,work:"OH = −1 (×2 = −2). Fe + (−2) = 0 → Fe = +2",cat:"poly"},
{compound:"Fe(OH)₃",element:"Fe",answer:3,work:"OH = −1 (×3 = −3). Fe + (−3) = 0 → Fe = +3",cat:"poly"},
// --- HARDER COMPOUNDS (acids, oxyanions) ---
{compound:"Fe₂O₃",element:"Fe",answer:3,work:"O = −2 (×3 = −6). 2(Fe) + (−6) = 0 → Fe = +3",cat:"hard"},

const G={
find_ox(){

  st:[`<span class='lb'>WORK</span> ${q.work}`,`<span class='lb'>ANSWER</span> <span class='ans'>${q.answer>0?"+":""}${q.answer}</span>`],nt:`Apply oxidation number rules: O = −2, H = +1, halogens = −1, sum = total charge.`}
},
find_ox_easy(){
  const q=pick(OX_NUMS.filter(x=>x.cat==="free"||x.cat==="ion"));
  return{ref:"Rule 1-2",q:`What is the oxidation number of <b>${q.element}</b> in <b>${q.compound}</b>?<br><br><span style="color:var(--dim);font-size:12px">${q.cat==="free"?"Hint: this is a free (uncombined) element":"Hint: this is a monatomic ion"}</span>`,gv:`Species: ${q.compound}`,fm:`${q.cat==="free"?"Free elements = 0":"Monatomic ion = its charge"}`,fi:`Ox # = ?`,u:"",a:q.answer,tol:0.01,
  st:[`<span class='lb'>RULE</span> ${q.work}`,`<span class='lb'>ANSWER</span> <span class='ans'>${q.answer>0?"+":""}${q.answer}</span>`],nt:`${q.cat==="free"?"Rule 1: Any element in its uncombined (free) state has an oxidation number of 0.":"Rule 2: The oxidation number of a monatomic ion equals its charge."}`}
},
find_ox_hard(){
  const q=pick(OX_NUMS.filter(x=>x.cat==="hard"));
  return{ref:"Review 3-4",q:`What is the oxidation number of <b>${q.element}</b> in <b>${q.compound}</b>?<br><br><span style="color:var(--dim);font-size:12px">Use: O = −2, H = +1, halogens = −1, alkali metals = +1. Sum = 0 for neutral compounds.</span>`,gv:`Compound: ${q.compound}\nFind: ${q.element}`,fm:`Set up: known ox #'s + unknown = total charge\nSolve for unknown`,fi:`Ox # of ${q.element} = ?`,u:"",a:q.answer,tol:0.01,
  st:[`<span class='lb'>WORK</span> ${q.work}`,`<span class='lb'>ANSWER</span> <span class='ans'>${q.answer>0?"+":""}${q.answer}</span>`],nt:`Assign known oxidation numbers first (O, H, halogens, alkali metals), then solve for the unknown using the rule that all ox numbers must sum to the total charge.`}
},
find_ox_ion(){
  const q=pick(OX_NUMS.filter(x=>x.cat==="ion_hard"));
  return{ref:"Polyatomic Ions",q:`What is the oxidation number of <b>${q.element}</b> in the polyatomic ion <b>${q.compound}</b>?<br><br><span style="color:var(--dim);font-size:12px">Remember: the sum of oxidation numbers = the charge of the ION (not zero!)</span>`,gv:`Ion: ${q.compound}\nFind: ${q.element}`,fm:`Sum of all ox # = charge of the ion\nO = −2, solve for unknown`,fi:`Ox # of ${q.element} = ?`,u:"",a:q.answer,tol:0.01,
  st:[`<span class='lb'>WORK</span> ${q.work}`,`<span class='lb'>ANSWER</span> <span class='ans'>+${q.answer}</span>`],nt:`Key difference for polyatomic ions: the sum of oxidation numbers equals the CHARGE of the ion, not zero. Everything else works the same.`}
},
ox_change(){
  const r=pick(REDOX_ID.filter(x=>x.isRedox));
  const askOx=Math.random()<0.5;
  const elem=askOx?r.oxidized:r.reduced;
  const from=askOx?r.oxFrom:r.redFrom;
  const to=askOx?r.oxTo:r.redTo;
  const change=parseInt(to)-parseInt(from);
  return{ref:"Ex 19-1",q:`In the reaction:<br><b>${r.eq}</b><br><br>What is the <b>change in oxidation number</b> for <b>${elem}</b>?<br><br><span style="color:var(--dim);font-size:12px">Enter as a number (e.g. +2 or -3). Positive = oxidized, negative = reduced.</span>`,gv:`Reaction shown above\nElement: ${elem}\nBefore: ${from}\nAfter: ${to}`,fm:`Change = final ox # − initial ox #`,fi:`Change = ?`,u:"",a:change,tol:0.01,
  st:[`<span class='lb'>BEFORE</span> ${elem} = ${from}`,`<span class='lb'>AFTER</span> ${elem} = ${to}`,`<span class='lb'>CHANGE</span> ${to} − (${from}) = <span class='ans'>${change>0?"+":""}${change}</span>`,`<span class='lb'>TYPE</span> ${change>0?"Oxidized (lost electrons)":"Reduced (gained electrons)"}`],nt:`Positive change = oxidation (lost electrons). Negative change = reduction (gained electrons). The magnitude tells you how many electrons were transferred per atom.`}
},
is_redox(){
  const r=pick(REDOX_ID);
  const opts=shuffle([
    {t:"Yes — it is a redox reaction",ok:r.isRedox},
    {t:"No — it is NOT a redox reaction",ok:!r.isRedox}
  ]);
  return{ref:"Ex 19-1",q:`Is the following a redox reaction?<br><br><b>${r.eq}</b>`,opts,ci:opts.findIndex(o=>o.ok),isMC:true,
  st:[`<span class='ans'>${r.isRedox?"YES — redox reaction":"NOT a redox reaction"}</span>`,r.isRedox?`${r.oxidized}: ${r.oxFrom} → ${r.oxTo} (oxidized)`:"",,r.isRedox?`${r.reduced}: ${r.redFrom} → ${r.redTo} (reduced)`:""].filter(Boolean),nt:r.expl}
},
find_agent(){
  const r=pick(REDOX_ID.filter(x=>x.isRedox));
  const askOx=Math.random()<0.5;
  const correctAns=askOx?r.oxAgent:r.redAgent;
  const agentType=askOx?"oxidizing":"reducing";
  const parts=[...new Set([r.oxAgent,r.redAgent])];
  const wrongs=["H₂O","O₂","NaCl","KBr","HCl","CO₂","N₂"].filter(x=>!parts.includes(x));
  const opts=shuffle([{t:correctAns,ok:true},...shuffle(wrongs).slice(0,3).map(w=>({t:w,ok:false}))]);
  return{ref:"Ex 19-2",q:`In the reaction:<br><b>${r.eq}</b><br><br>Identify the <b>${agentType} agent</b>.`,opts,ci:opts.findIndex(o=>o.ok),isMC:true,
  st:[`<span class='lb'>OXIDIZED</span> ${r.oxidized} (${r.oxFrom} → ${r.oxTo}) → reducing agent is ${r.redAgent}`,`<span class='lb'>REDUCED</span> ${r.reduced} (${r.redFrom} → ${r.redTo}) → oxidizing agent is ${r.oxAgent}`,`<span class='ans'>The ${agentType} agent is ${correctAns}</span>`],nt:`The reducing agent is the substance that IS oxidized (it loses electrons to reduce something else). The oxidizing agent is the substance that IS reduced (it gains electrons to oxidize something else).`}
},
write_half(){
  const hr=pick(HALF_RXN);
  const isOx=Math.random()<0.5;
  const ans=isOx?hr.half_ox:hr.half_red;
  const type=isOx?"oxidation":"reduction";
  return{ref:"Ex 19-5",q:`Write the <b>${type} half-reaction</b> for <b>${hr.metal}</b> and <b>${hr.ion}</b>.<br><br><span style="color:var(--dim);font-size:12px">Format: ${isOx?hr.metal+" → "+hr.ion+" + "+hr.e+"e⁻":hr.ion+" + "+hr.e+"e⁻ → "+hr.metal}</span>`,gv:`Metal: ${hr.metal}\nIon: ${hr.ion}\nElectrons: ${hr.e}`,fm:`${isOx?"Oxidation: metal → ion + e⁻":"Reduction: ion + e⁻ → metal"}`,fi:`Half-reaction = ?`,u:"",a:ans,tol:0,isText:true,
  st:[`<span class='lb'>${type.toUpperCase()}</span> <span class='ans'>${ans}</span>`,`<span class='lb'>ELECTRONS</span> ${hr.e} electron${hr.e>1?"s":""} ${isOx?"lost":"gained"}`],nt:`${isOx?"Oxidation = loss of electrons. Metal → ion + electrons.":"Reduction = gain of electrons. Ion + electrons → metal."}`}
},
balance_e(){
  let h1=pick(HALF_RXN),h2=pick(HALF_RXN);
  while(h1.metal===h2.metal)h2=pick(HALF_RXN);
  // Find LCM of electrons
  const lcm=(a,b)=>{const gcd=(x,y)=>y===0?x:gcd(y,x%y);return(a*b)/gcd(a,b)};
  const L=lcm(h1.e,h2.e);
  const m1=L/h1.e,m2=L/h2.e;
  return{ref:"Ex 19-5",q:`To combine these half-reactions, you need equal electrons.<br><br>Oxidation: <b>${h1.half_ox}</b><br>Reduction: <b>${h2.half_red}</b><br><br>What is the <b>total number of electrons</b> that must be transferred (the LCM)?`,gv:`Oxidation loses ${h1.e}e⁻\nReduction gains ${h2.e}e⁻`,fm:`Find LCM of ${h1.e} and ${h2.e}`,fi:`Total e⁻ = ?`,u:"e⁻",a:L,tol:0.01,
  st:[`<span class='lb'>LCM</span> of ${h1.e} and ${h2.e} = <span class='ans'>${L}</span>`,`<span class='lb'>MULTIPLY</span> Oxidation × ${m1}, Reduction × ${m2}`,`<span class='lb'>RESULT</span> ${m1}(${h1.half_ox}) and ${m2}(${h2.half_red})`],nt:`Find the least common multiple of the electrons in each half-reaction, then multiply each half-reaction by the number needed to reach that LCM.`}
},
combine_half(){
  let h1=pick(HALF_RXN),h2=pick(HALF_RXN);
  while(h1.metal===h2.metal||h1.e===h2.e)h2=pick(HALF_RXN);
  const lcm=(a,b)=>{const gcd=(x,y)=>y===0?x:gcd(y,x%y);return(a*b)/gcd(a,b)};
  const L=lcm(h1.e,h2.e);
  const m1=L/h1.e,m2=L/h2.e;
  const net=`${m1>1?m1:""}${h1.metal} + ${m2>1?m2:""}${h2.ion} → ${m1>1?m1:""}${h1.ion} + ${m2>1?m2:""}${h2.metal}`;
  return{ref:"Ex 19-5",q:`Combine these half-reactions into the net redox equation:<br><br>Oxidation: <b>${h1.half_ox}</b><br>Reduction: <b>${h2.half_red}</b><br><br><span style="color:var(--dim);font-size:12px">Type the balanced net equation (e.g. 3Ca + 2Fe³⁺ → 3Ca²⁺ + 2Fe)</span>`,gv:`Ox: ${h1.half_ox}\nRed: ${h2.half_red}\nLCM of ${h1.e},${h2.e} = ${L}`,fm:`Multiply, add, cancel e⁻`,fi:`Net equation = ?`,u:"",a:net,tol:0,isText:true,
  st:[`<span class='lb'>MULTIPLY</span> Ox × ${m1}: ${m1>1?m1:""}${h1.metal} → ${m1>1?m1:""}${h1.ion} + ${L}e⁻`,`<span class='lb'>MULTIPLY</span> Red × ${m2}: ${m2>1?m2:""}${h2.ion} + ${L}e⁻ → ${m2>1?m2:""}${h2.metal}`,`<span class='lb'>CANCEL</span> ${L}e⁻ on each side`,`<span class='lb'>NET</span> <span class='ans'>${net}</span>`],nt:`Multiply each half-reaction so electrons cancel, then add and simplify.`}
},
concept_mc(){
  const c=pick(CONCEPTS);
  const opts=c.opts.map((o,i)=>({t:o,ok:i===c.correct}));

{type:"teach",title:"What is a Redox Reaction?",body:"You've seen acid-base reactions, precipitation reactions, and combustion. But there's one more major class: <b>oxidation-reduction reactions</b> — redox for short.<br><br>Redox reactions are all about <em>electron transfer</em>. One atom <b>loses</b> electrons while another <b>gains</b> them. This is happening constantly around you — rusting iron, burning fuel, batteries powering your phone."},

{type:"teach",title:"OIL RIG — The Mnemonic That Saves You",body:"This is the single most important mnemonic in this chapter:<br><br><b style='font-size:20px;color:var(--cyn)'>OIL RIG</b><br><br><b>O</b>xidation <b>I</b>s <b>L</b>oss (of electrons)<br><b>R</b>eduction <b>I</b>s <b>G</b>ain (of electrons)<br><br>Oxidation and reduction <em>always occur together</em>. You can't have one without the other — if one atom loses electrons, another must gain them."},
{type:"checkpoint",q:"In the reaction 2Mg + O₂ → 2MgO, magnesium goes from 0 to +2. What happened to magnesium?",opts:[{t:"It was oxidized (lost electrons)",ok:true},{t:"It was reduced (gained electrons)",ok:false},{t:"Nothing changed",ok:false},{t:"It was both oxidized and reduced",ok:false}],hint:"Mg went from 0 to +2 — its oxidation number INCREASED (became more positive). OIL RIG: Oxidation Is Loss...",expl:"Correct! Mg lost 2 electrons (0 → +2), so it was OXIDIZED. OIL: Oxidation Is Loss of electrons."},
{type:"teach",title:"Oxidation Numbers — The Tracking System",body:"How do we track who lost and gained electrons? We assign <b>oxidation numbers</b> to every atom. These are like a 'charge bookkeeping' system.<br><br>The rules are simple:<br>• Free elements (like Fe, O₂) = <b>0</b><br>• Monatomic ions = <b>their charge</b> (Na⁺ = +1)<br>• Oxygen is usually <b>−2</b><br>• Hydrogen is usually <b>+1</b><br>• The sum of all oxidation numbers = <b>total charge of the formula</b><br><br>If any atom's oxidation number <em>changes</em> between reactants and products → it's a redox reaction."},
{type:"checkpoint",q:"What is the oxidation number of S in H₂SO₄?<br><br>Rules: H = +1, O = −2, total = 0",opts:[{t:"+6",ok:true},{t:"+4",ok:false},{t:"+2",ok:false},{t:"-2",ok:false}],hint:"Set up: 2(+1) + S + 4(−2) = 0 → +2 + S − 8 = 0 → S = ?",expl:"Correct! 2(+1) + S + 4(−2) = 0 → +2 + S − 8 = 0 → S = +6."},
{type:"teach",title:"Oxidizing and Reducing Agents",body:"Here's the confusing part — but once you get it, it clicks:<br><br>The <b>reducing agent</b> is the substance that <em>gets oxidized</em>. It reduces the other substance by donating electrons.<br><br>The <b>oxidizing agent</b> is the substance that <em>gets reduced</em>. It oxidizes the other substance by accepting electrons.<br><br>The name describes what the agent <b>does to the other substance</b>, not what happens to itself."},
{type:"checkpoint",q:"In 2Na + 2H₂O → 2NaOH + H₂, Na is oxidized (0→+1). What is Na?",opts:[{t:"The oxidizing agent",ok:false},{t:"The reducing agent",ok:true},{t:"Neither",ok:false},{t:"Both",ok:false}],hint:"Na is oxidized — it GIVES electrons to H₂O, causing H to be reduced. What do you call a substance that causes reduction?",expl:"Right! Na gives up electrons (is oxidized), which CAUSES H in H₂O to be reduced. So Na is the REDUCING agent."},
{type:"teach",title:"Balancing Redox — The 5-Step Method",body:"Balancing redox equations uses the <b>oxidation number method</b>:<br><br><b>Step 1:</b> Assign oxidation numbers to all atoms<br><b>Step 2:</b> Identify which atoms changed<br><b>Step 3:</b> Write the net change for each<br><b>Step 4:</b> Multiply so total increase = total decrease<br><b>Step 5:</b> Balance the rest by inspection<br><br>The key insight: <em>total electrons lost must equal total electrons gained</em>."},
{type:"teach",title:"Worked Example — Balancing (Ex 19-4)",body:`Let's balance: <b>HCl + HNO₃ → HOCl + NO + H₂O</b><br><br><b>Step 1:</b> Cl: −1 → +1 &nbsp; N: +5 → +2<br><b>Step 2:</b> Cl is oxidized, N is reduced<br><b>Step 3:</b> Cl change = +2, N change = −3<br><b>Step 4:</b> LCM of 2 and 3 = 6<br>&nbsp;&nbsp;Multiply Cl by 3: +2 × 3 = +6<br>&nbsp;&nbsp;Multiply N by 2: −3 × 2 = −6 ✓<br><b>Step 5:</b> 3HCl + 2HNO₃ → 3HOCl + 2NO + H₂O`},

{type:"definition",term:"voltaic cell",def:"an electrochemical cell that uses a spontaneous chemical reaction to produce electrical energy",extra:"Also called a galvanic cell. Examples: every battery you've ever used — AA batteries, car batteries, lithium-ion phone batteries."},

{type:"teach",title:"The Two Electrodes",body:"Every electrochemical cell has two electrodes:<br><br>🔴 <b>Anode</b> — where <em>oxidation</em> occurs<br>🔵 <b>Cathode</b> — where <em>reduction</em> occurs<br><br>Mnemonics that will save you:<br><b style='color:var(--cyn);font-size:16px'>AN OX</b> — <b>AN</b>ode = <b>OX</b>idation<br><b style='color:var(--cyn);font-size:16px'>RED CAT</b> — <b>RED</b>uction at the <b>CAT</b>hode<br><br>These rules apply to BOTH voltaic and electrolytic cells."},

{type:"teach",title:"Half-Reactions",body:"Every redox reaction can be split into two <b>half-reactions</b>:<br><br>• The <b>oxidation half-reaction</b>: shows the atom losing electrons<br>&nbsp;&nbsp;&nbsp;Example: Zn → Zn²⁺ + 2e⁻<br><br>• The <b>reduction half-reaction</b>: shows the atom gaining electrons<br>&nbsp;&nbsp;&nbsp;Example: Cu²⁺ + 2e⁻ → Cu<br><br>In a voltaic cell, each half-reaction happens in its own <b>half-cell</b>, connected by a <b>salt bridge</b>."},
{type:"teach",title:"Combining Half-Reactions (Ex 19-5)",body:"To write the overall redox equation, you combine the two half-reactions. The key rule:<br><br><b>Electrons lost = Electrons gained</b><br><br>If the half-reactions don't have equal electrons, multiply them. Find the <b>LCM</b> of the electrons.<br><br>Example:<br>Ca → Ca²⁺ + 2e⁻ (loses 2)<br>Fe³⁺ + 3e⁻ → Fe (gains 3)<br>LCM(2,3) = 6<br>Multiply: 3Ca → 3Ca²⁺ + 6e⁻<br>Multiply: 2Fe³⁺ + 6e⁻ → 2Fe<br>Net: <b>3Ca + 2Fe³⁺ → 3Ca²⁺ + 2Fe</b>"},
{type:"checkpoint",q:"To combine Zn → Zn²⁺ + 2e⁻ with Cu²⁺ + 2e⁻ → Cu, what is the net equation?",opts:[{t:"Zn + Cu²⁺ → Zn²⁺ + Cu",ok:true},{t:"Zn + Cu → Zn²⁺ + Cu²⁺",ok:false},{t:"2Zn + Cu²⁺ → 2Zn²⁺ + Cu",ok:false},{t:"Zn²⁺ + Cu → Zn + Cu²⁺",ok:false}],hint:"Both half-reactions have 2e⁻, so no multiplication needed. Just add them and cancel the electrons.",expl:"Correct! Both have 2 electrons, so they cancel directly: Zn + Cu²⁺ → Zn²⁺ + Cu."},

v class="btn-row"><button class="btn-sh" onclick="showPS()">Show Solution</button></div>`;else{h+=`<div class="aa"><div class="aw"><input class="ai ${isOk?"v-ok":"v-no"}" value="${userVal}" disabled></div></div><div class="fb ${isOk?"fb-ok":"fb-no"}">${isOk?`✓ Correct! Streak: ${streak} 🔥`:"✗ Not quite"}</div>`;if(!isOk)h+=`<div class="fb-v">Answer: ${p.a} ${p.u||""}</div>`}}if(answered||solShown){h+=`<div class="sol"><div class="sol-tag">Solution</div>`;p.st.forEach(s=>{h+=`<div class="stp">${s}</div>`});h+=`<div class="sol-note">${p.nt}</div></div>`}if(answered)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genP()">Next →</button></div>`;h+=`</div>`;el.innerHTML=h;if(!answered&&!p.isMC){const i=document.getElementById("inp");if(i)setTimeout(()=>i.focus(),50)}}

// ========== VOCAB ==========
function genV(){vAns=false;vUA=null;if(vMode==="mc")genVMC();else if(vMode==="tf")genVTF();else genVW();renderCtrls();renderVocab()}
function genVMC(){const c=pick(VOCAB),wr=shuffle(VOCAB.filter(v=>v.t!==c.t)).slice(0,3),askT=Math.random()<0.5,opts=shuffle([c,...wr]);vQ={type:"mc",c,opts,askT,ci:opts.indexOf(c)}}
function genVTF(){const c=pick(VOCAB),isT=Math.random()<0.5;vQ={type:"tf",t:c.t,sd:isT?c.d:pick(VOCAB.filter(v=>v.t!==c.t)).d,isT,cd:c.d}}
function genVW(){vQ={type:"written",c:pick(VOCAB),askT:Math.random()<0.5}}
function chkVM(i){if(vAns)return;vAns=true;vUA=i;nA++;if(i===vQ.ci){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVT(a){if(vAns)return;vAns=true;vUA=a;nA++;if(a===vQ.isT){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVW(){if(vAns)return;const inp=document.getElementById("vi");if(!inp||!inp.value.trim())return;vAns=true;const u=inp.value.trim().toLowerCase(),tgt=vQ.askT?vQ.c.d.toLowerCase():vQ.c.t.toLowerCase(),tw=tgt.split(/\s+/).filter(w=>w.length>3),mc=tw.filter(w=>u.includes(w)).length;vUA=tw.length>0&&(mc/tw.length>=0.4);nA++;if(vUA){nC++;streak++}else streak=0;updS();renderVocab()}
function renderVocab(){const el=document.getElementById("main"),q=vQ;if(!q){el.innerHTML="";return}let h="";if(q.type==="mc"){const ok=vAns&&vUA===q.ci,cc=vAns?(ok?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div>`;if(q.askT){h+=`<div class="q-txt">Define: <b>${q.c.t}</b></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}return`<button class="${c}" onclick="chkVM(${i})"><span class="opt-ltr">${vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i)}</span><span>${o.d}</span></button>`}).join("")}</div>`}else{h+=`<div class="q-txt">Which term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}return`<button class="${c}" onclick="chkVM(${i})"><span class="opt-ltr">${vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`}).join("")}</div>`}if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`}else if(q.type==="tf"){const ok=vAns&&vUA===q.isT,cc=vAns?(ok?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div><div class="q-txt"><b>${q.t}</b> — <span style="color:var(--cyn);font-style:italic">"${q.sd}"</span></div><div class="opts" style="flex-direction:row;gap:8px;margin-top:10px">`;["True","False"].forEach(l=>{const v=l==="True";let c="opt";if(vAns){c+=" done";if(v===q.isT)c+=" c-ok";else if(v===vUA)c+=" c-no"}h+=`<button class="${c}" style="flex:1;justify-content:center" onclick="chkVT(${v})">${l}</button>`});h+=`</div>`;if(vAns&&!ok)h+=`<div class="sol" style="margin-top:12px"><div class="sol-tag">Correct</div><div class="stp">${q.cd}</div></div>`;if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`}else{const cc=vAns?(vUA?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(vUA?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div>`;if(q.askT)h+=`<div class="q-txt">Define: <b>${q.c.t}</b></div>`;else h+=`<div class="q-txt">What term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div>`;if(!vAns)h+=`<div style="margin-top:12px"><textarea class="v-ta" id="vi" placeholder="${q.askT?"Type definition…":"Type the term…"}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chkVW()}"></textarea></div><div class="btn-row"><button class="ab" onclick="chkVW()">Check</button></div>`;else{h+=`<div class="fb ${vUA?"fb-ok":"fb-no"}" style="margin-top:8px">${vUA?"✓ Matched!":"✗ Review below"}</div><div class="sol" style="margin-top:10px"><div class="sol-tag">Answer</div>`;h+=q.askT?`<div class="stp">${q.c.d}</div>`:`<div class="stp" style="font-size:14px;font-weight:600">${q.c.t}</div>`;h+=`</div><div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`}h+=`</div>`}el.innerHTML=h}

// ========== LEARNING MODE ==========
function startL(t){lTopic=t;lIdx=0;lCPA=false;lCPU=null;lCPH=false;qzMode=false;qzIdx=0;qzS=0;qzA=false;qzU=null;renderL()}
function exitL(){lTopic=null;qzMode=false;renderL()}
function nextC(){lIdx++;lCPA=false;lCPU=null;lCPH=false;if(lIdx>=LESSONS[lTopic].cards.length){qzMode=true;qzIdx=0;qzS=0;qzA=false;qzU=null}renderL()}
function prevC(){if(lIdx>0){lIdx--;lCPA=false;lCPU=null;lCPH=false}renderL()}
function chkCP(i){const c=LESSONS[lTopic].cards[lIdx];if(lCPA)return;lCPU=i;if(c.opts[i].ok){lCPA=true;lCPH=false;nA++;nC++;streak++}else{lCPH=true;nA++;streak=0}updS();renderL()}
function retryCP(){lCPH=false;lCPU=null;renderL()}
function chkQz(i){if(qzA)return;qzA=true;qzU=i;nA++;const q=LESSONS[lTopic].quiz[qzIdx];if(q.opts[i].ok){qzS++;nC++;streak++}else streak=0;updS();renderL()}
function nextQz(){qzIdx++;qzA=false;qzU=null;renderL()}
function renderL(){const el=document.getElementById("main");if(!lTopic){el.innerHTML=`<div style="text-align:center;padding:40px 24px"><div style="font-size:44px;margin-bottom:12px">🎓</div><div style="font:400 24px/1.3 var(--s);margin-bottom:8px">Welcome to Learning Mode</div><div style="font:400 14px/1.6 var(--f);color:var(--mut);margin-bottom:20px;max-width:400px;margin-left:auto;margin-right:auto">Pick a lesson. Guided walkthrough with checkpoints and an end-of-lesson quiz.</div><div class="topic-picker"><button class="topic-btn" onclick="startL('redox')"><span style="font-size:24px;display:block;margin-bottom:6px">${LESSONS.redox.icon}</span><b>${LESSONS.redox.title}</b><div class="topic-sub">19.1 · ${LESSONS.redox.cards.length} cards + ${LESSONS.redox.quiz.length}-Q quiz</div></button><button class="topic-btn" onclick="startL('electrochem')"><span style="font-size:24px;display:block;margin-bottom:6px">${LESSONS.electrochem.icon}</span><b>${LESSONS.electrochem.title}</b><div class="topic-sub">19.2 · ${LESSONS.electrochem.cards.length} cards + ${LESSONS.electrochem.quiz.length}-Q quiz</div></button></div></div>`;return}if(qzMode){const quiz=LESSONS[lTopic].quiz;if(qzIdx>=quiz.length){const pct=Math.round(qzS/quiz.length*100);el.innerHTML=`<div class="lesson-wrap"><div class="lesson-card" style="text-align:center"><div style="font:700 10px var(--m);letter-spacing:.15em;color:var(--acc);text-transform:uppercase">Lesson Complete</div><div class="quiz-score ${pct>=70?"qok":""}">${qzS}/${quiz.length}</div><div style="font:400 14px var(--f);color:var(--mut)">${pct}% · ${pct>=70?"Great work! 🎉":"Keep studying 💪"}</div><div class="btn-row" style="justify-content:center;margin-top:20px"><button class="nav-btn" onclick="startL(lTopic)">🔁 Restart</button><button class="nav-btn primary" onclick="exitL()">← Topics</button></div></div></div>`;return}const q=quiz[qzIdx],prog=((qzIdx+(qzA?1:0))/quiz.length)*100;let h=`<div class="lesson-wrap"><div class="lesson-nav"><button class="nav-btn" onclick="exitL()">← Exit</button><div><div class="lesson-prog">Quiz · ${qzIdx+1}/${quiz.length}</div><div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div></div></div><div class="lesson-card"><div class="lesson-type">🎯 Quiz</div><div class="lesson-cp-q">${q.q}</div><div class="opts">`;q.opts.forEach((o,i)=>{let c="opt";if(qzA){c+=" done";if(o.ok)c+=" c-ok";else if(i===qzU)c+=" c-no"}h+=`<button class="${c}" onclick="chkQz(${i})"><span class="opt-ltr">${qzA&&o.ok?"✓":qzA&&i===qzU?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`});h+=`</div>`;if(qzA){h+=`<div class="fb ${q.opts[qzU].ok?"fb-ok":"fb-no"}" style="margin-top:10px">${q.opts[qzU].ok?"✓ Correct!":"✗ See above"}</div>`;if(q.expl)h+=`<div class="sol" style="margin-top:10px"><div class="sol-tag">Why</div><div class="stp">${q.expl}</div></div>`;h+=`<div class="btn-row" style="margin-top:12px;justify-content:flex-end"><button class="nav-btn primary" onclick="nextQz()">${qzIdx+1>=quiz.length?"Results →":"Next →"}</button></div>`}h+=`</div></div>`;el.innerHTML=h;return}const lesson=LESSONS[lTopic],card=lesson.cards[lIdx],prog=((lIdx+1)/lesson.cards.length)*100;let h=`<div class="lesson-wrap"><div class="lesson-nav"><button class="nav-btn" onclick="exitL()">← Exit</button><div style="text-align:center"><div class="lesson-prog">${lesson.icon} ${lesson.title}</div><div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div></div><div style="min-width:50px;text-align:right"><span class="lesson-prog">${lIdx+1}/${lesson.cards.length}</span></div></div><div class="lesson-card">`;if(card.type==="teach")h+=`<div class="lesson-type">📖 Lesson</div><div class="lesson-title">${card.title}</div><div class="lesson-body">${card.body}</div>`;else if(card.type==="definition")h+=`<div class="lesson-type">📚 Definition</div><div class="lesson-def"><div class="lesson-def-t">${card.term}</div><div class="lesson-def-b">${card.def}</div></div>${card.extra?`<div class="lesson-body">${card.extra}</div>`:""}`;else if(card.type==="checkpoint"){h+=`<div class="lesson-checkpoint"><div class="lesson-cp-t">✓ Checkpoint</div><div class="lesson-cp-q">${card.q}</div><div class="opts">`;card.opts.forEach((o,i)=>{let c="opt";if(lCPA&&o.ok)c+=" done c-ok";else if(lCPU===i&&!o.ok&&lCPH)c+=" c-no";else if(lCPA)c+=" done";h+=`<button class="${c}" onclick="chkCP(${i})"><span class="opt-ltr">${lCPA&&o.ok?"✓":lCPU===i&&!o.ok&&lCPH?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`});h+=`</div>`;if(lCPH&&!lCPA)h+=`<div class="hint-box"><div class="hint-t">💡 Hint</div>${card.hint}</div><div class="btn-row"><button class="nav-btn" onclick="retryCP()">Try Again</button></div>`;if(lCPA)h+=`<div class="fb fb-ok" style="margin-top:12px">✓ Nice!</div>${card.expl?`<div class="sol" style="margin-top:8px"><div class="sol-tag">Why</div><div class="stp">${card.expl}</div></div>`:""}`;h+=`</div>`}h+=`<div class="btn-row" style="justify-content:space-between;margin-top:20px"><button class="nav-btn" onclick="prevC()" ${lIdx===0?"disabled":""}>← Prev</button>`;if(card.type==="checkpoint"&&!lCPA)h+=`<span style="font:400 11px var(--f);color:var(--dim)">Answer to continue</span>`;else h+=`<button class="nav-btn primary" onclick="nextC()">${lIdx+1>=lesson.cards.length?"Start Quiz →":"Continue →"}</button>`;h+=`</div></div></div>`;el.innerHTML=h}

// ========== CHEATSHEET ==========
function renderCS(){renderCtrls();let h=`<div class="cs-sec">⚡ Redox & Electrochemistry — All Concepts</div>`;CS.forEach(c=>{h+=`<div class="cs-card"><div class="cs-title">${c.title}</div><div class="cs-fm">${c.fm.join("<br>")}</div><div class="cs-lb">Key Points</div><div class="cs-vr">${c.vr.replace(/\n/g,"<br>")}</div><div class="cs-lb">Example</div><div class="cs-ex"><div style="font:400 12px/1.5 var(--f);color:var(--mut);margin-bottom:4px">${c.ex.q}</div>${c.ex.st.map(s=>`<div class="stp">${s}</div>`).join("")}</div></div>`});h+=`<div class="cs-sec">📖 All ${VOCAB.length} Vocabulary Terms</div>`;VOCAB.forEach((v,i)=>{h+=`<div class="cs-card" style="padding:10px 12px;margin-bottom:5px"><span style="font:700 10px var(--m);color:var(--acc);margin-right:6px">${i+1}.</span><b>${v.t}</b><span style="margin:0 6px;color:var(--dim)">—</span><span style="color:var(--mut);font-size:12px">${v.d}</span></div>`});document.getElementById("main").innerHTML=h}

renderModes();renderCtrls();genP();genV();updS();
</script>
</body>
