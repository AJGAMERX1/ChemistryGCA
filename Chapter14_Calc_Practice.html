<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 14: Solutions — Calculation Practice</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0d13;--card:rgba(255,255,255,0.025);--border:rgba(255,255,255,0.06);--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;--purple:#8b5cf6;--pl:#c4b5fd;--pg:rgba(139,92,246,0.1);--green:#34d399;--gb:rgba(52,211,153,0.05);--gbd:rgba(52,211,153,0.2);--red:#f87171;--rb:rgba(248,113,113,0.05);--rbd:rgba(248,113,113,0.2);--yellow:#fbbf24;--blue:#60a5fa;--cyan:#22d3ee;--mono:'JetBrains Mono',monospace;--serif:'Source Serif 4',Georgia,serif;--sans:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}

.hdr{padding:22px 24px 16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(139,92,246,0.03) 0%,transparent 100%)}
.hdr-in{max-width:840px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.hdr-lbl{font:700 10px/1 var(--mono);letter-spacing:.18em;color:var(--purple);margin-bottom:4px;text-transform:uppercase}
.hdr-t{font:700 24px/1.2 var(--serif);background:linear-gradient(135deg,#f1f5f9,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font:400 12px/1.5 var(--sans);color:var(--dim);margin-top:3px}
.hdr-r{display:flex;align-items:center;gap:14px}
.p-lbl{font:700 10px/1 var(--mono);color:var(--dim);margin-top:3px;text-align:center}
.btn-r{background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.15);color:var(--red);padding:7px 14px;border-radius:9px;font:600 11px var(--sans);cursor:pointer;transition:all .2s}
.btn-r:hover{background:rgba(248,113,113,0.12)}

.tabs{display:flex;gap:6px;padding:12px 24px;border-bottom:1px solid rgba(255,255,255,0.03);max-width:888px;margin:0 auto;overflow-x:auto}
.tab{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.015);color:var(--dim);font:600 12px var(--sans);cursor:pointer;white-space:nowrap;transition:all .2s;outline:none}
.tab:hover{border-color:rgba(139,92,246,0.15);color:var(--muted)}
.tab.on{border-color:rgba(139,92,246,0.3);background:rgba(139,92,246,0.08);color:var(--pl)}
.tab-d{width:7px;height:7px;border-radius:50%;display:none}.tab-d.show{display:inline-block}

.cnt{max-width:760px;margin:0 auto;padding:20px 24px 80px}
.sh{margin-bottom:22px;animation:fadeIn .3s}
.sh h2{font:700 19px/1.3 var(--serif);margin-bottom:4px}
.sh p{color:var(--dim);font:400 12.5px/1.6 var(--sans);margin-bottom:12px}
.sh-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.sh-st{font:700 11px var(--mono);color:var(--dim)}.sh-st .g{color:var(--green)}
.btn-rs{background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:7px;font:500 11px var(--sans);cursor:pointer;transition:all .2s}
.btn-rs:hover{background:rgba(255,255,255,0.06)}

/* PROBLEM CARD */
.pc{border-radius:14px;padding:24px;margin-bottom:18px;transition:all .3s;animation:fadeIn .35s ease both}
.pc-d{background:var(--card);border:1px solid var(--border)}
.pc-ok{background:var(--gb);border:1px solid var(--gbd)}
.pc-no{background:var(--rb);border:1px solid var(--rbd)}
.pc-top{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.bg{font:700 11px var(--mono);padding:4px 10px;border-radius:7px;letter-spacing:.06em}
.bg-q{background:var(--pg);color:#a78bfa}
.bg-ok{background:rgba(52,211,153,0.12);color:var(--green)}
.bg-no{background:rgba(248,113,113,0.12);color:var(--red)}
.bg-ty{background:rgba(34,211,238,0.06);color:var(--cyan);font-size:9px;letter-spacing:.1em;text-transform:uppercase}

.q-txt{color:var(--text);font:400 14.5px/1.75 var(--serif);margin-bottom:4px}
.q-txt b{color:#e2e8f0;font-weight:600}

.info-r{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}
.ib{flex:1;min-width:130px;padding:10px 14px;border-radius:10px;font:400 12px/1.7 var(--mono)}
.ib-gv{background:rgba(139,92,246,0.06);border:1px solid rgba(139,92,246,0.1);color:var(--pl)}
.ib-fm{background:rgba(34,211,238,0.06);border:1px solid rgba(34,211,238,0.1);color:var(--cyan)}
.ib-fn{background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.1);color:var(--yellow)}
.ib-l{font:700 9px var(--mono);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;display:block;opacity:.6}

/* ANSWER INPUT */
.ans-area{margin-top:16px;display:flex;align-items:stretch;gap:8px;flex-wrap:wrap}
.ans-wrap{flex:1;min-width:180px;position:relative}
.ans-inp{width:100%;padding:12px 16px;padding-right:60px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);border-radius:11px;color:var(--text);font:500 15px var(--mono);outline:none;transition:all .25s}
.ans-inp:focus{border-color:rgba(139,92,246,0.5);background:rgba(139,92,246,0.04)}
.ans-inp.ok{border-color:var(--green);background:rgba(52,211,153,0.06)}
.ans-inp.no{border-color:var(--red);background:rgba(248,113,113,0.06)}
.ans-inp::placeholder{color:rgba(255,255,255,0.15);font-weight:400}
.ans-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font:500 12px var(--mono);color:var(--dim);pointer-events:none}
.ans-btn{padding:12px 22px;border-radius:11px;border:1.5px solid rgba(139,92,246,0.3);background:rgba(139,92,246,0.1);color:var(--pl);font:700 13px var(--sans);cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.02em}
.ans-btn:hover{background:rgba(139,92,246,0.2);border-color:rgba(139,92,246,0.5)}
.ans-btn:disabled{opacity:.3;cursor:default}
.ans-btn:active:not(:disabled){animation:pop .2s}
.show-btn{padding:8px 16px;border-radius:9px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--dim);font:500 11px var(--sans);cursor:pointer;transition:all .2s;margin-top:8px}
.show-btn:hover{background:rgba(255,255,255,0.06);color:var(--muted)}

.fb{margin-top:4px;font:600 12px var(--mono);letter-spacing:.04em}
.fb-ok{color:var(--green)}.fb-no{color:var(--red)}
.fb-val{font:400 11px var(--mono);color:var(--dim);margin-top:2px}

/* SOLUTION REVEAL */
.sol{margin-top:16px;padding:18px;border-radius:11px;animation:fadeIn .3s;border:1px solid rgba(139,92,246,0.12);background:rgba(139,92,246,0.03)}
.sol-tag{font:700 10px var(--mono);letter-spacing:.1em;color:var(--purple);margin-bottom:10px;text-transform:uppercase}
.step{font:400 13px/2 var(--mono);color:var(--pl);padding:2px 0}
.step .label{color:rgba(167,139,250,0.5);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.step .hl{color:var(--cyan);font-weight:600}
.step .ans-hl{color:var(--green);font-weight:700;font-size:14px}
.sol-note{margin-top:12px;padding:12px 14px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:9px;font:400 12.5px/1.7 var(--sans);color:var(--muted)}

.done-c{text-align:center;padding:26px 20px;background:rgba(139,92,246,0.05);border:1px solid rgba(139,92,246,0.12);border-radius:14px;animation:fadeIn .4s;margin-top:6px}
.done-e{font-size:34px;margin-bottom:8px}
.done-t{font:700 17px var(--serif);margin-bottom:5px}
.done-s{font:400 13px var(--sans);color:var(--muted)}
.done-m{font:400 12px var(--sans);color:var(--dim);margin-top:2px}

@media(max-width:640px){.hdr{padding:16px 14px 12px}.tabs{padding:10px 14px}.cnt{padding:16px 14px 70px}.pc{padding:18px 14px}.info-r{flex-direction:column}.ans-area{flex-direction:column}}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div>
    <div class="hdr-lbl">Chemistry · Chapter 14</div>
    <h1 class="hdr-t">Solutions — Calculation Practice</h1>
    <div class="hdr-sub">Free-response problems · Show your work · Modeled after Examples 14-5 through 14-12</div>
  </div>
  <div class="hdr-r">
    <div><svg id="pR" width="48" height="48" style="transform:rotate(-90deg)"><circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3.5"/><circle id="pA" cx="24" cy="24" r="20" fill="none" stroke="var(--green)" stroke-width="3.5" stroke-dasharray="125.66" stroke-dashoffset="125.66" stroke-linecap="round" style="transition:all .6s"/></svg><div class="p-lbl" id="pL">0/0</div></div>
    <button class="btn-r" onclick="resetAll()">Reset All</button>
  </div>
</div></div>
<div class="tabs" id="tabs"></div>
<div class="cnt" id="main"></div>

<script>
const SEC=[
  {id:"14.2a",title:"Molarity (c = n/V)",icon:"📐",desc:"Find molarity, moles, volume, and mass — like Examples 14-5, 14-6, 14-7 and Section Review 5a–5d"},
  {id:"14.2b",title:"Dilution & Mass/Volume Fraction",icon:"🧫",desc:"Dilution (c₁V₁ = c₂V₂) like Example 14-8, plus mass fraction and volume fraction"},
  {id:"14.2c",title:"Molality (b = n/m)",icon:"⚖️",desc:"Molality calculations — like Example 14-9 and Section Review 7a–7d"},
  {id:"14.3",title:"Colligative Properties",icon:"🌡️",desc:"Boiling point elevation and freezing point depression — like Examples 14-10, 14-11, 14-12 and Section Review 4–5"}
];

const Q={
"14.2a":[
  // Like Ex 14-5: find molarity
  {id:"a1",ref:"Like Example 14-5",
   q:"What is the amount concentration (molarity) of a solution that contains <b>4.80 mol</b> of KBr in <b>600.0 mL</b> of solution?",
   given:"n = 4.80 mol\nV = 600.0 mL = 0.6000 L",formula:"c = n / V",find:"c = ? M",
   unit:"M",answer:8.00,tol:0.02,
   steps:["<span class='label'>CONVERT</span>  600.0 mL → 0.6000 L","<span class='label'>FORMULA</span>  c = n / V","<span class='label'>SOLVE</span>  c = 4.80 mol ÷ 0.6000 L","<span class='label'>ANSWER</span>  <span class='ans-hl'>c = 8.00 M</span>"],
   note:"Always convert mL → L first. Then it's a simple division: moles ÷ liters = molarity."
  },
  // Like Ex 14-5 variant
  {id:"a2",ref:"Like Example 14-5",
   q:"A chemist prepares a solution by dissolving <b>1.25 mol</b> of NaCl in enough water to make <b>350 mL</b> of solution. What is the molarity?",
   given:"n = 1.25 mol\nV = 350 mL = 0.350 L",formula:"c = n / V",find:"c = ? M",
   unit:"M",answer:3.57,tol:0.02,
   steps:["<span class='label'>CONVERT</span>  350 mL → 0.350 L","<span class='label'>FORMULA</span>  c = n / V","<span class='label'>SOLVE</span>  c = 1.25 mol ÷ 0.350 L","<span class='label'>ANSWER</span>  <span class='ans-hl'>c = 3.57 M</span>"],
   note:"1.25 ÷ 0.350 = 3.571... Round to 3 sig figs → 3.57 M."
  },
  // Like Ex 14-6: find moles
  {id:"a3",ref:"Like Example 14-6",
   q:"You have <b>0.850 L</b> of a <b>2.40 M</b> H₂SO₄ solution. How many moles of H₂SO₄ does it contain?",
   given:"V = 0.850 L\nc = 2.40 M",formula:"n = c × V",find:"n = ? mol",
   unit:"mol",answer:2.04,tol:0.01,
   steps:["<span class='label'>FORMULA</span>  n = c × V","<span class='label'>SOLVE</span>  n = 2.40 mol/L × 0.850 L","<span class='label'>ANSWER</span>  <span class='ans-hl'>n = 2.04 mol</span>"],
   note:"Rearrange c = n/V → n = c × V. Multiply molarity by volume in liters."
  },
  // Like Ex 14-6 variant
  {id:"a4",ref:"Like Example 14-6",
   q:"A beaker contains <b>425 mL</b> of <b>0.750 M</b> KNO₃ solution. How many moles of KNO₃ are present?",
   given:"V = 425 mL = 0.425 L\nc = 0.750 M",formula:"n = c × V",find:"n = ? mol",
   unit:"mol",answer:0.319,tol:0.002,
   steps:["<span class='label'>CONVERT</span>  425 mL → 0.425 L","<span class='label'>FORMULA</span>  n = c × V","<span class='label'>SOLVE</span>  n = 0.750 × 0.425 = 0.31875","<span class='label'>ANSWER</span>  <span class='ans-hl'>n = 0.319 mol</span>"],
   note:"Don't forget to convert mL to L before multiplying!"
  },
  // Like Ex 14-7: find volume
  {id:"a5",ref:"Like Example 14-7",
   q:"A reaction requires <b>0.450 mol</b> of NaOH. How many <b>milliliters</b> of a <b>1.50 M</b> NaOH solution should be used?",
   given:"n = 0.450 mol\nc = 1.50 M",formula:"V = n / c",find:"V = ? mL",
   unit:"mL",answer:300,tol:1,
   steps:["<span class='label'>FORMULA</span>  V = n / c","<span class='label'>SOLVE</span>  V = 0.450 mol ÷ 1.50 mol/L = 0.300 L","<span class='label'>CONVERT</span>  0.300 L × 1000 = 300 mL","<span class='label'>ANSWER</span>  <span class='ans-hl'>V = 300 mL</span>"],
   note:"Solve in liters first, then convert to mL at the end."
  },
  // Like Ex 14-7 variant
  {id:"a6",ref:"Like Example 14-7",
   q:"A lab procedure needs <b>0.220 mol</b> of CaCl₂. How many <b>milliliters</b> of a <b>0.880 M</b> CaCl₂ solution are required?",
   given:"n = 0.220 mol\nc = 0.880 M",formula:"V = n / c",find:"V = ? mL",
   unit:"mL",answer:250,tol:1,
   steps:["<span class='label'>FORMULA</span>  V = n / c","<span class='label'>SOLVE</span>  V = 0.220 ÷ 0.880 = 0.250 L","<span class='label'>CONVERT</span>  0.250 L = 250 mL","<span class='label'>ANSWER</span>  <span class='ans-hl'>V = 250 mL</span>"],
   note:"V = n/c = 0.220/0.880 = 0.250 L = 250 mL."
  },
  // Like Section Review 5c: find mass of solute from molarity
  {id:"a7",ref:"Like Review 5c",
   q:"What mass of KCl (<b>molar mass = 74.55 g/mol</b>) should you measure to prepare <b>0.400 L</b> of <b>1.25 M</b> KCl solution?",
   given:"V = 0.400 L\nc = 1.25 M\nMW = 74.55 g/mol",formula:"n = c × V\nm = n × MW",find:"m = ? g",
   unit:"g",answer:37.3,tol:0.2,
   steps:["<span class='label'>STEP 1</span>  Find moles: n = c × V = 1.25 × 0.400 = 0.500 mol","<span class='label'>STEP 2</span>  Convert to grams: m = n × MW","<span class='label'>SOLVE</span>  m = 0.500 mol × 74.55 g/mol = 37.275 g","<span class='label'>ANSWER</span>  <span class='ans-hl'>m = 37.3 g KCl</span>"],
   note:"Two-step problem: (1) find moles from molarity, (2) convert moles → grams using molar mass."
  },
  // Like Section Review 5d: find volume from mass + molarity
  {id:"a8",ref:"Like Review 5d",
   q:"What volume of solution (in <b>liters</b>) will produce a <b>2.00 M</b> NaOH solution using <b>60.0 g</b> NaOH? (Molar mass = 40.00 g/mol)",
   given:"m = 60.0 g\nMW = 40.00 g/mol\nc = 2.00 M",formula:"n = m / MW\nV = n / c",find:"V = ? L",
   unit:"L",answer:0.750,tol:0.002,
   steps:["<span class='label'>STEP 1</span>  Grams → moles: n = 60.0 ÷ 40.00 = 1.50 mol","<span class='label'>STEP 2</span>  V = n / c = 1.50 mol ÷ 2.00 M","<span class='label'>ANSWER</span>  <span class='ans-hl'>V = 0.750 L</span>"],
   note:"Convert grams to moles first (n = m/MW), then use V = n/c."
  }
],
"14.2b":[
  // Like Ex 14-8: dilution
  {id:"b1",ref:"Like Example 14-8",
   q:"You need <b>500 mL</b> of <b>3.00 M</b> HCl. Your stock solution is <b>12.0 M</b> HCl. What volume of stock solution (in <b>mL</b>) do you need?",
   given:"c₁ = 12.0 M (stock)\nc₂ = 3.00 M (desired)\nV₂ = 500 mL",formula:"c₁V₁ = c₂V₂\nV₁ = c₂V₂ / c₁",find:"V₁ = ? mL",
   unit:"mL",answer:125,tol:1,
   steps:["<span class='label'>FORMULA</span>  c₁V₁ = c₂V₂","<span class='label'>REARRANGE</span>  V₁ = (c₂ × V₂) / c₁","<span class='label'>SOLVE</span>  V₁ = (3.00 × 500) / 12.0 = 1500 / 12.0","<span class='label'>ANSWER</span>  <span class='ans-hl'>V₁ = 125 mL</span>","Then add water to bring total volume to 500 mL."],
   note:"The dilution equation keeps the total amount of solute constant. You'd measure 125 mL of stock and add water up to 500 mL."
  },
  {id:"b2",ref:"Like Example 14-8",
   q:"A scientist needs to dilute a <b>15.0 M</b> NH₃ stock solution to make <b>2.00 L</b> of <b>0.500 M</b> NH₃. How many <b>mL</b> of stock solution does she need?",
   given:"c₁ = 15.0 M\nc₂ = 0.500 M\nV₂ = 2.00 L = 2000 mL",formula:"c₁V₁ = c₂V₂",find:"V₁ = ? mL",
   unit:"mL",answer:66.7,tol:0.2,
   steps:["<span class='label'>FORMULA</span>  V₁ = (c₂ × V₂) / c₁","<span class='label'>SOLVE</span>  V₁ = (0.500 × 2000) / 15.0 = 1000 / 15.0","<span class='label'>ANSWER</span>  <span class='ans-hl'>V₁ = 66.7 mL</span>"],
   note:"Note: you can use mL on both sides OR L on both sides — just be consistent."
  },
  {id:"b3",ref:"Like Example 14-8",
   q:"You dilute <b>50.0 mL</b> of <b>6.00 M</b> HNO₃ with water to make <b>400.0 mL</b> of solution. What is the <b>molarity</b> of the diluted solution?",
   given:"c₁ = 6.00 M\nV₁ = 50.0 mL\nV₂ = 400.0 mL",formula:"c₁V₁ = c₂V₂\nc₂ = c₁V₁ / V₂",find:"c₂ = ? M",
   unit:"M",answer:0.750,tol:0.002,
   steps:["<span class='label'>FORMULA</span>  c₂ = (c₁ × V₁) / V₂","<span class='label'>SOLVE</span>  c₂ = (6.00 × 50.0) / 400.0 = 300 / 400","<span class='label'>ANSWER</span>  <span class='ans-hl'>c₂ = 0.750 M</span>"],
   note:"This is a dilution solved for the final concentration instead of the initial volume. Same formula, different unknown."
  },
  // Mass fraction
  {id:"b4",ref:"Like Review #2",
   q:"What is the <b>mass fraction (%)</b> of a solution made by dissolving <b>25.0 g</b> of NaCl in <b>475.0 g</b> of H₂O?",
   given:"m_solute = 25.0 g\nm_solvent = 475.0 g\nm_solution = 500.0 g",formula:"w = (m_solute / m_solution) × 100%",find:"w = ? %",
   unit:"%",answer:5.00,tol:0.01,
   steps:["<span class='label'>STEP 1</span>  Total solution mass = 25.0 + 475.0 = 500.0 g","<span class='label'>FORMULA</span>  w = (m_solute / m_solution) × 100%","<span class='label'>SOLVE</span>  w = (25.0 / 500.0) × 100% = 5.00%","<span class='label'>ANSWER</span>  <span class='ans-hl'>w = 5.00%</span>"],
   note:"Remember: the denominator is the SOLUTION mass (solute + solvent), not just the solvent."
  },
  {id:"b5",ref:"Like Review #2",
   q:"A solution is prepared by dissolving <b>8.50 g</b> of KNO₃ in <b>91.5 g</b> of water. Calculate the <b>mass fraction (%)</b>.",
   given:"m_solute = 8.50 g\nm_solvent = 91.5 g",formula:"w = (m_solute / m_solution) × 100%",find:"w = ? %",
   unit:"%",answer:8.50,tol:0.02,
   steps:["<span class='label'>STEP 1</span>  m_solution = 8.50 + 91.5 = 100.0 g","<span class='label'>SOLVE</span>  w = (8.50 / 100.0) × 100% = 8.50%","<span class='label'>ANSWER</span>  <span class='ans-hl'>w = 8.50%</span>"],
   note:"Convenient numbers here — the solution mass is exactly 100.0 g, making the percent easy to calculate."
  },
  // Volume fraction
  {id:"b6",ref:"Like Review #3",
   q:"A bottle of cleaning solution has a volume of <b>750.0 mL</b> and a <b>15.0%</b> volume fraction of isopropyl alcohol. How many <b>mL</b> of alcohol does it contain?",
   given:"V_solution = 750.0 mL\nφ = 15.0% = 0.150",formula:"V_solute = φ × V_solution",find:"V_solute = ? mL",
   unit:"mL",answer:112.5,tol:0.5,
   steps:["<span class='label'>CONVERT</span>  15.0% = 0.150","<span class='label'>FORMULA</span>  V_solute = φ × V_solution","<span class='label'>SOLVE</span>  V_solute = 0.150 × 750.0 = 112.5 mL","<span class='label'>ANSWER</span>  <span class='ans-hl'>V_solute = 112.5 mL</span>"],

let active="14.2a",ans={},shown={};
function total(){let t=0;for(let k in Q)t+=Q[k].length;return t}
function tAns(){return Object.keys(ans).length}
function tCorr(){let c=0;for(let k in ans)if(ans[k])c++;return c}
function sAns(s){return Object.keys(ans).filter(k=>k.startsWith(s+"-")).length}
function sCorr(s){let c=0;Object.keys(ans).filter(k=>k.startsWith(s+"-")).forEach(k=>{if(ans[k])c++});return c}

function updP(){
  const t=total(),a=tAns(),c=tCorr(),p=t?c/t:0,ci=2*Math.PI*20;
  document.getElementById("pA").setAttribute("stroke-dashoffset",ci*(1-p));
  document.getElementById("pA").setAttribute("stroke",p>=.7?"var(--green)":p>=.4?"var(--yellow)":"var(--red)");
  document.getElementById("pL").textContent=a+"/"+t;
}

function renderTabs(){
  const el=document.getElementById("tabs");el.innerHTML="";
  SEC.forEach(s=>{
    const on=s.id===active,qs=Q[s.id],a=sAns(s.id),cr=sCorr(s.id),dn=a===qs.length;
    const b=document.createElement("button");b.className="tab"+(on?" on":"");
    const dc=dn?(cr/qs.length>=.7?"var(--green)":"var(--yellow)"):"transparent";
    b.innerHTML=`<span style="font-size:15px">${s.icon}</span><span>${s.title}</span><span class="tab-d${dn?" show":""}" style="background:${dc}"></span>`;
    b.onclick=()=>{active=s.id;render()};el.appendChild(b);
  });
}

function checkAns(idx){
  const q=Q[active][idx],k=active+"-"+idx;
  if(ans[k]!==undefined)return;
  const inp=document.getElementById("inp-"+idx);
  const v=parseFloat(inp.value);
  if(isNaN(v)){inp.style.borderColor="var(--red)";return}
  const ok=Math.abs(v-q.answer)<=q.tol;
  ans[k]=ok;
  render();
}

function showSol(idx){
  const k=active+"-"+idx;
  shown[k]=true;
  if(ans[k]===undefined)ans[k]=false;
  render();
}

function rstSec(){
  Object.keys(ans).filter(k=>k.startsWith(active+"-")).forEach(k=>{delete ans[k];delete shown[k]});
  render();
}
function resetAll(){ans={};shown={};render()}

function renderMain(){
  const el=document.getElementById("main");
  const sec=SEC.find(s=>s.id===active);
  const qs=Q[active],a=sAns(active),cr=sCorr(active);
  let h=`<div class="sh"><h2>${sec.icon} ${sec.title}</h2><p>${sec.desc}</p>
    <div class="sh-bar"><span class="sh-st">${a}/${qs.length} answered · <span class="g">${cr} correct</span></span>
    <button class="btn-rs" onclick="rstSec()">Reset Section</button></div></div>`;

  qs.forEach((q,i)=>{
    const k=active+"-"+i,done=ans[k]!==undefined,ok=ans[k]===true,vis=shown[k]||done;
    const cc=done?(ok?"pc-ok":"pc-no"):"pc-d";
    const bc=done?(ok?"bg-ok":"bg-no"):"bg-q";

    h+=`<div class="pc ${cc}" style="animation-delay:${i*.04}s">
      <div class="pc-top"><span class="bg ${bc}">Problem ${i+1}</span><span class="bg bg-ty">${q.ref}</span></div>
      <div class="q-txt">${q.q}</div>
      <div class="info-r">
        <div class="ib ib-gv"><span class="ib-l">Given</span>${q.given.replace(/\n/g,"<br>")}</div>
        <div class="ib ib-fm"><span class="ib-l">Formula</span>${q.formula.replace(/\n/g,"<br>")}</div>
        <div class="ib ib-fn"><span class="ib-l">Find</span>${q.find.replace(/\n/g,"<br>")}</div>
      </div>`;

    if(!done){
      h+=`<div class="ans-area">
        <div class="ans-wrap">
          <input class="ans-inp" id="inp-${i}" type="text" inputmode="decimal" placeholder="Type your answer…"
            onkeydown="if(event.key==='Enter')checkAns(${i})">
          <span class="ans-unit">${q.unit}</span>
        </div>
        <button class="ans-btn" onclick="checkAns(${i})">Check</button>
      </div>
      <button class="show-btn" onclick="showSol(${i})">Show Solution</button>`;
    } else {
      const stored = document.getElementById("inp-"+i);
      h+=`<div class="fb ${ok?"fb-ok":"fb-no"}">${ok?"✓ Correct!":"✗ Not quite"}</div>`;
      if(!ok)h+=`<div class="fb-val">Correct answer: ${q.answer} ${q.unit}</div>`;
    }

    if(vis){
      h+=`<div class="sol"><div class="sol-tag">Step-by-Step Solution</div>`;
      q.steps.forEach(s=>{h+=`<div class="step">${s}</div>`});
      h+=`<div class="sol-note">${q.note}</div></div>`;
    }
    h+=`</div>`;
  });

  if(a===qs.length){
    const p=cr/qs.length;
    const emoji=p>=.8?"🎉":p>=.5?"💪":"📚";
    const msg=p>=.8?"Outstanding! You nailed these calculations.":p>=.5?"Good work! Review the step-by-step solutions for the ones you missed.":"Keep practicing! Study each solution, then reset and try again.";
    h+=`<div class="done-c"><div class="done-e">${emoji}</div><div class="done-t">Section Complete!</div>
      <div class="done-s">Score: <span style="color:${p>=.7?"var(--green)":"var(--yellow)"}; font-weight:700">${cr}/${qs.length}</span></div>
      <div class="done-m">${msg}</div></div>`;
  }
  el.innerHTML=h;el.scrollTop=0;
}

function render(){renderTabs();renderMain();updP()}
render();
</script>
