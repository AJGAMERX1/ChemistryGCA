.cs-sec{font:700 11px var(--m);letter-spacing:.1em;color:var(--org);text-transform:uppercase;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(245,158,11,0.15)}

<div class="hdr"><div class="hdr-in">
<div><div class="hdr-lab">Chapter 15 · Complete Study Tool</div><h1 class="hdr-t"><i>Thermochemistry</i> — Practice & Review</h1></div>
<div class="hdr-r"><div class="stats">
<div class="stat-box"><div class="stat-n" id="sC">0</div><div class="stat-l">Correct</div></div>
<div class="stat-box"><div class="stat-n" id="sA">0</div><div class="stat-l">Attempted</div></div>
<div class="stat-box"><div class="stat-n pct-n" id="sP">—</div><div class="stat-l">Accuracy</div></div>
<div class="stat-box"><div class="stat-n streak-n" id="sS"><span id="fire">🔥</span> 0</div><div class="stat-l">Streak</div></div>
</div><button class="btn-r" onclick="resetStats()">Reset</button></div>
</div></div>

<script>
function R(a,b,d){d=d||0;const f=Math.pow(10,d);return Math.round((Math.random()*(b-a)+a)*f)/f}
function rd(v,d){return Math.round(v*Math.pow(10,d))/Math.pow(10,d)}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

// ========== VOCAB (15 terms from PDF) ==========
const VOCAB=[
{t:"thermochemistry",d:"the branch of science that studies the transfer of energy during phase or chemical changes"},
{t:"thermal energy",d:"the total kinetic energy of the particles within a substance"},
{t:"temperature",d:"the average kinetic energy in the particles of a sample; measured in °C or K"},
{t:"heat",d:"the amount of thermal energy transferred from one substance to another; measured in joules (J)"},
{t:"enthalpy",d:"the thermal energy content of a system at a constant pressure; symbol H"},
{t:"calorimeter",d:"an insulated container in which a thermometer detects the temperature change during a chemical reaction"},
{t:"sensible heat",d:"the transfer of thermal energy that produces a temperature change in a substance"},
{t:"latent heat",d:"the transfer of thermal energy that produces a phase change without producing a temperature change"},
{t:"molar enthalpy of fusion",d:"the quantity of energy required to melt one mole of a solid to a liquid with no temperature change; symbol ΔHfus"},
{t:"molar enthalpy of vaporization",d:"the quantity of energy required to vaporize one mole of a liquid to a gas with no temperature change; symbol ΔHvap"},
{t:"specific heat",d:"the amount of thermal energy required to raise the temperature of 1 g of a substance by 1 °C; symbol csp; units J/(g·°C)"},
{t:"enthalpy of reaction",d:"the change in enthalpy that occurs during a reaction; symbol ΔHr; positive = endothermic, negative = exothermic"},
{t:"thermochemical equation",d:"a chemical equation that shows reactants, products, and the amount of energy released or absorbed as heat"},
{t:"standard molar enthalpy of formation",d:"the enthalpy change to produce 1 mol of a compound in its standard state from its elements in their standard states; symbol ΔH°f"},
{t:"standard molar enthalpy of combustion",d:"the thermal energy released by the complete burning of 1 mol of a substance at standard conditions; symbol ΔH°c"},
{t:"Hess's law",d:"the enthalpy change of a reaction equals the sum of the enthalpy changes for each step of the process"},
{t:"entropy",d:"a measure of the dispersal of energy in a system; symbol S; positive ΔS = more favorable"},
{t:"Gibbs free energy",d:"combines ΔH and ΔS to determine spontaneity; ΔG = ΔH − TΔS; negative ΔG = spontaneous"}
];

// ========== SUBSTANCE DATABASE ==========
const SUBS=[
{name:"water",f:"H₂O",mw:18.02,csp:4.18,dhfus:6.01,dhvap:40.7},
{name:"ethanol",f:"C₂H₅OH",mw:46.07,csp:2.44,dhfus:4.93,dhvap:38.6},
{name:"methanol",f:"CH₃OH",mw:32.04,csp:2.53,dhfus:3.22,dhvap:35.3},
{name:"silver",f:"Ag",mw:107.87,csp:0.23,dhfus:11.3,dhvap:250.6},
{name:"copper",f:"Cu",mw:63.55,csp:0.39,dhfus:13.1,dhvap:300.3},
{name:"iron",f:"Fe",mw:55.85,csp:0.45,dhfus:13.8,dhvap:340.0},
{name:"aluminum",f:"Al",mw:26.98,csp:0.90,dhfus:10.7,dhvap:293.0},
{name:"gold",f:"Au",mw:196.97,csp:0.13,dhfus:12.6,dhvap:324.0},
{name:"lead",f:"Pb",mw:207.2,csp:0.13,dhfus:4.77,dhvap:179.5}
];
function rSub(){return pick(SUBS)}
function rMetal(){return pick(SUBS.filter(s=>s.csp<2))}

// ========== Hess's Law / ΔH°f DATA ==========
const RXNS=[
{name:"combustion of methane",eq:"CH₄(g) + 2O₂(g) → CO₂(g) + 2H₂O(l)",hf_prod:[{n:"CO₂",v:-393.5,coef:1},{n:"H₂O(l)",v:-285.8,coef:2}],hf_react:[{n:"CH₄",v:-74.6,coef:1},{n:"O₂",v:0,coef:2}]},
{name:"formation of ammonia",eq:"N₂(g) + 3H₂(g) → 2NH₃(g)",hf_prod:[{n:"NH₃",v:-45.9,coef:2}],hf_react:[{n:"N₂",v:0,coef:1},{n:"H₂",v:0,coef:3}]},
{name:"decomposition of calcium hydroxide",eq:"Ca(OH)₂(s) → CaO(s) + H₂O(g)",hf_prod:[{n:"CaO",v:-634.9,coef:1},{n:"H₂O(g)",v:-241.8,coef:1}],hf_react:[{n:"Ca(OH)₂",v:-985.2,coef:1}]},
{name:"formation of water",eq:"2H₂(g) + O₂(g) → 2H₂O(l)",hf_prod:[{n:"H₂O(l)",v:-285.8,coef:2}],hf_react:[{n:"H₂",v:0,coef:2},{n:"O₂",v:0,coef:1}]}
];

// ========== Gibbs free energy DATA ==========
const GIBBS=[
{eq:"2Ag(s)+S(s)→Ag₂S(s)",dh:-32.6,sp:[{n:"Ag₂S",v:144.0}],sr:[{n:"Ag",v:42.6,c:2},{n:"S",v:32.1,c:1}],T:298},
{eq:"2C(s)+H₂(g)→C₂H₂(g)",dh:227.4,sp:[{n:"C₂H₂",v:200.9}],sr:[{n:"C",v:5.7,c:2},{n:"H₂",v:130.7,c:1}],T:298},
{eq:"2C(s)+2H₂(g)→C₂H₄(g)",dh:52.4,sp:[{n:"C₂H₄",v:219.3}],sr:[{n:"C",v:5.7,c:2},{n:"H₂",v:130.7,c:2}],T:298}
];

// ========== SECTIONS ==========
const SEC=[
{id:"specific_heat",title:"Specific Heat",icon:"🔥",types:[{id:"find_Q",name:"Find Q"},{id:"find_Tf",name:"Find Tf"},{id:"find_m_from_Q",name:"Find mass"},{id:"find_csp",name:"Find csp"}]},
{id:"enthalpy",title:"Enthalpy (Fusion/Vap)",icon:"🧊",types:[{id:"melt_energy",name:"Energy to melt"},{id:"boil_energy",name:"Energy to boil"},{id:"heating_curve",name:"Full heating curve"}]},
{id:"hess",title:"Hess's Law (ΔH°r)",icon:"⚗️",types:[{id:"hess_calc",name:"ΔH°r from ΔH°f"}]},
{id:"gibbs",title:"Entropy & Gibbs",icon:"⚡",types:[{id:"entropy_calc",name:"Calculate ΔS°"},{id:"gibbs_calc",name:"Calculate ΔG"}]}
];

// ========== GENERATORS ==========
const G={
// --- SPECIFIC HEAT: Q = csp × m × ΔT ---
find_Q(){
  const s=rMetal(),m=R(10,200,1),ti=R(10,40,1),tf=R(50,200,1),dt=rd(tf-ti,1),Q=rd(s.csp*m*dt,1);
  return{ref:"Ex 15-2",q:`A <b>${m} g</b> sample of ${s.name} (${s.f}) is heated from <b>${ti} °C</b> to <b>${tf} °C</b>. How many joules were added? (c_sp = ${s.csp} J/g·°C)`,gv:`m = ${m} g\nT_i = ${ti} °C, T_f = ${tf} °C\nc_sp = ${s.csp} J/g·°C`,fm:`Q = c_sp × m × ΔT`,fi:`Q = ? J`,u:"J",a:Q,tol:Math.max(Math.abs(Q)*0.02,1),
  st:[`<span class='lb'>ΔT</span> = ${tf} − ${ti} = ${dt} °C`,`<span class='lb'>Q</span> = ${s.csp} × ${m} × ${dt}`,`<span class='lb'>ANSWER</span> <span class='ans'>Q = ${Q} J</span>`],nt:`Q = c_sp × m × ΔT. Negative Q means heat is lost.`}
},
find_Tf(){
  const s=pick([SUBS[0],SUBS[1]]),m=R(20,200,1),ti=R(15,35,1),Q=R(200,5000,0),dt=rd(Q/(s.csp*m),1),tf=rd(ti+dt,1);
  return{ref:"Ex 15-3",q:`If <b>${Q} J</b> of thermal energy is added to <b>${m} g</b> of ${s.name} at <b>${ti} °C</b>, what is the final temperature? (c_sp = ${s.csp} J/g·°C)`,gv:`Q = ${Q} J\nc_sp = ${s.csp}, m = ${m} g\nT_i = ${ti} °C`,fm:`Q = c_sp × m × ΔT\nΔT = Q / (c_sp × m)\nT_f = T_i + ΔT`,fi:`T_f = ? °C`,u:"°C",a:tf,tol:Math.max(Math.abs(tf)*0.02,0.3),
  st:[`<span class='lb'>ΔT</span> = ${Q} / (${s.csp} × ${m}) = ${Q} / ${rd(s.csp*m,2)} = ${dt} °C`,`<span class='lb'>T_f</span> = ${ti} + ${dt} = <span class='ans'>${tf} °C</span>`],nt:`Rearrange Q = c_sp·m·ΔT → ΔT = Q/(c_sp·m), then add to T_i.`}
},
find_m_from_Q(){
  const s=rMetal(),Q=R(500,8000,0),ti=R(20,40,1),tf=R(60,150,1),dt=rd(tf-ti,1),m=rd(Q/(s.csp*dt),1);
  return{ref:"Reverse Ex 15-2",q:`A sample of ${s.name} (c_sp = ${s.csp} J/g·°C) absorbs <b>${Q} J</b> as it heats from <b>${ti} °C</b> to <b>${tf} °C</b>. What is the mass of the sample?`,gv:`Q = ${Q} J\nc_sp = ${s.csp}\nT_i = ${ti}, T_f = ${tf} °C`,fm:`Q = c_sp × m × ΔT\nm = Q / (c_sp × ΔT)`,fi:`m = ? g`,u:"g",a:m,tol:Math.max(m*0.02,0.5),

// --- HESS'S LAW ---
hess_calc(){
  const r=pick(RXNS);
  const sumProd=rd(r.hf_prod.reduce((s,p)=>s+p.v*p.coef,0),1);
  const sumReact=rd(r.hf_react.reduce((s,p)=>s+p.v*p.coef,0),1);
  const dhr=rd(sumProd-sumReact,1);
  const prodStr=r.hf_prod.map(p=>`${p.coef>1?p.coef+'×':''}ΔH°f(${p.n})=${p.coef>1?p.coef+'×':''}(${p.v})`).join(' + ');
  const reactStr=r.hf_react.map(p=>`${p.coef>1?p.coef+'×':''}ΔH°f(${p.n})=${p.coef>1?p.coef+'×':''}(${p.v})`).join(' + ');
  return{ref:"Ex 15-6",q:`Calculate ΔH°r for the ${r.name}:<br><b>${r.eq}</b><br><span style="color:var(--dim);font-size:12px">${r.hf_prod.map(p=>`ΔH°f(${p.n})=${p.v}`).join(', ')}, ${r.hf_react.map(p=>`ΔH°f(${p.n})=${p.v}`).join(', ')} kJ/mol</span>`,gv:r.hf_prod.map(p=>`ΔH°f(${p.n})=${p.v}`).join('\n')+'\n'+r.hf_react.map(p=>`ΔH°f(${p.n})=${p.v}`).join('\n'),fm:`ΔH°r = ΣΔH°f(products) − ΣΔH°f(reactants)`,fi:`ΔH°r = ? kJ`,u:"kJ",a:dhr,tol:Math.max(Math.abs(dhr)*0.02,0.5),
  st:[`<span class='lb'>PRODUCTS</span> ${prodStr} = ${sumProd} kJ`,`<span class='lb'>REACTANTS</span> ${reactStr} = ${sumReact} kJ`,`<span class='lb'>ΔH°r</span> = ${sumProd} − (${sumReact}) = <span class='ans'>${dhr} kJ</span>`,`<span class='lb'>TYPE</span> ${dhr<0?'Exothermic (−)':'Endothermic (+)'}`],nt:`ΔH°r = ΣΔH°f(products) − ΣΔH°f(reactants). Elements in standard state have ΔH°f = 0.`}
},

// --- ENTROPY & GIBBS ---
entropy_calc(){
  const g=pick(GIBBS);
  const sp=g.sp.reduce((s,p)=>s+p.v,0);
  const sr=g.sr.reduce((s,p)=>s+p.v*p.c,0);
  const ds=rd(sp-sr,1);
  return{ref:"Ex 15-7",q:`Calculate ΔS° for: <b>${g.eq}</b><br><span style="color:var(--dim);font-size:12px">${g.sp.map(p=>`S°(${p.n})=${p.v}`).join(', ')}, ${g.sr.map(p=>`S°(${p.n})=${p.v}`).join(', ')} J/mol·K</span>`,gv:g.sp.map(p=>`S°(${p.n})=${p.v}`).join('\n')+'\n'+g.sr.map(p=>`S°(${p.n})=${p.v}`).join('\n'),fm:`ΔS° = ΣS°(products) − ΣS°(reactants)`,fi:`ΔS° = ? J/K`,u:"J/K",a:ds,tol:Math.max(Math.abs(ds)*0.02,0.5),
  st:[`<span class='lb'>PRODUCTS</span> ${sp} J/K`,`<span class='lb'>REACTANTS</span> ${g.sr.map(p=>`${p.c}×${p.v}`).join(' + ')} = ${rd(sr,1)} J/K`,`<span class='lb'>ΔS°</span> = ${sp} − ${rd(sr,1)} = <span class='ans'>${ds} J/K</span>`,`<span class='lb'>TENDENCY</span> ${ds>0?'Favorable (+ΔS)':'Unfavorable (−ΔS)'}`],nt:`ΔS = products − reactants. +ΔS is favorable.`}
},
gibbs_calc(){
  const g=pick(GIBBS);
  const sp=g.sp.reduce((s,p)=>s+p.v,0);
  const sr=g.sr.reduce((s,p)=>s+p.v*p.c,0);
  const ds=rd(sp-sr,1); // J/K
  const dsKj=rd(ds/1000,4); // kJ/K
  const dg=rd(g.dh-g.T*dsKj,1); // kJ
  return{ref:"Ex 15-8",q:`Calculate ΔG° at ${g.T} K for: <b>${g.eq}</b><br><span style="color:var(--dim);font-size:12px">ΔH°=${g.dh} kJ, ${g.sp.map(p=>`S°(${p.n})=${p.v}`).join(', ')}, ${g.sr.map(p=>`S°(${p.n})=${p.v}`).join(', ')} J/mol·K</span>`,gv:`ΔH° = ${g.dh} kJ\nΔS° = ${ds} J/K = ${dsKj} kJ/K\nT = ${g.T} K`,fm:`ΔG = ΔH − TΔS`,fi:`ΔG = ? kJ`,u:"kJ",a:dg,tol:Math.max(Math.abs(dg)*0.03,0.5),
  st:[`<span class='lb'>ΔS°</span> = ${sp} − ${rd(sr,1)} = ${ds} J/K = ${dsKj} kJ/K`,`<span class='lb'>ΔG</span> = ΔH − TΔS = ${g.dh} − (${g.T} × ${dsKj})`,`<span class='lb'>ΔG</span> = ${g.dh} − ${rd(g.T*dsKj,1)} = <span class='ans'>${dg} kJ</span>`,`<span class='lb'>RESULT</span> ${dg<0?'Spontaneous (−ΔG)':'Nonspontaneous (+ΔG)'}`],nt:`ΔG = ΔH − TΔS. Convert ΔS from J/K to kJ/K first! Negative ΔG = spontaneous.`}
}
};

// VOCAB
function genV(){vAns=false;vUA=null;if(vMode==="mc")genVMC();else if(vMode==="tf")genVTF();else genVW();renderCtrls();renderVocab()}
function genVMC(){const c=pick(VOCAB),wr=shuffle(VOCAB.filter(v=>v.t!==c.t)).slice(0,3),askT=Math.random()<0.5,opts=shuffle([c,...wr]);vQ={type:"mc",c,opts,askT,ci:opts.indexOf(c)}}
function genVTF(){const c=pick(VOCAB),isT=Math.random()<0.5;let sd;if(isT)sd=c.d;else{sd=pick(VOCAB.filter(v=>v.t!==c.t)).d}vQ={type:"tf",t:c.t,sd,isT,cd:c.d}}
function genVW(){const c=pick(VOCAB),askT=Math.random()<0.5;vQ={type:"written",c,askT}}
function chkVMC(i){if(vAns)return;vAns=true;vUA=i;nA++;if(i===vQ.ci){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVTF(a){if(vAns)return;vAns=true;vUA=a;nA++;if(a===vQ.isT){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVW(){if(vAns)return;const inp=document.getElementById("vi");if(!inp||!inp.value.trim())return;vAns=true;const u=inp.value.trim().toLowerCase(),tgt=vQ.askT?vQ.c.d.toLowerCase():vQ.c.t.toLowerCase(),tw=tgt.split(/\s+/).filter(w=>w.length>3),mc=tw.filter(w=>u.includes(w)).length,ok=tw.length>0&&(mc/tw.length>=0.45);vUA=ok;nA++;if(ok){nC++;streak++}else streak=0;updS();renderVocab()}

function renderVocab(){
  const el=document.getElementById("main"),q=vQ;if(!q){el.innerHTML="";return}let h="";
  if(q.type==="mc"){
    const ok=vAns&&vUA===q.ci,cc=vAns?(ok?"ok":"no"):"";
    h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span><span class="bg bg-ty">Multiple Choice</span></div>`;
    if(q.askT){h+=`<div class="q-txt">Define: <b>${q.c.t}</b></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}const l=vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i);return`<button class="${c}" onclick="chkVMC(${i})"><span class="opt-ltr">${l}</span><span>${o.d}</span></button>`}).join("")}</div>`}
    else{h+=`<div class="q-txt">Which term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}const l=vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i);return`<button class="${c}" onclick="chkVMC(${i})"><span class="opt-ltr">${l}</span><span>${o.t}</span></button>`}).join("")}</div>`}
    if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`;
  } else if(q.type==="tf"){
    const ok=vAns&&vUA===q.isT,cc=vAns?(ok?"ok":"no"):"";
    h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span><span class="bg bg-ty">True / False</span></div>`;
    h+=`<div class="q-txt"><b>${q.t}</b> — <span style="color:var(--cyn);font-style:italic">"${q.sd}"</span></div><div style="margin-top:10px;font:400 13px var(--s);color:var(--mut)">Is this definition correct?</div>`;
    h+=`<div class="opts" style="margin-top:8px;flex-direction:row;gap:8px">`;
    ["True","False"].forEach(l=>{const v=l==="True";let c="opt";if(vAns){c+=" done";if(v===q.isT)c+=" c-ok";else if(v===vUA)c+=" c-no"}h+=`<button class="${c}" style="flex:1;justify-content:center" onclick="chkVTF(${v})">${l}</button>`});h+=`</div>`;
    if(vAns&&!ok)h+=`<div class="sol" style="margin-top:12px"><div class="sol-tag">Correct Definition</div><div class="stp">${q.cd}</div></div>`;
    if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`;
  } else {
    const cc=vAns?(vUA?"ok":"no"):"";
    h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(vUA?"bg-ok":"bg-no"):"bg-q"}">Vocab</span><span class="bg bg-ty">Written</span></div>`;
    if(q.askT)h+=`<div class="q-txt">Define: <b>${q.c.t}</b></div>`;else h+=`<div class="q-txt">What term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div>`;
    if(!vAns){h+=`<div style="margin-top:12px"><textarea class="v-ta" id="vi" placeholder="${q.askT?"Type definition…":"Type the term…"}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chkVW()}"></textarea></div><div class="btn-row"><button class="ab" onclick="chkVW()">Check</button></div>`}
    else{h+=`<div class="fb ${vUA?"fb-ok":"fb-no"}" style="margin-top:8px">${vUA?"✓ Key concepts matched!":"✗ Review below"}</div><div class="sol" style="margin-top:10px"><div class="sol-tag">Answer</div>`;if(q.askT)h+=`<div class="stp">${q.c.d}</div>`;else h+=`<div class="stp" style="font-size:14px;font-weight:600">${q.c.t}</div>`;h+=`</div><div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`}
    h+=`</div>`;
  }
  el.innerHTML=h;
}

// CHEATSHEET
function renderCS(){
  renderCtrls();let h="";
  h+=`<div class="cs-sec">🔥 All Formulas & Worked Examples</div>`;
  CS.forEach(c=>{h+=`<div class="cs-card"><div class="cs-title">${c.title}</div><div class="cs-fm">${c.fm.join("<br>")}</div><div class="cs-lb">Variables</div><div class="cs-vr">${c.vr.replace(/\n/g,"<br>")}</div><div class="cs-lb">Worked Example</div><div class="cs-ex"><div style="font:400 12px/1.5 var(--f);color:var(--mut);margin-bottom:4px">${c.ex.q}</div>${c.ex.st.map(s=>`<div class="stp">${s}</div>`).join("")}</div></div>`});
  h+=`<div class="cs-sec">📖 All ${VOCAB.length} Vocabulary Terms</div>`;
  VOCAB.forEach((v,i)=>{h+=`<div class="cs-card" style="padding:10px 12px;margin-bottom:5px"><span style="font:700 10px var(--m);color:var(--org);margin-right:6px">${i+1}.</span><b>${v.t}</b><span style="margin:0 6px;color:var(--dim)">—</span><span style="color:var(--mut);font-size:12px">${v.d}</span></div>`});
  document.getElementById("main").innerHTML=h;
}

renderModes();renderCtrls();genP();genV();updS();
</script>
