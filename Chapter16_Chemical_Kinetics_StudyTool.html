<body>
<div class="hdr"><div class="hdr-in">
<div><div class="hdr-lab">Chapter 16 · Complete Study Tool</div><h1 class="hdr-t"><i>Chemical Kinetics</i> — Practice & Review</h1></div>
<div class="hdr-r"><div class="stats">
<div class="stat-box"><div class="stat-n" id="sC">0</div><div class="stat-l">Correct</div></div>
<div class="stat-box"><div class="stat-n" id="sA">0</div><div class="stat-l">Attempted</div></div>
<div class="stat-box"><div class="stat-n pct-n" id="sP">—</div><div class="stat-l">Accuracy</div></div>
<div class="stat-box"><div class="stat-n streak-n" id="sS"><span id="fire">🔥</span> 0</div><div class="stat-l">Streak</div></div>
</div><button class="btn-r" onclick="resetStats()">Reset</button></div>
</div></div>
<div id="modeBar" class="modes"></div>
<div id="ctrlBar" class="toolbar"></div>
<div class="cnt" id="main"></div>

<script>
function R(a,b,d){d=d||0;const f=Math.pow(10,d);return Math.round((Math.random()*(b-a)+a)*f)/f}
function rd(v,d){return Math.round(v*Math.pow(10,d))/Math.pow(10,d)}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

// ========== VOCAB ==========
const VOCAB=[
{t:"kinetics",d:"the study of the rates of chemical reactions and the steps by which they occur"},
{t:"collision theory",d:"states that three conditions must be met for a reaction: particles must collide, in proper orientation, with enough energy"},
{t:"activation energy",d:"the minimum energy necessary for a chemical reaction to occur; symbol Ea"},
{t:"activated complex",d:"an unstable, intermediate substance that forms as reactants transition into products during a collision"},
{t:"reaction rate",d:"a measure of how quickly reactants change into products; expressed as concentration per unit time"},
{t:"catalyst",d:"a substance that changes a reaction's rate without being consumed by the reaction"},
{t:"homogeneous catalyst",d:"a catalyst that is in the same phase (state of matter) as the substances in the reaction"},
{t:"heterogeneous catalyst",d:"a catalyst that is in a different phase (state of matter) than the substances in the reaction"},
{t:"enzyme",d:"a naturally occurring biochemical catalyst"},
{t:"inhibitor",d:"a substance that reduces the effectiveness of a catalyst, slowing its action"},
{t:"reaction mechanism",d:"the series of steps that make up a chemical reaction"},
{t:"elementary step",d:"an individual step in a reaction mechanism"},
{t:"rate-determining step",d:"the slowest elementary step in a reaction mechanism; it sets the overall rate of the reaction"},
{t:"complex reaction",d:"a net reaction made up of all elementary steps combined"},
{t:"intermediate",d:"a substance formed in one elementary step and consumed in the next; does not appear in the net equation"},
{t:"reaction order",d:"an indication of the effect that the concentration of a particular reactant has on the reaction rate (zero, first, or second order)"},
{t:"rate law",d:"a mathematical expression relating the concentration of reactants to the rate of a reaction; general form: rate = k[A]^m[B]^n"},
{t:"specific rate constant",d:"the proportionality constant k in a rate law; specific for each reaction at a given temperature"}
];

// ========== RATE LAW REACTION TEMPLATES ==========
// Each entry defines the reaction and reactant labels only.
// Base concentrations, base rate, and orders are randomized per problem.
const RXN_TEMPLATES=[
  {eq:"2NO(g) + Cl₂(g) → 2NOCl(g)",         A:"NO",   B:"Cl₂"},
  {eq:"2NO(g) + 2H₂(g) → N₂(g) + 2H₂O(l)", A:"NO",   B:"H₂"},
  {eq:"2NO(g) + Br₂(g) → 2NOBr(g)",          A:"NO",   B:"Br₂"},
  {eq:"H₂(g) + I₂(g) → 2HI(g)",             A:"H₂",   B:"I₂"},
  {eq:"2ClO₂(aq) + 2OH⁻(aq) → ClO₃⁻ + ClO₂⁻ + H₂O", A:"ClO₂", B:"OH⁻"},
  {eq:"BrO₃⁻(aq) + 5Br⁻(aq) + 6H⁺(aq) → 3Br₂ + 3H₂O", A:"BrO₃⁻", B:"Br⁻"},
  {eq:"CHCl₃(g) + Cl₂(g) → CCl₄(g) + HCl(g)", A:"CHCl₃", B:"Cl₂"},
  {eq:"2NO₂(g) + F₂(g) → 2NO₂F(g)",          A:"NO₂",  B:"F₂"},
  {eq:"S₂O₃²⁻(aq) + I₂(aq) → products",      A:"S₂O₃²⁻", B:"I₂"},
  {eq:"CO(g) + NO₂(g) → CO₂(g) + NO(g)",      A:"CO",   B:"NO₂"}
];

// Allowed concentration change factors between trials (must give clean rate ratios)
// factor of 2 → rate change = 2^order (1, 2, or 4)
// factor of 3 → rate change = 3^order (1, 3, or 9)
const CONC_FACTORS=[2,3];

// Allowed orders: 0, 1, 2
const ORDERS=[0,1,2];

// Allowed base concentrations (round, realistic M values)
const BASE_CONCS=[0.10,0.15,0.20,0.25,0.30,0.40,0.50,0.60,0.75];

// Format a rate number nicely: if small use sci notation, else fixed decimal
function fmtRate(r){
  if(r===0)return"0";
  if(r<0.001){
    const exp=Math.floor(Math.log10(r));
    const coeff=r/Math.pow(10,exp);
    const c=Math.round(coeff*1000)/1000;
    return`${c} × 10<sup>${exp}</sup>`;
  }
  // Choose sig figs based on magnitude
  if(r>=10)  return r.toFixed(1);
  if(r>=1)   return r.toFixed(2);
  if(r>=0.1) return r.toFixed(3);
  if(r>=0.01)return r.toFixed(4);
  return r.toFixed(5);
}

// Build a canonical rate law string from orders
function buildCanonical(A,B,m,n){
  let s="k";
  if(m>0){s+=`[${A}]`;if(m>1)s+=m;}
  if(n>0){s+=`[${B}]`;if(n>1)s+=n;}
  return s;
}
function buildDisplay(A,B,m,n){
  let s="k";
  if(m>0){s+=`[${A}]`;if(m>1)s+=`<sup>${m}</sup>`;}
  if(n>0){s+=`[${B}]`;if(n>1)s+=`<sup>${n}</sup>`;}
  return s;
}

// The core generator: picks a reaction, random orders, random base conc & base rate,
// then builds Trial 2 (change A by factorA, keep B) and Trial 3 (keep A, change B by factorB).
// Guarantees rate ratios are exact whole numbers.
function genRateLawProblem(){
  const rxn=pick(RXN_TEMPLATES);
  const m=pick(ORDERS), n=pick(ORDERS);
  const factorA=pick(CONC_FACTORS), factorB=pick(CONC_FACTORS);

  // Pick base concentrations — ensure Trial 2 and 3 concentrations stay reasonable
  const concA1=pick(BASE_CONCS);
  const concB1=pick(BASE_CONCS);
  const concA2=Math.round(concA1*factorA*100)/100;
  const concB3=Math.round(concB1*factorB*100)/100;

  // Base rate: pick a "nice" seed and scale so resulting rates are reasonable decimals
  // Rate1 = k * concA1^m * concB1^n
  // We pick rate1 directly from a set of nice values, then back-calculate k
  const niceRates=[0.0050,0.0080,0.0100,0.0120,0.0150,0.0200,0.0240,0.0250,
                   0.0300,0.0400,0.0500,0.0600,0.0750,0.100,0.120,0.150,0.200];
  const rate1=pick(niceRates);

  // Compute rate2 and rate3 using exact integer multipliers — NO floating point drift
  const multA = Math.pow(factorA, m); // exact integer: 1, 2, 3, 4, 8, 9
  const multB = Math.pow(factorB, n);
  const rate2 = rate1 * multA;
  const rate3 = rate1 * multB;

  // Build human-readable concentration factor strings
  const fStr = f => f===2?"doubles":f===3?"triples":"changes";
  const orderName = o => o===0?"zero":o===1?"first":"second";

  // Rate ratio display strings
  const ratioA = multA===1?"unchanged":multA+"×";
  const ratioB = multB===1?"unchanged":multB+"×";

  const canonical=buildCanonical(rxn.A,rxn.B,m,n);
  const display=buildDisplay(rxn.A,rxn.B,m,n);

  // Build solution steps
  const steps=[];
  steps.push(`<span class='lb'>COMPARE T1 & T2</span> [${rxn.A}] ${fStr(factorA)} (×${factorA}), [${rxn.B}] stays the same`);
  if(m===0){
    steps.push(`Rate ratio = ${fmtRate(rate2)} ÷ ${fmtRate(rate1)} = 1 (no change) → ${factorA}^m = 1 → <b>m = 0</b> (zero order in ${rxn.A})`);
  } else {
    steps.push(`Rate ratio = ${fmtRate(rate2)} ÷ ${fmtRate(rate1)} = ${multA} → ${factorA}^m = ${multA} → <b>m = ${m}</b> (${orderName(m)} order in ${rxn.A})`);
  }
  steps.push(`<span class='lb'>COMPARE T1 & T3</span> [${rxn.B}] ${fStr(factorB)} (×${factorB}), [${rxn.A}] stays the same`);
  if(n===0){
    steps.push(`Rate ratio = ${fmtRate(rate3)} ÷ ${fmtRate(rate1)} = 1 (no change) → ${factorB}^n = 1 → <b>n = 0</b> (zero order in ${rxn.B})`);
  } else {
    steps.push(`Rate ratio = ${fmtRate(rate3)} ÷ ${fmtRate(rate1)} = ${multB} → ${factorB}^n = ${multB} → <b>n = ${n}</b> (${orderName(n)} order in ${rxn.B})`);
  }
  steps.push(`<span class='lb'>RATE LAW</span> <span class='ans'>rate = ${display}</span>`);

  const note=`Rate ratios always divide to clean whole numbers. [${rxn.A}] ×${factorA} → rate ×${multA} (${factorA}^${m}=${multA}), so m=${m}. [${rxn.B}] ×${factorB} → rate ×${multB} (${factorB}^${n}=${multB}), so n=${n}.`;

  return{
    rxn, m, n, canonical,
    trials:[
      {a:concA1, b:concB1, rate:fmtRate(rate1)},
      {a:concA2, b:concB1, rate:fmtRate(rate2)},
      {a:concA1, b:concB3, rate:fmtRate(rate3)}
    ],
    steps, note
  };
}

// ========== MECHANISM DATABASE ==========
// All net equations verified algebraically by adding steps and cancelling intermediates
const MECHS=[
  // ── 2-STEP ──

// ========== TEXT ANSWER NORMALIZATION ==========
// normSub: converts all subscript/superscript variants to plain digits
// Handles: NO₂ NO2 NO^2 NO(2) — all become no2
function normSub(s){
  return s
    .replace(/[₀₁₂₃₄₅₆₇₈₉]/g,c=>'₀₁₂₃₄₅₆₇₈₉'.indexOf(c))
    .replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹]/g,c=>'⁰¹²³⁴⁵⁶⁷⁸⁹'.indexOf(c))
    .replace(/\^(\d+)/g,'$1')          // NO^2 → NO2
    .replace(/\((\d+)\)/g,'$1')        // NO(2) → NO2
    .replace(/<sup>(\d+)<\/sup>/gi,'$1') // HTML sup tags
    .replace(/[⁻⁺]/g,c=>c==='⁻'?'-':'+')
    .replace(/[-–]/g,'-')
    .toLowerCase()
    .replace(/\s+/g,'');
}

// normStr: for rate law answers (not equations) — full string normalize
function normStr(s){ return normSub(s); }

// parseSide: parse one side of equation into sorted canonical string
// "2NO + CO₂" → "2co2+2no" sorted alphabetically so order doesn't matter
function parseSide(side){
  // Split on + but not inside parentheses
  const tokens = side.split('+').map(t=>normSub(t.trim())).filter(Boolean);
  return tokens.slice().sort().join('+');
}

// checkNetEq: split on arrow, normalize each side independently,
// sort species within each side (so NO+CO₂ = CO₂+NO),
// but NEVER allow left↔right swap (reactants must stay reactants)
function checkNetEq(raw, answer){
  // Normalize arrow variants: ->, -->, →, →
  const splitArrow = s => s.replace(/--?>|→|→/g,'→').split('→');

  const rawParts = splitArrow(raw);
  const ansParts = splitArrow(answer);

  // Must have exactly one arrow
  if(rawParts.length !== 2 || ansParts.length !== 2) return false;

  const rawL = parseSide(rawParts[0]);
  const rawR = parseSide(rawParts[1]);
  const ansL = parseSide(ansParts[0]);
  const ansR = parseSide(ansParts[1]);

  // Left must match left, right must match right — no flipping
  return rawL === ansL && rawR === ansR;
}

// fmtChem: converts Unicode subscripts in chemical formulas to <sub> tags
// so 2O₃ renders as 2O<sub>3</sub> not "20₃" in monospace fonts
function fmtChem(s){
  return s
    .replace(/[₀₁₂₃₄₅₆₇₈₉]+/g, m=>`<sub>${[...m].map(c=>'₀₁₂₃₄₅₆₇₈₉'.indexOf(c)).join('')}</sub>`)
    .replace(/[⁻⁺]/g, c=>`<sup>${c==='⁻'?'−':'+'}</sup>`);
}
// normalizes subscripts so NO3 = NO₃, ClO = ClO, etc.
function checkInter(raw, allInter){
  // Parse user input — split on comma or "and", normalize each
  const userParts = raw.split(/,|\band\b/i).map(s=>normSub(s.trim())).filter(Boolean).sort();
  const ansParts  = allInter.map(s=>normSub(s.trim())).sort();
  // Must match exactly the same set
  if(userParts.length !== ansParts.length) return false;
  return userParts.every((v,i)=>v===ansParts[i]);
}

function chkP(){
  if(answered)return;
  if(prob.isMC)return;
  const inp=document.getElementById("inp");
  if(!inp)return;
  const raw=inp.value.trim();
  if(!raw)return;
  userVal=raw;answered=true;nA++;
  let ok=false;
  if(prob.isText){
    ok=prob.isNetEq ? checkNetEq(raw,prob.a) : prob.isInterEq ? checkInter(raw,prob._allInter) : normStr(raw)===normStr(prob.a);
  } else {
    const v=parseFloat(raw.replace(/,/g,""));
    if(isNaN(v)){inp.classList.add("v-no");setTimeout(()=>{const e=document.getElementById("inp");if(e)e.classList.remove("v-no")},400);return}
    ok=Math.abs(v-prob.a)<=prob.tol;
  }
  if(ok){nC++;streak++}else{streak=0}
  updS();renderProb();
}
function chkMC(i){
  if(answered)return;
  answered=true;userVal=i;nA++;
  if(i===prob.ci){nC++;streak++}else{streak=0}
  updS();renderProb();
}
function showPS(){userVal=document.getElementById("inp")?document.getElementById("inp").value:"";solShown=true;if(!answered){answered=true;nA++;streak=0;updS()}renderProb()}

function renderProb(){
  const el=document.getElementById("main"),p=prob;if(!p){el.innerHTML="";return}
  let isOk=false;
  if(answered){
    if(p.isMC)isOk=userVal===p.ci;
    else if(p.isText){isOk=p.isNetEq ? checkNetEq(userVal,p.a) : p.isInterEq ? checkInter(userVal,p._allInter) : normStr(userVal)===normStr(p.a)}
    else{const v=parseFloat(String(userVal).replace(/,/g,""));isOk=!isNaN(v)&&Math.abs(v-p.a)<=p.tol}
  }
  const cc=answered?(isOk?"ok":"no"):"",bc=answered?(isOk?"bg-ok":"bg-no"):"bg-q";
  const sec=SEC.find(s=>s.id===active);
  let h=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px"><button class="cb${!subType?" on":""}" onclick="subType=null;genP()">Random</button>`;
  sec.types.forEach(t=>{h+=`<button class="cb${subType===t.id?" on":""}" onclick="subType='${t.id}';genP()">${t.name}</button>`});h+=`</div>`;
  h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${bc}">${answered?(isOk?"✓ Correct":"✗ Incorrect"):"Problem"}</span><span class="bg bg-ty">${p.ref}</span></div><div class="q-txt">${p.q}</div>`;

  if(p.isMC){
    // Multiple choice
    h+=`<div class="opts">`;
    p.opts.forEach((o,i)=>{
      let cls="opt";
      if(answered){cls+=" done";if(i===p.ci)cls+=" c-ok";else if(i===userVal)cls+=" c-no"}
      const ltr=answered&&i===p.ci?"✓":answered&&i===userVal?"✗":String.fromCharCode(65+i);
      h+=`<button class="${cls}" onclick="chkMC(${i})"><span class="opt-ltr">${ltr}</span><span>${o.t}</span></button>`;
    });
    h+=`</div>`;
  } else {
    // Given/Formula/Find boxes
    if(p.gv){h+=`<div class="ir">`;h+=`<div class="ib ib-g"><span class="ib-l">Given</span>${p.gv.replace(/\n/g,"<br>")}</div>`;if(p.fm)h+=`<div class="ib ib-f"><span class="ib-l">Formula</span>${p.fm.replace(/\n/g,"<br>")}</div>`;if(p.fi)h+=`<div class="ib ib-w"><span class="ib-l">Solve For</span>${p.fi.replace(/\n/g,"<br>")}</div>`;h+=`</div>`}
    if(!answered){
      h+=`<div class="aa"><div class="aw"><input class="ai" id="inp" type="text" placeholder="Type your answer…" value="${userVal}" onkeydown="if(event.key==='Enter')chkP()"></div><button class="ab" onclick="chkP()">Check</button></div><div class="btn-row"><button class="btn-sh" onclick="showPS()">Show Solution</button></div>`;
    } else {
      h+=`<div class="aa"><div class="aw"><input class="ai ${isOk?"v-ok":"v-no"}" value="${userVal}" disabled></div></div><div class="fb ${isOk?"fb-ok":"fb-no"}">${isOk?`✓ Correct! Streak: ${streak} 🔥`:"✗ Not quite"}</div>`;
      if(!isOk)h+=`<div class="fb-v">Answer: ${p.a} ${p.u||''}</div>`;
    }
  }
  if(answered||solShown){h+=`<div class="sol"><div class="sol-tag">Solution</div>`;p.st.forEach(s=>{h+=`<div class="stp">${s}</div>`});h+=`<div class="sol-note">${p.nt}</div></div>`}
  if(answered)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genP()">Next →</button><span style="font:500 10px var(--m);color:var(--dim);margin-left:8px">or press Space</span></div>`;
  h+=`</div>`;el.innerHTML=h;
  if(!answered&&!p.isMC){const i=document.getElementById("inp");if(i)setTimeout(()=>i.focus(),50)}
}

// ========== VOCAB ==========
function genV(){vAns=false;vUA=null;if(vMode==="mc")genVMC();else if(vMode==="tf")genVTF();else genVW();renderCtrls();renderVocab()}
function genVMC(){const c=pick(VOCAB),wr=shuffle(VOCAB.filter(v=>v.t!==c.t)).slice(0,3),askT=Math.random()<0.5,opts=shuffle([c,...wr]);vQ={type:"mc",c,opts,askT,ci:opts.indexOf(c)}}
function genVTF(){const c=pick(VOCAB),isT=Math.random()<0.5;let sd=isT?c.d:pick(VOCAB.filter(v=>v.t!==c.t)).d;vQ={type:"tf",t:c.t,sd,isT,cd:c.d}}
function genVW(){const c=pick(VOCAB),askT=Math.random()<0.5;vQ={type:"written",c,askT}}
function chkVMC(i){if(vAns)return;vAns=true;vUA=i;nA++;if(i===vQ.ci){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVTF(a){if(vAns)return;vAns=true;vUA=a;nA++;if(a===vQ.isT){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVW(){if(vAns)return;const inp=document.getElementById("vi");if(!inp||!inp.value.trim())return;vAns=true;const u=inp.value.trim().toLowerCase(),tgt=vQ.askT?vQ.c.d.toLowerCase():vQ.c.t.toLowerCase(),tw=tgt.split(/\s+/).filter(w=>w.length>3),mc=tw.filter(w=>u.includes(w)).length,ok=tw.length>0&&(mc/tw.length>=0.45);vUA=ok;nA++;if(ok){nC++;streak++}else streak=0;updS();renderVocab()}

function renderVocab(){
  const el=document.getElementById("main"),q=vQ;if(!q){el.innerHTML="";return}let h="";
  if(q.type==="mc"){
    const ok=vAns&&vUA===q.ci,cc=vAns?(ok?"ok":"no"):"";
    h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span><span class="bg bg-ty">MC</span></div>`;
    if(q.askT){h+=`<div class="q-txt">Define: <b>${q.c.t}</b></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}const l=vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i);return`<button class="${c}" onclick="chkVMC(${i})"><span class="opt-ltr">${l}</span><span>${o.d}</span></button>`}).join("")}</div>`}
    else{h+=`<div class="q-txt">Which term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}const l=vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i);return`<button class="${c}" onclick="chkVMC(${i})"><span class="opt-ltr">${l}</span><span>${o.t}</span></button>`}).join("")}</div>`}
    if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button><span style="font:500 10px var(--m);color:var(--dim);margin-left:8px">or press Space</span></div>`;h+=`</div>`;
  } else if(q.type==="tf"){
    const ok=vAns&&vUA===q.isT,cc=vAns?(ok?"ok":"no"):"";
    h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span><span class="bg bg-ty">T/F</span></div>`;
    h+=`<div class="q-txt"><b>${q.t}</b> — <span style="color:var(--cyn);font-style:italic">"${q.sd}"</span></div><div style="margin-top:10px;color:var(--mut);font-size:13px">Is this definition correct?</div>`;
    h+=`<div class="opts" style="flex-direction:row;gap:8px;margin-top:8px">`;
    ["True","False"].forEach(l=>{const v=l==="True";let c="opt";if(vAns){c+=" done";if(v===q.isT)c+=" c-ok";else if(v===vUA)c+=" c-no"}h+=`<button class="${c}" style="flex:1;justify-content:center" onclick="chkVTF(${v})">${l}</button>`});h+=`</div>`;
    if(vAns&&!ok)h+=`<div class="sol" style="margin-top:12px"><div class="sol-tag">Correct</div><div class="stp">${q.cd}</div></div>`;
    if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button><span style="font:500 10px var(--m);color:var(--dim);margin-left:8px">or press Space</span></div>`;h+=`</div>`;
  } else {
    const cc=vAns?(vUA?"ok":"no"):"";
    h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(vUA?"bg-ok":"bg-no"):"bg-q"}">Vocab</span><span class="bg bg-ty">Written</span></div>`;
    if(q.askT)h+=`<div class="q-txt">Define: <b>${q.c.t}</b></div>`;else h+=`<div class="q-txt">What term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div>`;
    if(!vAns){h+=`<div style="margin-top:12px"><textarea class="v-ta" id="vi" placeholder="${q.askT?"Type definition…":"Type the term…"}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chkVW()}"></textarea></div><div class="btn-row"><button class="ab" onclick="chkVW()">Check</button></div>`}
    else{h+=`<div class="fb ${vUA?"fb-ok":"fb-no"}" style="margin-top:8px">${vUA?"✓ Key concepts matched!":"✗ Review below"}</div><div class="sol" style="margin-top:10px"><div class="sol-tag">Answer</div>`;if(q.askT)h+=`<div class="stp">${q.c.d}</div>`;else h+=`<div class="stp" style="font-size:14px;font-weight:600">${q.c.t}</div>`;h+=`</div><div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button><span style="font:500 10px var(--m);color:var(--dim);margin-left:8px">or press Space</span></div>`}
    h+=`</div>`;
  }
  el.innerHTML=h;
}

// ========== CHEATSHEET ==========
function renderCS(){
  renderCtrls();let h="";
  h+=`<div class="cs-sec">⚡ All Concepts, Formulas & Worked Examples</div>`;
  CS.forEach(c=>{h+=`<div class="cs-card"><div class="cs-title">${c.title}</div><div class="cs-fm">${c.fm.join("<br>")}</div><div class="cs-lb">Key Points</div><div class="cs-vr">${c.vr.replace(/\n/g,"<br>")}</div><div class="cs-lb">Example</div><div class="cs-ex"><div style="font:400 12px/1.5 var(--f);color:var(--mut);margin-bottom:4px">${c.ex.q}</div>${c.ex.st.map(s=>`<div class="stp">${s}</div>`).join("")}</div></div>`});
  h+=`<div class="cs-sec">📖 All ${VOCAB.length} Vocabulary Terms</div>`;
  VOCAB.forEach((v,i)=>{h+=`<div class="cs-card" style="padding:10px 12px;margin-bottom:5px"><span style="font:700 10px var(--m);color:var(--teal);margin-right:6px">${i+1}.</span><b>${v.t}</b><span style="margin:0 6px;color:var(--dim)">—</span><span style="color:var(--mut);font-size:12px">${v.d}</span></div>`});
  document.getElementById("main").innerHTML=h;
}

// ========== GLOBAL KEYBOARD SHORTCUTS ==========
// Enter when answered → next problem/vocab
// Enter when unanswered on text input → check (already handled inline)
document.addEventListener('keydown', function(e){
  if(e.key !== ' ') return;
  // Never intercept when typing in an input or textarea
  if(e.target && (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT')) return;

  if(mode === 'problems' && answered){
    e.preventDefault();
    genP();
  } else if(mode === 'vocab' && vAns){
    e.preventDefault();
    genV();
  } else {
    // Prevent default page scroll when space is pressed but nothing to advance
    e.preventDefault();
  }
});

renderModes();renderCtrls();genP();genV();updS();
</script>
