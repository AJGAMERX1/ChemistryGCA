function R(a,b,d){d=d||0;const f=Math.pow(10,d);return Math.round((Math.random()*(b-a)+a)*f)/f}
function rd(v,d){return Math.round(v*Math.pow(10,d))/Math.pow(10,d)}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

{t:"solution",d:"a homogeneous mixture of variable composition in a single phase"},
{t:"solvent",d:"the most abundant substance in a solution; the substance that dissolves the solute"},
{t:"solute",d:"the substance dissolved by the solvent; present in lower abundance"},
{t:"miscibility",d:"the tendency of two liquids to mutually dissolve and mix in a solution"},
{t:"solvation",d:"the dissolving process in solid-in-liquid solutions; solvent particles surround and separate solute particles"},

{t:"ionization",d:"solvation in which a covalent compound forms ions when it dissolves in a solvent"},
{t:"enthalpy of solution",d:"the net energy change during the dissolving process; also called heat of solution (kJ/mol)"},

{t:"saturated solution",d:"a solution containing the maximum amount of solute it can hold at current conditions"},
{t:"supersaturated solution",d:"a solution containing more than the maximum amount of solute it can normally hold at current conditions"},

{title:"Van't Hoff Factor (i)",fm:["i = # of particles per formula unit"],vr:"Molecular (no ions): i = 1\nNaCl, KBr, KCl, LiCl, NaOH, KI, NaNO₃, KNO₃: i = 2\nCaCl₂, MgCl₂, BaCl₂, Ca(NO₃)₂: i = 3\nAlCl₃, FeCl₃: i = 4",ex:{q:"Determine i for each compound",st:["Glucose: molecular → i=1","NaCl→Na⁺+Cl⁻ → i=2","CaCl₂→Ca²⁺+2Cl⁻ → i=3","AlCl₃→Al³⁺+3Cl⁻ → i=4"]}},
{title:"Multi-Step: Mass → Molarity → Portion",fm:["n = m / M","c = n / V","n₂ = c × V₂","m₂ = n₂ × M"],vr:"Step 1: Calculate molar mass from formula\nStep 2: Convert grams → moles\nStep 3: Find molarity of the full solution\nStep 4: Use molarity to find moles in the portion\nStep 5: Convert moles back → grams",ex:{q:"Dissolve 50 g NaCl to make 400 mL. Pour out 100 mL. Grams in beaker?",st:["M = 58.44 g/mol","n = 50/58.44 = 0.8553 mol","c = 0.8553/0.400 = 2.138 M","n₂ = 2.138×0.100 = 0.2138 mol","m₂ = 0.2138×58.44 = 12.5 g"]}},
{title:"Multi-Step: Mass → Stock → Dilute",fm:["n = m / M","c_stock = n / V_stock","c₁V₁ = c₂V₂"],vr:"Step 1: Calculate molar mass from formula\nStep 2: Convert grams → moles\nStep 3: Find molarity of the stock solution\nStep 4: Use dilution equation for final molarity",ex:{q:"Dissolve 40 g NaOH in 200 mL. Take 50 mL, dilute to 500 mL. Final M?",st:["M = 40.00 g/mol","n = 40/40.00 = 1.000 mol","c_stock = 1.000/0.200 = 5.00 M","c₂ = (5.00×50)/500 = 0.500 M"]}},
{title:"Multi-Step: Mass% → Molality",fm:["m_solute = (w/100) × m_total","m_solvent = m_total − m_solute","n = m_solute / M","b = n / m_solvent (kg)"],vr:"Step 1: Find solute mass from mass fraction\nStep 2: Subtract to get solvent mass\nStep 3: Calculate molar mass, convert g → mol\nStep 4: Divide moles by kg of solvent",ex:{q:"A 10% NaCl solution, total mass 500 g. Molality?",st:["m_solute = (10/100)×500 = 50 g","m_solvent = 500−50 = 450 g = 0.450 kg","M = 58.44, n = 50/58.44 = 0.855 mol","b = 0.855/0.450 = 1.90 mol/kg"]}},
{title:"Multi-Step: Mass% → BP or FP",fm:["m_solute = (w/100) × m_total","m_solvent = m_total − m_solute","n = m_solute / M","b = n / m_solvent (kg)","ΔTb = i × Kb × b   or   ΔTf = i × Kf × b","T₂ = T₁ ± ΔT"],vr:"All the steps above, PLUS:\nStep 5: Determine i (molecular=1, or count ions)\nStep 6: Calculate ΔT using the colligative formula\nStep 7: Add to 100 °C (BP) or subtract from 0 °C (FP)",ex:{q:"An 8% CaCl₂ solution, total 600 g. Boiling point?",st:["m_s = 0.08×600 = 48 g","m_w = 600−48 = 552 g = 0.552 kg","M = 110.98, n = 48/110.98 = 0.4325 mol","b = 0.4325/0.552 = 0.784 mol/kg","CaCl₂→Ca²⁺+2Cl⁻, i = 3","ΔTb = 3×0.512×0.784 = 1.20 °C","T₂ = 100.0+1.20 = 101.20 °C"]}},
{title:"Reverse: Find Mass for Target Temperature",fm:["b = ΔT / (i × K)","n = b × m_solvent","m = n × M"],vr:"Work BACKWARDS from desired temperature:\nStep 1: Find ΔT (how far from normal BP or FP)\nStep 2: Solve for molality\nStep 3: Multiply by kg solvent → moles\nStep 4: Multiply by molar mass → grams",ex:{q:"Lower FP to −5.0 °C using NaCl in 3.0 kg water",st:["ΔTf = 5.0 °C","NaCl: i=2, Kf=1.86","b = 5.0/(2×1.86) = 1.344 mol/kg","n = 1.344×3.0 = 4.032 mol","M = 58.44, m = 4.032×58.44 = 235.6 g"]}}
];

// STATE
let mode="problems",active="molarity",subType=null,prob=null,answered=false,solShown=false,userVal="";
let nC=0,nA=0,streak=0;
let hide={given:false,formula:false,find:false};
let vMode="mc",vQ=null,vAns=false,vUA=null;

function updS(){document.getElementById("sC").textContent=nC;document.getElementById("sA").textContent=nA;document.getElementById("sP").textContent=nA>0?rd(nC/nA*100,0)+"%":"—";document.getElementById("sS").innerHTML=`<span id="fire">🔥</span> ${streak}`}
function resetStats(){nC=0;nA=0;streak=0;updS();if(mode==="problems")genP();else if(mode==="vocab")genV();else renderCS()}

function renderModes(){document.getElementById("modeBar").innerHTML=[{id:"problems",l:"📐 Problems"},{id:"vocab",l:"📖 Vocab"},{id:"cheatsheet",l:"📋 Cheatsheet"}].map(m=>`<button class="mode-btn${mode===m.id?" on":""}" onclick="switchMode('${m.id}')">${m.l}</button>`).join("")}
function switchMode(m){mode=m;renderModes();renderCtrls();if(m==="problems")genP();else if(m==="vocab")genV();else renderCS()}

function renderCtrls(){
  const el=document.getElementById("ctrlBar");
  if(mode==="problems"){
    let h=SEC.map(s=>`<button class="cb${active===s.id?" on":""}" onclick="active='${s.id}';subType=null;genP()">${s.icon} ${s.title}</button>`).join("");
    h+=`<span style="width:6px"></span><span class="cl">Hide:</span>`;
    h+=`<button class="tg${hide.given?" on":""}" id="tg-given" onclick="tglH('given')"><span class="tg-dot"></span>Givens</button>`;
    h+=`<button class="tg${hide.formula?" on":""}" id="tg-formula" onclick="tglH('formula')"><span class="tg-dot"></span>Formulas</button>`;
    h+=`<button class="tg${hide.find?" on":""}" id="tg-find" onclick="tglH('find')"><span class="tg-dot"></span>Solve-For</button>`;
    el.innerHTML=h;
  } else if(mode==="vocab"){
    el.innerHTML=`<span class="cl">Format:</span><button class="cb${vMode==="mc"?" on":""}" onclick="vMode='mc';genV()">Multiple Choice</button><button class="cb${vMode==="written"?" on":""}" onclick="vMode='written';genV()">Written</button><button class="cb${vMode==="tf"?" on":""}" onclick="vMode='tf';genV()">True / False</button>`;
  } else {el.innerHTML=`<span class="cl">Formula reference & worked examples from Chapter 14</span>`}
}

function tglH(k){hide[k]=!hide[k];var b=document.getElementById("tg-"+k);if(b){if(hide[k])b.classList.add("on");else b.classList.remove("on")}renderProb()}

// PROBLEMS
function genP(){const sec=SEC.find(s=>s.id===active),tid=subType||pick(sec.types).id;prob=G[tid]();answered=false;solShown=false;userVal="";renderCtrls();renderProb()}
function chkP(){if(answered)return;const inp=document.getElementById("inp"),v=parseFloat(inp.value.replace(/,/g,""));if(isNaN(v)){inp.classList.add("v-no");setTimeout(()=>{const e=document.getElementById("inp");if(e)e.classList.remove("v-no")},400);return}userVal=inp.value;answered=true;nA++;if(Math.abs(v-prob.a)<=prob.tol){nC++;streak++}else streak=0;updS();renderProb()}
function showPS(){userVal=document.getElementById("inp")?document.getElementById("inp").value:"";solShown=true;if(!answered){answered=true;nA++;streak=0;updS()}renderProb()}

function renderProb(){
  const el=document.getElementById("main"),p=prob;if(!p){el.innerHTML="";return}
  let isOk=false;if(answered){const v=parseFloat(userVal.replace(/,/g,""));isOk=!isNaN(v)&&Math.abs(v-p.a)<=p.tol}
  const cc=answered?(isOk?"ok":"no"):"",bc=answered?(isOk?"bg-ok":"bg-no"):"bg-q",sec=SEC.find(s=>s.id===active);
  const hc=(hide.given?1:0)+(hide.formula?1:0)+(hide.find?1:0),dl=hc===3?"EXAM MODE":hc>=2?"HARD+":hc===1?"HARD":"";
  let h=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px"><button class="cb${!subType?" on":""}" onclick="subType=null;genP()">Random</button>`;
  sec.types.forEach(t=>{h+=`<button class="cb${subType===t.id?" on":""}" onclick="subType='${t.id}';genP()">${t.name}</button>`});h+=`</div>`;
  h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${bc}">${answered?(isOk?"✓ Correct":"✗ Incorrect"):"Problem"}</span><span class="bg bg-ty">${p.ref}</span>${dl?`<span class="bg bg-hard">${dl}</span>`:""}</div><div class="q-txt">${p.q}</div>`;
  const gH=hide.given&&!answered&&!solShown,fH=hide.formula&&!answered&&!solShown,wH=hide.find&&!answered&&!solShown;
  if(!gH||!fH||!wH){h+=`<div class="ir">`;if(!gH)h+=`<div class="ib ib-g"><span class="ib-l">Given</span>${p.gv.replace(/\n/g,"<br>")}</div>`;if(!fH)h+=`<div class="ib ib-f"><span class="ib-l">Formula</span>${p.fm.replace(/\n/g,"<br>")}</div>`;if(!wH)h+=`<div class="ib ib-w"><span class="ib-l">Solve For</span>${p.fi.replace(/\n/g,"<br>")}</div>`;h+=`</div>`}
  if(!answered){h+=`<div class="aa"><div class="aw"><input class="ai" id="inp" type="text" inputmode="decimal" placeholder="Enter answer…" value="${userVal}" onkeydown="if(event.key==='Enter')chkP()"><span class="au">${p.u}</span></div><button class="ab" onclick="chkP()">Check</button></div><div class="btn-row"><button class="btn-sh" onclick="showPS()">Show Solution</button></div>`}
  else{h+=`<div class="aa"><div class="aw"><input class="ai ${isOk?"v-ok":"v-no"}" value="${userVal}" disabled><span class="au">${p.u}</span></div></div><div class="fb ${isOk?"fb-ok":"fb-no"}">${isOk?`✓ Correct! Streak: ${streak} 🔥`:"✗ Not quite"}</div>`;if(!isOk)h+=`<div class="fb-v">Answer: ${p.a} ${p.u}</div>`}
  if(answered||solShown){h+=`<div class="sol"><div class="sol-tag">Solution</div>`;p.st.forEach(s=>{h+=`<div class="stp">${s}</div>`});h+=`<div class="sol-note">${p.nt}</div></div>`}
  if(answered)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genP()">Next →</button></div>`;
  h+=`</div>`;el.innerHTML=h;if(!answered){const i=document.getElementById("inp");if(i)setTimeout(()=>i.focus(),50)}
}

// VOCAB
function genV(){vAns=false;vUA=null;if(vMode==="mc")genVMC();else if(vMode==="tf")genVTF();else genVW();renderCtrls();renderVocab()}
function genVMC(){const c=pick(VOCAB),wr=shuffle(VOCAB.filter(v=>v.t!==c.t)).slice(0,3),askT=Math.random()<.5,opts=shuffle([c,...wr]);vQ={type:"mc",c,opts,askT,ci:opts.indexOf(c)}}
function genVTF(){const c=pick(VOCAB),isT=Math.random()<.5;let sd;if(isT)sd=c.d;else{sd=pick(VOCAB.filter(v=>v.t!==c.t)).d}vQ={type:"tf",t:c.t,sd,isT,cd:c.d}}
function genVW(){const c=pick(VOCAB),askT=Math.random()<.5;vQ={type:"written",c,askT}}
function chkVMC(i){if(vAns)return;vAns=true;vUA=i;nA++;if(i===vQ.ci){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVTF(a){if(vAns)return;vAns=true;vUA=a;nA++;if(a===vQ.isT){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVW(){if(vAns)return;const inp=document.getElementById("vi");if(!inp||!inp.value.trim())return;vAns=true;const u=inp.value.trim().toLowerCase(),tgt=vQ.askT?vQ.c.d.toLowerCase():vQ.c.t.toLowerCase(),tw=tgt.split(/\s+/).filter(w=>w.length>3),mc=tw.filter(w=>u.includes(w)).length,ok=tw.length>0&&(mc/tw.length>=.45);vUA=ok;nA++;if(ok){nC++;streak++}else streak=0;updS();renderVocab()}

function renderVocab(){
  const el=document.getElementById("main"),q=vQ;if(!q){el.innerHTML="";return}let h="";
  if(q.type==="mc"){
    const ok=vAns&&vUA===q.ci,cc=vAns?(ok?"ok":"no"):"";
    h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span><span class="bg bg-ty">Multiple Choice</span></div>`;
    if(q.askT){h+=`<div class="q-txt">Define: <b>${q.c.t}</b></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}const l=vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i);return`<button class="${c}" onclick="chkVMC(${i})"><span class="opt-ltr">${l}</span><span>${o.d}</span></button>`}).join("")}</div>`}
    else{h+=`<div class="q-txt">Which term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}const l=vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i);return`<button class="${c}" onclick="chkVMC(${i})"><span class="opt-ltr">${l}</span><span>${o.t}</span></button>`}).join("")}</div>`}
    if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`;
  } else if(q.type==="tf"){
    const ok=vAns&&vUA===q.isT,cc=vAns?(ok?"ok":"no"):"";
    h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span><span class="bg bg-ty">True / False</span></div>`;
    h+=`<div class="q-txt"><b>${q.t}</b> — <span style="color:var(--cyn);font-style:italic">"${q.sd}"</span></div><div style="margin-top:10px;font:400 13px var(--s);color:var(--mut)">Is this definition correct?</div>`;
    h+=`<div class="opts" style="margin-top:8px;flex-direction:row;gap:8px">`;
    ["True","False"].forEach(l=>{const v=l==="True";let c="opt";if(vAns){c+=" done";if(v===q.isT)c+=" c-ok";else if(v===vUA)c+=" c-no"}h+=`<button class="${c}" style="flex:1;justify-content:center" onclick="chkVTF(${v})">${l}</button>`});h+=`</div>`;
    if(vAns&&!ok)h+=`<div class="sol" style="margin-top:12px"><div class="sol-tag">Correct Definition</div><div class="stp">${q.cd}</div></div>`;
    if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`;
  } else {
    const cc=vAns?(vUA?"ok":"no"):"";
    h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(vUA?"bg-ok":"bg-no"):"bg-q"}">Vocab</span><span class="bg bg-ty">Written</span></div>`;
    if(q.askT)h+=`<div class="q-txt">Define: <b>${q.c.t}</b></div>`;else h+=`<div class="q-txt">What term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div>`;
    if(!vAns){h+=`<div style="margin-top:12px"><textarea class="v-ta" id="vi" placeholder="${q.askT?"Type definition…":"Type the term…"}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chkVW()}"></textarea></div><div class="btn-row"><button class="ab" onclick="chkVW()">Check</button></div>`}
    else{h+=`<div class="fb ${vUA?"fb-ok":"fb-no"}" style="margin-top:8px">${vUA?"✓ Key concepts matched!":"✗ Review below"}</div><div class="sol" style="margin-top:10px"><div class="sol-tag">Answer</div>`;if(q.askT)h+=`<div class="stp">${q.c.d}</div>`;else h+=`<div class="stp" style="font-size:14px;font-weight:600">${q.c.t}</div>`;h+=`</div><div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`}
    h+=`</div>`;
  }
  el.innerHTML=h;
}

// CHEATSHEET
function renderCS(){
  renderCtrls();let h="";
  CS.forEach(c=>{h+=`<div class="cs-sec"><div class="cs-title">${c.title}</div><div class="cs-card"><div class="cs-fm">${c.fm.join("<br>")}</div><div class="cs-lb">Variables</div><div class="cs-vr">${c.vr.replace(/\n/g,"<br>")}</div><div class="cs-lb">Worked Example</div><div class="cs-ex"><div style="font:400 12px/1.5 var(--f);color:var(--mut);margin-bottom:4px">${c.ex.q}</div>${c.ex.st.map(s=>`<div class="stp">${s}</div>`).join("")}</div></div></div>`});
  h+=`<div class="cs-sec"><div class="cs-title">All 30 Vocabulary Terms</div>`;
  VOCAB.forEach((v,i)=>{h+=`<div class="cs-card" style="padding:10px 12px;margin-bottom:5px"><span style="font:700 10px var(--m);color:var(--prp);margin-right:6px">${i+1}.</span><b>${v.t}</b><span style="margin:0 6px;color:var(--dim)">—</span><span style="color:var(--mut);font-size:12px">${v.d}</span></div>`});
  h+=`</div>`;document.getElementById("main").innerHTML=h;
}

renderModes();renderCtrls();genP();updS();
</script>
</body>
