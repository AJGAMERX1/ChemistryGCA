<div class="hdr"><div class="hdr-in">
<div><div class="hdr-lab">Chapter 11 · Complete Study Tool</div><h1 class="hdr-t"><i>Chemical Calculations</i> — Stoichiometry</h1></div>
<div class="hdr-r"><div class="stats">
<div class="stat-box"><div class="stat-n" id="sC">0</div><div class="stat-l">Correct</div></div>
<div class="stat-box"><div class="stat-n" id="sA">0</div><div class="stat-l">Attempted</div></div>
<div class="stat-box"><div class="stat-n pct-n" id="sP">—</div><div class="stat-l">Accuracy</div></div>
<div class="stat-box"><div class="stat-n streak-n" id="sS"><span id="fire">🔥</span> 0</div><div class="stat-l">Streak</div></div>
</div><button class="btn-r" onclick="resetStats()">Reset</button></div>
</div></div>

<script>
function R(a,b,d){d=d||0;const f=Math.pow(10,d);return Math.round((Math.random()*(b-a)+a)*f)/f}
function rd(v,d){return Math.round(v*Math.pow(10,d))/Math.pow(10,d)}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
const Na=6.022e23;

const VOCAB=[
{t:"mole",d:"the amount of any substance that contains exactly 6.022 × 10²³ particles"},
{t:"Avogadro's number",d:"the number of particles in one mole: 6.022 × 10²³"},
{t:"molar mass",d:"the mass of one mole of any pure substance, measured in g/mol; numerically equal to the atomic or formula mass"},
{t:"molecular formula",d:"a formula that indicates the actual types and numbers of atoms in a molecule"},
{t:"empirical formula",d:"a formula that gives the simplest whole-number ratio of atoms in a compound"},
{t:"percent composition",d:"describes the mass composition of a compound by showing what percentage of its total mass comes from each element"},
{t:"stoichiometry",d:"the mathematical relationship between the quantities of substances involved in a chemical reaction"},
{t:"mole ratio",d:"the ratio between the moles of one substance and the moles of another substance in a balanced equation; used as a conversion factor"},
{t:"limiting reactant",d:"the reactant that is completely consumed in a chemical reaction and thus limits the amount of product that can be produced"},
{t:"excess reactant",d:"a reactant that remains after a limiting reactant is consumed"},
{t:"theoretical yield",d:"the maximum amount of product that could be produced from a given amount of reactant"},
{t:"actual yield",d:"the measured amount of product at the end of a reaction"},
{t:"percent yield",d:"the percentage of the theoretical yield that is actually produced; (actual/theoretical) × 100%"}
];

// ========== REACTION DATABASE ==========
const RXNS=[
{eq:"4Fe(s) + 3O₂(g) → 2Fe₂O₃(s)",given:"Fe",product:"Fe₂O₃",gCoef:4,pCoef:2,gMM:55.85,pMM:159.70,gName:"iron",pName:"iron(III) oxide"},
{eq:"2H₂(g) + O₂(g) → 2H₂O(l)",given:"H₂",product:"H₂O",gCoef:2,pCoef:2,gMM:2.02,pMM:18.02,gName:"hydrogen",pName:"water"},
{eq:"N₂(g) + 3H₂(g) → 2NH₃(g)",given:"N₂",product:"NH₃",gCoef:1,pCoef:2,gMM:28.02,pMM:17.03,gName:"nitrogen",pName:"ammonia"},
{eq:"2NaCl(l) → 2Na(l) + Cl₂(g)",given:"NaCl",product:"Cl₂",gCoef:2,pCoef:1,gMM:58.44,pMM:70.90,gName:"sodium chloride",pName:"chlorine gas"},
{eq:"2Al(s) + 3Cl₂(g) → 2AlCl₃(s)",given:"Al",product:"AlCl₃",gCoef:2,pCoef:2,gMM:26.98,pMM:133.33,gName:"aluminum",pName:"aluminum chloride"},
{eq:"CaCO₃(s) → CaO(s) + CO₂(g)",given:"CaCO₃",product:"CaO",gCoef:1,pCoef:1,gMM:100.09,pMM:56.08,gName:"calcium carbonate",pName:"calcium oxide"},
{eq:"Al(OH)₃(s) + 3HCl(aq) → AlCl₃(aq) + 3H₂O(l)",given:"Al(OH)₃",product:"AlCl₃",gCoef:1,pCoef:1,gMM:78.00,pMM:133.33,gName:"aluminum hydroxide",pName:"aluminum chloride"},
{eq:"2KClO₃(s) → 2KCl(s) + 3O₂(g)",given:"KClO₃",product:"O₂",gCoef:2,pCoef:3,gMM:122.55,pMM:32.00,gName:"potassium chlorate",pName:"oxygen"}
];

// Compounds for molar mass / percent composition
const COMPS=[
{f:"H₂O",name:"water",elems:[{e:"H",n:2,m:1.008},{e:"O",n:1,m:16.00}]},
{f:"NaCl",name:"sodium chloride",elems:[{e:"Na",n:1,m:22.99},{e:"Cl",n:1,m:35.45}]},
{f:"Al₂(SO₄)₃",name:"aluminum sulfate",elems:[{e:"Al",n:2,m:26.98},{e:"S",n:3,m:32.06},{e:"O",n:12,m:16.00}]},
{f:"CO₂",name:"carbon dioxide",elems:[{e:"C",n:1,m:12.01},{e:"O",n:2,m:16.00}]},
{f:"C₆H₁₂O₆",name:"glucose",elems:[{e:"C",n:6,m:12.01},{e:"H",n:12,m:1.008},{e:"O",n:6,m:16.00}]},
{f:"Fe₂O₃",name:"iron(III) oxide",elems:[{e:"Fe",n:2,m:55.85},{e:"O",n:3,m:16.00}]},
{f:"AgNO₃",name:"silver nitrate",elems:[{e:"Ag",n:1,m:107.87},{e:"N",n:1,m:14.01},{e:"O",n:3,m:16.00}]},
{f:"Ca(OH)₂",name:"calcium hydroxide",elems:[{e:"Ca",n:1,m:40.08},{e:"O",n:2,m:16.00},{e:"H",n:2,m:1.008}]},
{f:"NH₃",name:"ammonia",elems:[{e:"N",n:1,m:14.01},{e:"H",n:3,m:1.008}]},
{f:"H₂SO₄",name:"sulfuric acid",elems:[{e:"H",n:2,m:1.008},{e:"S",n:1,m:32.06},{e:"O",n:4,m:16.00}]}
];
function compMM(c){return rd(c.elems.reduce((s,el)=>s+el.n*el.m,0),2)}

  st:[`<span class='lb'>MOLE RATIO</span> ${r.gCoef} mol ${r.given} : ${r.pCoef} mol ${r.product}`,`<span class='lb'>CONVERT</span> ${nGiven} × (${r.pCoef}/${r.gCoef})`,`<span class='lb'>ANSWER</span> <span class='ans'>${nProduct} mol ${r.product}</span>`],nt:`The mole ratio comes directly from the coefficients in the balanced equation. Multiply given moles by (product coef / given coef).`}

mass_to_mass(){

  return{ref:"Ex 11-13",q:`Given: <b>${r.eq}</b><br><br>What mass of <b>${r.product}</b> is produced from <b>${mGiven} g ${r.given}</b>?`,gv:`m(${r.given}) = ${mGiven} g\nM(${r.given}) = ${r.gMM}\nM(${r.product}) = ${r.pMM}`,fm:`g → mol → mol → g\n4-step conversion`,fi:`m(${r.product}) = ? g`,u:"g",a:mProduct,tol:Math.max(mProduct*0.025,0.3),

},
mass_to_mol_stoich(){

  return{ref:"Ex 11-12",q:`Given: <b>${r.eq}</b><br><br>How many <b>moles of ${r.product}</b> form from <b>${mGiven} g ${r.given}</b>?`,gv:`m(${r.given}) = ${mGiven} g\nM(${r.given}) = ${r.gMM}`,fm:`Step 1: n = m / M\nStep 2: mole ratio`,fi:`n(${r.product}) = ? mol`,u:"mol",a:nProduct,tol:Math.max(nProduct*0.02,0.005),
  st:[`<span class='lb'>STEP 1</span> n(${r.given}) = ${mGiven} / ${r.gMM} = ${rd(nGiven,4)} mol`,`<span class='lb'>STEP 2</span> ${rd(nGiven,4)} × (${r.pCoef}/${r.gCoef}) = <span class='ans'>${nProduct} mol</span>`],nt:`Convert grams to moles first (n = m/M), then use the mole ratio from the balanced equation.`}
},
limiting(){
  const r=pick(RXNS.filter(x=>x.gCoef>1||x.pCoef>1));
  // Use the given and a second reactant (pick from equation)
  const mA=R(20,150,1),mB=R(20,150,1);
  // For simplicity, use given reactant and pick a "second" reactant from the equation
  // We'll make a simulated limiting reactant scenario
  const nA=rd(mA/r.gMM,4);
  const nProdFromA=rd(nA*(r.pCoef/r.gCoef),4);
  // Simulate second reactant with different amount
  const isALimiting=Math.random()<0.5;
  const prodFromA=rd(nProdFromA*r.pMM,1);
  const prodFromB=isALimiting?rd(prodFromA*R(1.2,2.0,1),1):rd(prodFromA*R(0.3,0.8,1),1);
  const limiting=isALimiting?r.given:"the other reactant";
  const theoYield=isALimiting?prodFromA:prodFromB;
  return{ref:"Ex 11-15",q:`In the reaction <b>${r.eq}</b>, two reactants produce ${r.product}. If starting from <b>${mA} g ${r.given}</b>:<br><br>The theoretical yield of ${r.product} from ${r.given} alone would be <b>${prodFromA} g</b>.<br>The theoretical yield from the other reactant alone would be <b>${prodFromB} g</b>.<br><br>What is the <b>theoretical yield</b> of ${r.product} (the smaller value)?`,gv:`From ${r.given}: ${prodFromA} g\nFrom other: ${prodFromB} g`,fm:`Theoretical yield = the SMALLER amount\n(limited by whichever produces less)`,fi:`Theoretical yield = ? g`,u:"g",a:theoYield,tol:Math.max(theoYield*0.02,0.3),
  st:[`<span class='lb'>COMPARE</span> ${prodFromA} g vs ${prodFromB} g`,`<span class='lb'>LIMITING</span> ${theoYield < prodFromA+0.01 ? r.given : "the other reactant"} produces less → it is the limiting reactant`,`<span class='lb'>THEORETICAL YIELD</span> <span class='ans'>${theoYield} g</span>`],nt:`The limiting reactant is whichever produces the LEAST product. The theoretical yield equals the amount produced by the limiting reactant.`}
},
pct_yield(){
  const r=pick(RXNS),mGiven=R(10,100,1);
  const nGiven=rd(mGiven/r.gMM,4),nProd=rd(nGiven*(r.pCoef/r.gCoef),4),theo=rd(nProd*r.pMM,1);
  const pctY=R(60,98,1),actual=rd((pctY/100)*theo,1);
  return{ref:"Ex 11-17",q:`In the reaction <b>${r.eq}</b>, starting with <b>${mGiven} g ${r.given}</b>, the theoretical yield of ${r.product} is <b>${theo} g</b>. If the actual yield is <b>${actual} g</b>, what is the <b>percent yield</b>?`,gv:`Theoretical: ${theo} g\nActual: ${actual} g`,fm:`% yield = (actual / theoretical) × 100%`,fi:`% yield = ?`,u:"%",a:pctY,tol:Math.max(pctY*0.02,0.3),
  st:[`<span class='lb'>FORMULA</span> % yield = (actual / theoretical) × 100`,`<span class='lb'>SOLVE</span> (${actual} / ${theo}) × 100`,`<span class='lb'>ANSWER</span> <span class='ans'>${pctY}%</span>`],nt:`Percent yield tells you how efficient the reaction was. 100% means you got everything theory predicted. Real reactions are always < 100%.`}
},
theo_yield(){
  const r=pick(RXNS),mGiven=R(15,200,1);
  const nGiven=rd(mGiven/r.gMM,4),nProd=rd(nGiven*(r.pCoef/r.gCoef),4),theo=rd(nProd*r.pMM,1);
  return{ref:"Ex 11-17a",q:`Given: <b>${r.eq}</b><br><br>If <b>${mGiven} g ${r.given}</b> reacts with excess of the other reactant, what is the <b>theoretical yield</b> of ${r.product}?`,gv:`m(${r.given}) = ${mGiven} g\nM(${r.given}) = ${r.gMM}\nM(${r.product}) = ${r.pMM}`,fm:`g → mol → mol → g\n(mass-to-mass stoichiometry)`,fi:`Theoretical yield = ? g`,u:"g",a:theo,tol:Math.max(theo*0.025,0.3),
  st:[`<span class='lb'>STEP 1</span> n(${r.given}) = ${mGiven}/${r.gMM} = ${rd(nGiven,4)} mol`,`<span class='lb'>STEP 2</span> n(${r.product}) = ${rd(nGiven,4)} × (${r.pCoef}/${r.gCoef}) = ${rd(nProd,4)} mol`,`<span class='lb'>STEP 3</span> m = ${rd(nProd,4)} × ${r.pMM} = <span class='ans'>${theo} g</span>`],nt:`Theoretical yield is the maximum amount of product possible, calculated via stoichiometry assuming 100% efficiency.`}
}
};

{type:"teach",title:"The Roadmap You Must Memorize",body:"Here is the single most important concept in this chapter:<br><br><b style='color:var(--cyn);font-size:16px'>grams A → moles A → moles B → grams B</b><br><br><b>Step 1:</b> Convert grams of A to moles of A using <em>n = m / M</em><br><b>Step 2:</b> Convert moles of A to moles of B using the <em>mole ratio</em><br><b>Step 3:</b> Convert moles of B to grams of B using <em>m = n × M</em><br><br>You <b>MUST</b> go through moles. You can never skip directly from grams of one substance to grams of another."},
{type:"equation",title:"The 3-Step Conversion",eq:"grams A &nbsp;→&nbsp; mol A &nbsp;→&nbsp; mol B &nbsp;→&nbsp; grams B<br><br>Step 1: n(A) = m(A) / M(A)<br>Step 2: n(B) = n(A) × (coef B / coef A)<br>Step 3: m(B) = n(B) × M(B)",note:"Step 2 is the <b>mole ratio</b> — the only way to cross from one substance to another."},
{type:"teach",title:"Worked Example — Mass to Mass",body:"<b>How many grams of Fe₂O₃ form from 100.0 g Fe?</b><br>Equation: 4Fe + 3O₂ → 2Fe₂O₃<br><br><b>Step 1:</b> n(Fe) = 100.0 / 55.85 = 1.790 mol<br><br><b>Step 2:</b> Mole ratio: 4 Fe → 2 Fe₂O₃<br>n(Fe₂O₃) = 1.790 × (2/4) = 0.8951 mol<br><br><b>Step 3:</b> m(Fe₂O₃) = 0.8951 × 159.70 = 143.0 g<br><br>Notice: the mole ratio (2/4 = 0.5) tells us we get half as many moles of product as we had moles of iron."},
{type:"checkpoint",q:"In 2H₂ + O₂ → 2H₂O, the mole ratio of H₂ to H₂O is:",opts:[{t:"2:2 (or 1:1)",ok:true},{t:"2:1",ok:false},{t:"1:2",ok:false},{t:"3:2",ok:false}],hint:"Look at the coefficients: 2 H₂ produces 2 H₂O. What's the ratio?",expl:"2 mol H₂ : 2 mol H₂O = 1:1. Every mole of H₂ produces one mole of H₂O."},
{type:"teach",title:"Why You Can't Skip Moles",body:"Students often ask: <em>\"Why can't I just convert grams directly?\"</em><br><br>Because the balanced equation tells you about <b>particles</b> (molecules, atoms), not about mass. 4 atoms of Fe don't weigh the same as 3 molecules of O₂.<br><br>Moles translate between the <em>counting world</em> (where the equation lives) and the <em>weighing world</em> (where your scale lives). The mole ratio only works in moles — never in grams."},
{type:"checkpoint",q:"To find grams of product from grams of reactant, the correct path is:",opts:[{t:"g A → mol A → mol B → g B",ok:true},{t:"g A → g B directly using coefficients",ok:false},{t:"g A → mol A → g B",ok:false},{t:"mol A → mol B only",ok:false}],hint:"You need THREE conversions: two molar mass conversions (grams↔moles) and one mole ratio.",expl:"Correct! The full roadmap: grams A → moles A (using M of A) → moles B (using mole ratio) → grams B (using M of B). All three steps are required."},
{type:"teach",title:"Mole-to-Mole is the Easy Version",body:"Sometimes problems skip the mass steps and just give you moles directly:<br><br><em>\"25.0 mol P₂O₅ reacts with water. How many mol H₂O needed?\"</em><br>P₂O₅ + 3H₂O → 2H₃PO₄<br><br>Since you already have moles, only Step 2 applies:<br>n(H₂O) = 25.0 × (3/1) = <b>75.0 mol</b><br><br>The mole ratio is 1:3 (1 P₂O₅ needs 3 H₂O)."},
{type:"teach",title:"Stoichiometry Mastered!",body:"✓ Balanced equations give mole ratios<br>✓ The roadmap: g → mol → mol → g<br>✓ Step 1: n = m/M (grams to moles)<br>✓ Step 2: mole ratio (cross between substances)<br>✓ Step 3: m = n×M (moles to grams)<br>✓ NEVER skip moles — they're the bridge<br><br>Quiz time!"}
],quiz:[
{q:"In 4Fe + 3O₂ → 2Fe₂O₃, how many mol Fe₂O₃ from 8 mol Fe?",opts:[{t:"4 mol",ok:true},{t:"8 mol",ok:false},{t:"2 mol",ok:false},{t:"6 mol",ok:false}],expl:"8 × (2/4) = 4 mol Fe₂O₃"},
{q:"The mole ratio comes from:",opts:[{t:"Molar masses of the substances",ok:false},{t:"Coefficients in the balanced equation",ok:true},{t:"The periodic table",ok:false},{t:"Avogadro's number",ok:false}]},
{q:"To go from grams of A to grams of B, you need:",opts:[{t:"3 conversion steps (through moles)",ok:true},{t:"1 direct conversion",ok:false},{t:"Only molar mass of A",ok:false},{t:"Only the mole ratio",ok:false}]},
{q:"27.0 g Al (M=26.98) → mol Al?",opts:[{t:"1.00 mol",ok:true},{t:"0.50 mol",ok:false},{t:"26.98 mol",ok:false},{t:"2.00 mol",ok:false}],expl:"n = 27.0/26.98 = 1.00 mol"},
{q:"In stoichiometry, 'moles' serve as:",opts:[{t:"The bridge between different substances",ok:true},{t:"A unit of energy",ok:false},{t:"The mass of one atom",ok:false},{t:"A temperature scale",ok:false}]}
]},
limits:{title:"Limiting Reactants & Percent Yield",icon:"🎯",
cards:[
{type:"teach",title:"When Reactants Don't Match Up",body:"In real life, you rarely have the exact amounts of each reactant needed. One reactant runs out first — that's the <b>limiting reactant</b>. The other one has some left over — that's the <b>excess reactant</b>.<br><br>Think of making sandwiches: if you have 10 slices of bread and 20 slices of cheese, the bread limits you to 5 sandwiches. The bread is the limiting reactant; cheese is in excess."},
{type:"definition",term:"limiting reactant",def:"the reactant that is completely consumed in a chemical reaction and thus limits the amount of product that can be produced",extra:"To find it: calculate how much product each reactant could produce separately. The one that gives LESS product is limiting."},
{type:"teach",title:"How to Find the Limiting Reactant",body:"<b>Method:</b><br>1. Convert each reactant's mass to moles<br>2. Use the mole ratio to find how many moles of product each could make<br>3. <b>Whichever produces LESS product is the limiting reactant</b><br>4. The theoretical yield = the smaller amount<br><br>The excess reactant? Some of it is left unreacted."},
{type:"checkpoint",q:"If Reactant A could produce 50 g of product, and Reactant B could produce 80 g, which is limiting?",opts:[{t:"Reactant A (produces less)",ok:true},{t:"Reactant B (produces more)",ok:false},{t:"Both equally",ok:false},{t:"Neither",ok:false}],hint:"The limiting reactant is the one that runs out first — it produces LESS product.",expl:"Correct! A produces less (50 g), so it runs out first. A is limiting. Theoretical yield = 50 g."},
{type:"definition",term:"percent yield",def:"the percentage of the theoretical yield that is actually produced; (actual/theoretical) × 100%",extra:"Always ≤ 100%. Real reactions lose product to side reactions, transfer losses, and incomplete reactions."},
{type:"equation",title:"Percent Yield Formula",eq:"% yield = (actual yield / theoretical yield) × 100%",note:"<b>Theoretical yield</b>: calculated from stoichiometry (the maximum possible)<br><b>Actual yield</b>: what you actually measured in the lab"},
{type:"checkpoint",q:"Theoretical yield = 25.6 g, actual yield = 23.0 g. Percent yield?",opts:[{t:"89.8%",ok:true},{t:"111.3%",ok:false},{t:"23.0%",ok:false},{t:"2.6%",ok:false}],hint:"% yield = (actual/theoretical) × 100 = (23.0/25.6) × 100 = ?",expl:"(23.0/25.6) × 100 = 89.8%. The reaction was about 90% efficient."},
{type:"teach",title:"Real-World Stoichiometry Complete!",body:"✓ Limiting reactant produces the LEAST product<br>✓ Excess reactant has leftover after reaction<br>✓ Theoretical yield = max product from limiting reactant<br>✓ Actual yield = what you measured<br>✓ % yield = (actual/theoretical) × 100%<br>✓ Always ≤ 100%"}
],quiz:[
{q:"The limiting reactant is the one that:",opts:[{t:"Is completely consumed and produces the least product",ok:true},{t:"Is present in the largest amount",ok:false},{t:"Has the highest molar mass",ok:false},{t:"Remains after the reaction",ok:false}]},
{q:"% yield = 75% means:",opts:[{t:"75% of the theoretical maximum was obtained",ok:true},{t:"25% of reactant was used",ok:false},{t:"The reaction failed",ok:false},{t:"75 grams were produced",ok:false}]},
{q:"If actual yield exceeds theoretical yield, what happened?",opts:[{t:"This shouldn't happen — there's likely an error",ok:true},{t:"The reaction was very efficient",ok:false},{t:"The catalyst worked well",ok:false},{t:"More product formed spontaneously",ok:false}]},
{q:"Theoretical yield is calculated using:",opts:[{t:"Stoichiometry from the balanced equation",ok:true},{t:"Measurement in the lab",ok:false},{t:"Percent composition",ok:false},{t:"Avogadro's number",ok:false}]},
{q:"The excess reactant:",opts:[{t:"Has some left over after the reaction stops",ok:true},{t:"Is completely used up",ok:false},{t:"Determines the theoretical yield",ok:false},{t:"Always has a higher molar mass",ok:false}]}
]}
};

let mode="problems",active="mole",subType=null,prob=null,answered=false,solShown=false,userVal="";
let nC=0,nA=0,streak=0;
let hide={given:false,formula:false,find:false};
let vMode="mc",vQ=null,vAns=false,vUA=null;
let lTopic=null,lIdx=0,lCPA=false,lCPU=null,lCPH=false;
let qzMode=false,qzIdx=0,qzA=false,qzU=null,qzS=0;

function updS(){document.getElementById("sC").textContent=nC;document.getElementById("sA").textContent=nA;document.getElementById("sP").textContent=nA>0?rd(nC/nA*100,0)+"%":"—";document.getElementById("sS").innerHTML='<span id="fire">🔥</span> '+streak}
function resetStats(){nC=0;nA=0;streak=0;updS();if(mode==="problems")genP();else if(mode==="vocab")genV();else if(mode==="learn"){lTopic=null;renderL()}else renderCS()}
function syncToggles(){["given","formula","find"].forEach(function(k){var b=document.getElementById("tg-"+k);if(!b)return;if(hide[k])b.classList.add("on");else b.classList.remove("on")});var a=document.getElementById("tg-all");if(a){if(hide.given&&hide.formula&&hide.find)a.classList.add("on");else a.classList.remove("on")}}
function tglH(k){hide[k]=!hide[k];syncToggles();renderProb()}
function tglAll(){var a=hide.given&&hide.formula&&hide.find;hide.given=hide.formula=hide.find=!a;syncToggles();renderProb()}
function renderModes(){document.getElementById("modeBar").innerHTML=[{id:"problems",l:"⚡ Problems"},{id:"learn",l:"🎓 Learn"},{id:"vocab",l:"📖 Vocab"},{id:"cheatsheet",l:"📋 Cheatsheet"}].map(m=>`<button class="mode-btn${mode===m.id?" on":""}" onclick="switchMode('${m.id}')">${m.l}</button>`).join("")}
function switchMode(m){mode=m;renderModes();renderCtrls();if(m==="problems")genP();else if(m==="vocab")genV();else if(m==="learn"){lTopic=null;renderL()}else renderCS()}
function renderCtrls(){const el=document.getElementById("ctrlBar");if(mode==="problems"){let h=SEC.map(s=>`<button class="cb${active===s.id?" on":""}" onclick="active='${s.id}';subType=null;genP()">${s.icon} ${s.title}</button>`).join("");h+=`<span style="width:6px;display:inline-block"></span><span class="cl">Hide:</span><button class="tg" id="tg-given" onclick="tglH('given')"><span class="tg-dot"></span>Givens</button><button class="tg" id="tg-formula" onclick="tglH('formula')"><span class="tg-dot"></span>Formulas</button><button class="tg" id="tg-find" onclick="tglH('find')"><span class="tg-dot"></span>Solve-For</button><button class="tg" id="tg-all" onclick="tglAll()"><span class="tg-dot"></span>Exam</button>`;el.innerHTML=h;syncToggles()}else if(mode==="vocab")el.innerHTML=`<span class="cl">Format:</span><button class="cb${vMode==="mc"?" on":""}" onclick="vMode='mc';genV()">MC</button><button class="cb${vMode==="written"?" on":""}" onclick="vMode='written';genV()">Written</button><button class="cb${vMode==="tf"?" on":""}" onclick="vMode='tf';genV()">T/F</button>`;else if(mode==="learn")el.innerHTML=`<span class="cl">Guided lessons — heavy on stoichiometry teaching</span>`;else el.innerHTML=`<span class="cl">Mole, stoichiometry roadmap, limiting reactants, percent yield</span>`}

// ========== PROBLEMS ==========
function genP(){const sec=SEC.find(s=>s.id===active),tid=subType||pick(sec.types).id;prob=G[tid]();answered=false;solShown=false;userVal="";renderCtrls();renderProb()}
function chkP(){if(answered)return;const inp=document.getElementById("inp");if(!inp)return;const raw=inp.value.trim();if(!raw)return;const v=parseFloat(raw.replace(/,/g,""));if(isNaN(v)){inp.classList.add("v-no");setTimeout(()=>{const e=document.getElementById("inp");if(e)e.classList.remove("v-no")},400);return}userVal=raw;answered=true;nA++;if(Math.abs(v-prob.a)<=prob.tol){nC++;streak++}else streak=0;updS();renderProb()}
function showPS(){userVal=document.getElementById("inp")?document.getElementById("inp").value:"";solShown=true;if(!answered){answered=true;nA++;streak=0;updS()}renderProb()}
function renderProb(){const el=document.getElementById("main"),p=prob;if(!p){el.innerHTML="";return}let isOk=false;if(answered){const v=parseFloat(String(userVal).replace(/,/g,""));isOk=!isNaN(v)&&Math.abs(v-p.a)<=p.tol}const cc=answered?(isOk?"ok":"no"):"",bc=answered?(isOk?"bg-ok":"bg-no"):"bg-q",sec=SEC.find(s=>s.id===active);const hc=(hide.given?1:0)+(hide.formula?1:0)+(hide.find?1:0),dl=hc===3?"EXAM MODE":hc>=2?"HARD+":hc===1?"HARD":"";let h=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px"><button class="cb${!subType?" on":""}" onclick="subType=null;genP()">Random</button>`;sec.types.forEach(t=>{h+=`<button class="cb${subType===t.id?" on":""}" onclick="subType='${t.id}';genP()">${t.name}</button>`});h+=`</div>`;h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${bc}">${answered?(isOk?"✓ Correct":"✗ Incorrect"):"Problem"}</span><span class="bg bg-ty">${p.ref}</span>${dl?`<span class="bg bg-hard">${dl}</span>`:""}</div><div class="q-txt">${p.q}</div>`;const gH=hide.given&&!answered&&!solShown,fH=hide.formula&&!answered&&!solShown,wH=hide.find&&!answered&&!solShown;if(p.gv&&(!gH||!fH||!wH)){h+=`<div class="ir">`;if(!gH)h+=`<div class="ib ib-g"><span class="ib-l">Given</span>${p.gv.replace(/\n/g,"<br>")}</div>`;if(p.fm&&!fH)h+=`<div class="ib ib-f"><span class="ib-l">Formula</span>${p.fm.replace(/\n/g,"<br>")}</div>`;if(p.fi&&!wH)h+=`<div class="ib ib-w"><span class="ib-l">Solve For</span>${p.fi.replace(/\n/g,"<br>")}</div>`;h+=`</div>`}if(!answered)h+=`<div class="aa"><div class="aw"><input class="ai" id="inp" type="text" inputmode="decimal" placeholder="Type answer…" value="${userVal}" onkeydown="if(event.key==='Enter')chkP()"><span class="au">${p.u}</span></div><button class="ab" onclick="chkP()">Check</button></div><div class="btn-row"><button class="btn-sh" onclick="showPS()">Show Solution</button></div>`;else{h+=`<div class="aa"><div class="aw"><input class="ai ${isOk?"v-ok":"v-no"}" value="${userVal}" disabled><span class="au">${p.u}</span></div></div><div class="fb ${isOk?"fb-ok":"fb-no"}">${isOk?`✓ Correct! Streak: ${streak} 🔥`:"✗ Not quite"}</div>`;if(!isOk)h+=`<div class="fb-v">Answer: ${p.a} ${p.u}</div>`}if(answered||solShown){h+=`<div class="sol"><div class="sol-tag">Solution</div>`;p.st.forEach(s=>{h+=`<div class="stp">${s}</div>`});h+=`<div class="sol-note">${p.nt}</div></div>`}if(answered)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genP()">Next →</button></div>`;h+=`</div>`;el.innerHTML=h;if(!answered){const i=document.getElementById("inp");if(i)setTimeout(()=>i.focus(),50)}}

// ========== VOCAB ==========
function genV(){vAns=false;vUA=null;if(vMode==="mc")genVMC();else if(vMode==="tf")genVTF();else genVW();renderCtrls();renderVocab()}
function genVMC(){const c=pick(VOCAB),wr=shuffle(VOCAB.filter(v=>v.t!==c.t)).slice(0,3),askT=Math.random()<0.5,opts=shuffle([c,...wr]);vQ={type:"mc",c,opts,askT,ci:opts.indexOf(c)}}
function genVTF(){const c=pick(VOCAB),isT=Math.random()<0.5;vQ={type:"tf",t:c.t,sd:isT?c.d:pick(VOCAB.filter(v=>v.t!==c.t)).d,isT,cd:c.d}}
function genVW(){vQ={type:"written",c:pick(VOCAB),askT:Math.random()<0.5}}
function chkVM(i){if(vAns)return;vAns=true;vUA=i;nA++;if(i===vQ.ci){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVT(a){if(vAns)return;vAns=true;vUA=a;nA++;if(a===vQ.isT){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVW(){if(vAns)return;const inp=document.getElementById("vi");if(!inp||!inp.value.trim())return;vAns=true;const u=inp.value.trim().toLowerCase(),tgt=vQ.askT?vQ.c.d.toLowerCase():vQ.c.t.toLowerCase(),tw=tgt.split(/\s+/).filter(w=>w.length>3),mc=tw.filter(w=>u.includes(w)).length;vUA=tw.length>0&&(mc/tw.length>=0.4);nA++;if(vUA){nC++;streak++}else streak=0;updS();renderVocab()}
function renderVocab(){const el=document.getElementById("main"),q=vQ;if(!q){el.innerHTML="";return}let h="";if(q.type==="mc"){const ok=vAns&&vUA===q.ci,cc=vAns?(ok?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div>`;if(q.askT)h+=`<div class="q-txt">Define: <b>${q.c.t}</b></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}return`<button class="${c}" onclick="chkVM(${i})"><span class="opt-ltr">${vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i)}</span><span>${o.d}</span></button>`}).join("")}</div>`;else h+=`<div class="q-txt">Which term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}return`<button class="${c}" onclick="chkVM(${i})"><span class="opt-ltr">${vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`}).join("")}</div>`;if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`}else if(q.type==="tf"){const ok=vAns&&vUA===q.isT,cc=vAns?(ok?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div><div class="q-txt"><b>${q.t}</b> — <span style="color:var(--cyn);font-style:italic">"${q.sd}"</span></div><div class="opts" style="flex-direction:row;gap:8px;margin-top:10px">`;["True","False"].forEach(l=>{const v=l==="True";let c="opt";if(vAns){c+=" done";if(v===q.isT)c+=" c-ok";else if(v===vUA)c+=" c-no"}h+=`<button class="${c}" style="flex:1;justify-content:center" onclick="chkVT(${v})">${l}</button>`});h+=`</div>`;if(vAns&&!ok)h+=`<div class="sol" style="margin-top:12px"><div class="sol-tag">Correct</div><div class="stp">${q.cd}</div></div>`;if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`}else{const cc=vAns?(vUA?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(vUA?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div>`;h+=q.askT?`<div class="q-txt">Define: <b>${q.c.t}</b></div>`:`<div class="q-txt">Which term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div>`;if(!vAns)h+=`<div style="margin-top:12px"><textarea class="v-ta" id="vi" placeholder="${q.askT?"Type definition…":"Type the term…"}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chkVW()}"></textarea></div><div class="btn-row"><button class="ab" onclick="chkVW()">Check</button></div>`;else{h+=`<div class="fb ${vUA?"fb-ok":"fb-no"}" style="margin-top:8px">${vUA?"✓ Matched!":"✗ Review below"}</div><div class="sol" style="margin-top:10px"><div class="sol-tag">Answer</div>`;h+=q.askT?`<div class="stp">${q.c.d}</div>`:`<div class="stp" style="font-size:14px;font-weight:600">${q.c.t}</div>`;h+=`</div><div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`}h+=`</div>`}el.innerHTML=h}

function chkQz(i){if(qzA)return;qzA=true;qzU=i;nA++;const q=LESSONS[lTopic].quiz[qzIdx];if(q.opts[i].ok){qzS++;nC++;streak++}else streak=0;updS();renderL()}
function nextQz(){qzIdx++;qzA=false;qzU=null;renderL()}
function renderL(){const el=document.getElementById("main");if(!lTopic){el.innerHTML=`<div style="text-align:center;padding:40px 24px"><div style="font-size:44px;margin-bottom:12px">🎓</div><div style="font:400 24px/1.3 var(--s);margin-bottom:8px">Welcome to Learning Mode</div><div style="font:400 14px/1.6 var(--f);color:var(--mut);margin-bottom:20px;max-width:400px;margin-left:auto;margin-right:auto">Pick a lesson. The stoichiometry lesson is the big one — take your time with it!</div><div class="topic-picker" style="grid-template-columns:1fr">${Object.entries(LESSONS).map(([k,l])=>`<button class="topic-btn" onclick="startL('${k}')"><span style="font-size:24px;display:block;margin-bottom:6px">${l.icon}</span><b>${l.title}</b><div class="topic-sub">${l.cards.length} cards + ${l.quiz.length}-Q quiz</div></button>`).join("")}</div></div>`;return}if(qzMode){const quiz=LESSONS[lTopic].quiz;if(qzIdx>=quiz.length){const pct=Math.round(qzS/quiz.length*100);el.innerHTML=`<div class="lesson-wrap"><div class="lesson-card" style="text-align:center"><div style="font:700 10px var(--m);letter-spacing:.15em;color:var(--acc);text-transform:uppercase">Complete</div><div class="quiz-score ${pct>=70?"qok":""}">${qzS}/${quiz.length}</div><div style="font:400 14px var(--f);color:var(--mut)">${pct}% · ${pct>=70?"Great! 🎉":"Keep studying 💪"}</div><div class="btn-row" style="justify-content:center;margin-top:20px"><button class="nav-btn" onclick="startL(lTopic)">🔁 Restart</button><button class="nav-btn primary" onclick="exitL()">← Topics</button></div></div></div>`;return}const q=quiz[qzIdx],prog=((qzIdx+(qzA?1:0))/quiz.length)*100;let h=`<div class="lesson-wrap"><div class="lesson-nav"><button class="nav-btn" onclick="exitL()">← Exit</button><div><div class="lesson-prog">Quiz · ${qzIdx+1}/${quiz.length}</div><div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div></div></div><div class="lesson-card"><div class="lesson-type">🎯 Quiz</div><div class="lesson-cp-q">${q.q}</div><div class="opts">`;q.opts.forEach((o,i)=>{let c="opt";if(qzA){c+=" done";if(o.ok)c+=" c-ok";else if(i===qzU)c+=" c-no"}h+=`<button class="${c}" onclick="chkQz(${i})"><span class="opt-ltr">${qzA&&o.ok?"✓":qzA&&i===qzU?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`});h+=`</div>`;if(qzA){h+=`<div class="fb ${q.opts[qzU].ok?"fb-ok":"fb-no"}" style="margin-top:10px">${q.opts[qzU].ok?"✓ Correct!":"✗ See above"}</div>`;if(q.expl)h+=`<div class="sol" style="margin-top:10px"><div class="sol-tag">Why</div><div class="stp">${q.expl}</div></div>`;h+=`<div class="btn-row" style="margin-top:12px;justify-content:flex-end"><button class="nav-btn primary" onclick="nextQz()">${qzIdx+1>=quiz.length?"Results →":"Next →"}</button></div>`}h+=`</div></div>`;el.innerHTML=h;return}const lesson=LESSONS[lTopic],card=lesson.cards[lIdx],prog=((lIdx+1)/lesson.cards.length)*100;let h=`<div class="lesson-wrap"><div class="lesson-nav"><button class="nav-btn" onclick="exitL()">← Exit</button><div style="text-align:center"><div class="lesson-prog">${lesson.icon} ${lesson.title}</div><div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div></div><div style="min-width:50px;text-align:right"><span class="lesson-prog">${lIdx+1}/${lesson.cards.length}</span></div></div><div class="lesson-card">`;if(card.type==="teach")h+=`<div class="lesson-type">📖 Lesson</div><div style="font:400 20px/1.3 var(--s);color:var(--txt);margin-bottom:14px">${card.title}</div><div class="lesson-body">${card.body}</div>`;else if(card.type==="definition")h+=`<div class="lesson-type">📚 Definition</div><div class="lesson-def"><div class="lesson-def-t">${card.term}</div><div class="lesson-def-b">${card.def}</div></div>${card.extra?`<div class="lesson-body">${card.extra}</div>`:""}`;else if(card.type==="equation")h+=`<div class="lesson-type">🔢 Key Equation</div><div style="font:400 18px/1.3 var(--s);color:var(--txt);margin-bottom:10px">${card.title}</div><div class="lesson-eq">${card.eq}</div>${card.note?`<div class="lesson-body">${card.note}</div>`:""}`;else if(card.type==="checkpoint"){h+=`<div class="lesson-checkpoint"><div class="lesson-cp-t">✓ Checkpoint</div><div class="lesson-cp-q">${card.q}</div><div class="opts">`;card.opts.forEach((o,i)=>{let c="opt";if(lCPA&&o.ok)c+=" done c-ok";else if(lCPU===i&&!o.ok&&lCPH)c+=" c-no";else if(lCPA)c+=" done";h+=`<button class="${c}" onclick="chkCP(${i})"><span class="opt-ltr">${lCPA&&o.ok?"✓":lCPU===i&&!o.ok&&lCPH?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`});h+=`</div>`;if(lCPH&&!lCPA)h+=`<div class="hint-box"><div style="font:700 9px var(--m);letter-spacing:.12em;color:var(--ylw);text-transform:uppercase;margin-bottom:4px">💡 Hint</div>${card.hint}</div><div class="btn-row"><button class="nav-btn" onclick="retryCP()">Try Again</button></div>`;if(lCPA)h+=`<div class="fb fb-ok" style="margin-top:12px">✓ Nice!</div>${card.expl?`<div class="sol" style="margin-top:8px"><div class="sol-tag">Why</div><div class="stp">${card.expl}</div></div>`:""}`;h+=`</div>`}h+=`<div class="btn-row" style="justify-content:space-between;margin-top:20px"><button class="nav-btn" onclick="prevC()" ${lIdx===0?"disabled":""}>← Prev</button>`;if(card.type==="checkpoint"&&!lCPA)h+=`<span style="font:400 11px var(--f);color:var(--dim)">Answer to continue</span>`;else h+=`<button class="nav-btn primary" onclick="nextC()">${lIdx+1>=lesson.cards.length?"Start Quiz →":"Continue →"}</button>`;h+=`</div></div></div>`;el.innerHTML=h}

// ========== CHEATSHEET ==========
function renderCS(){renderCtrls();let h=`<div class="cs-sec">⚖️ Stoichiometry, Mole, & Yield — All Formulas</div>`;CS.forEach(c=>{h+=`<div class="cs-card"><div class="cs-title">${c.title}</div><div class="cs-fm">${c.fm.join("<br>")}</div><div class="cs-lb">Key Points</div><div class="cs-vr">${c.vr.replace(/\n/g,"<br>")}</div><div class="cs-lb">Example</div><div class="cs-ex"><div style="font:400 12px/1.5 var(--f);color:var(--mut);margin-bottom:4px">${c.ex.q}</div>${c.ex.st.map(s=>`<div class="stp">${s}</div>`).join("")}</div></div>`});h+=`<div class="cs-sec">📖 All ${VOCAB.length} Vocabulary Terms</div>`;VOCAB.forEach((v,i)=>{h+=`<div class="cs-card" style="padding:10px 12px;margin-bottom:5px"><span style="font:700 10px var(--m);color:var(--acc);margin-right:6px">${i+1}.</span><b>${v.t}</b><span style="margin:0 6px;color:var(--dim)">—</span><span style="color:var(--mut);font-size:12px">${v.d}</span></div>`});document.getElementById("main").innerHTML=h}

renderModes();renderCtrls();genP();genV();updS();
</script>
</body>
</html>
