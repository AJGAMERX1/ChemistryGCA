<body>
<div class="hdr"><div class="hdr-in">
<div><div class="hdr-lab">Chapter 12 · Complete Study Tool</div><h1 class="hdr-t"><i>Gases</i> — Practice & Review</h1></div>
<div class="hdr-r"><div class="stats">
<div class="stat-box"><div class="stat-n" id="sC">0</div><div class="stat-l">Correct</div></div>
<div class="stat-box"><div class="stat-n" id="sA">0</div><div class="stat-l">Attempted</div></div>
<div class="stat-box"><div class="stat-n pct-n" id="sP">—</div><div class="stat-l">Accuracy</div></div>
<div class="stat-box"><div class="stat-n streak-n" id="sS"><span id="fire">🔥</span> 0</div><div class="stat-l">Streak</div></div>
</div><button class="btn-r" onclick="resetStats()">Reset</button></div>
</div></div>
<div id="modeBar" class="modes"></div>

<div class="cnt" id="main"></div>
<script>
function R(a,b,d){d=d||0;const f=Math.pow(10,d);return Math.round((Math.random()*(b-a)+a)*f)/f}
function rd(v,d){return Math.round(v*Math.pow(10,d))/Math.pow(10,d)}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

// ========== VOCAB (18 terms from PDF Chapter Review) ==========
const VOCAB=[
{t:"diffusion",d:"the process by which fluid matter and energy spread from a region of higher concentration to a region of lower concentration"},
{t:"effusion",d:"the process by which particles pass through a tiny opening into an evacuated chamber"},
{t:"Graham's law of effusion",d:"the rate of effusion for a gas is inversely proportional to the square root of its molar mass"},
{t:"fluid",d:"a substance (gas or liquid) that has the ability to flow and take the shape of its container"},
{t:"compressibility",d:"the ability of a substance to be squeezed into a smaller volume by applying pressure"},
{t:"expansibility",d:"the ability of a substance to spontaneously fill its available space"},
{t:"pressure",d:"the average force exerted per unit of area when particles collide against a boundary; measured in Pa (1 Pa = 1 N/m²)"},
{t:"standard temperature and pressure (STP)",d:"a temperature of 0 °C (273.15 K) and a pressure of 101.325 kPa; used for comparison of research"},
{t:"Boyle's law",d:"the volume of a gas is inversely related to its pressure if the temperature is held constant; P₁V₁ = P₂V₂"},
{t:"Charles's law",d:"the temperature (in kelvins) and volume of a gas are directly proportional when pressure is constant; V₁/T₁ = V₂/T₂"},
{t:"Gay-Lussac's law",d:"pressure is directly proportional to temperature (in kelvins) for a gas at a constant volume; P₁/T₁ = P₂/T₂"},
{t:"combined gas law",d:"relates the pressure, volume, and kelvin temperature of a gas when all three can change; P₁V₁/T₁ = P₂V₂/T₂"},
{t:"Dalton's law of partial pressures",d:"the total pressure of a mixture of gases equals the sum of the pressures of each individual gas (the partial pressures)"},
{t:"law of combining volumes",d:"under equivalent conditions, the volumes of reacting gases and their gaseous products can be expressed in ratios of small whole numbers"},
{t:"Avogadro's law",d:"the volume of a gas at a constant temperature and pressure is directly proportional to the number of moles of the gas"},
{t:"standard molar volume",d:"a mole of any gas at STP occupies a volume of 22.4 L"},
{t:"ideal gas",d:"a gas whose behavior is perfectly predicted by the kinetic-molecular theory"},
{t:"ideal gas law",d:"the law that relates the pressure, temperature, volume, and number of moles of any gas sample; PV = nRT"}
];

const Rgas=8.314; // L·kPa/(mol·K)

// ========== SECTIONS ==========
const SEC=[
{id:"boyle",title:"Boyle's Law",icon:"🫧",types:[{id:"boyle_v2",name:"Find V₂"},{id:"boyle_p2",name:"Find P₂"}]},
{id:"charles",title:"Charles's Law",icon:"🌡️",types:[{id:"charles_v2",name:"Find V₂"},{id:"charles_t2",name:"Find T₂"}]},
{id:"gaylussac",title:"Gay-Lussac's Law",icon:"🔥",types:[{id:"gl_p2",name:"Find P₂"},{id:"gl_t2",name:"Find T₂"}]},
{id:"combined",title:"Combined Gas Law",icon:"🔄",types:[{id:"comb_v2",name:"Find V₂"},{id:"comb_p2",name:"Find P₂"},{id:"comb_t2",name:"Find T₂"}]},
{id:"dalton",title:"Dalton's Law",icon:"🧪",types:[{id:"dalton_total",name:"Find P_total"},{id:"dalton_partial",name:"Find partial P"}]},
{id:"ideal",title:"Ideal Gas Law",icon:"💨",types:[{id:"ideal_n",name:"Find n"},{id:"ideal_v",name:"Find V"},{id:"ideal_p",name:"Find P"},{id:"ideal_t",name:"Find T"},{id:"ideal_mm",name:"Find molar mass"},{id:"ideal_density",name:"Gas density at STP"}]}
];

// ========== GENERATORS ==========
const G={
// --- BOYLE'S LAW: P₁V₁ = P₂V₂ (constant T) ---
boyle_v2(){
  const p1=R(80,200,1),v1=R(100,900,0),p2=R(80,300,1);
  const v2=rd((p1*v1)/p2,1);
  return{ref:"Ex 12-2",q:`A gas occupies <b>${v1} mL</b> at <b>${p1} kPa</b>. What volume will it occupy at <b>${p2} kPa</b> if temperature stays constant?`,gv:`P₁ = ${p1} kPa\nV₁ = ${v1} mL\nP₂ = ${p2} kPa`,fm:`P₁V₁ = P₂V₂\nV₂ = P₁V₁ / P₂`,fi:`V₂ = ? mL`,u:"mL",a:v2,tol:Math.max(v2*0.02,0.5),
  st:[`<span class='lb'>FORMULA</span> V₂ = P₁V₁ / P₂`,`<span class='lb'>SOLVE</span> V₂ = (${p1} × ${v1}) / ${p2}`,`<span class='lb'>CALC</span> V₂ = ${rd(p1*v1,0)} / ${p2}`,`<span class='lb'>ANSWER</span> <span class='ans'>V₂ = ${v2} mL</span>`],nt:`Boyle's law: P and V are inversely proportional at constant T. P₁V₁ = P₂V₂.`}
},
boyle_p2(){
  const p1=R(80,200,1),v1=R(100,800,0),v2=R(50,600,0);

function chkVT(a){if(vAns)return;vAns=true;vUA=a;nA++;if(a===vQ.isT){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVW(){if(vAns)return;const inp=document.getElementById("vi");if(!inp||!inp.value.trim())return;vAns=true;const u=inp.value.trim().toLowerCase(),tgt=vQ.askT?vQ.c.d.toLowerCase():vQ.c.t.toLowerCase(),tw=tgt.split(/\s+/).filter(w=>w.length>3),mc=tw.filter(w=>u.includes(w)).length;vUA=tw.length>0&&(mc/tw.length>=0.4);nA++;if(vUA){nC++;streak++}else streak=0;updS();renderVocab()}
function renderVocab(){const el=document.getElementById("main"),q=vQ;if(!q){el.innerHTML="";return}let h="";if(q.type==="mc"){const ok=vAns&&vUA===q.ci,cc=vAns?(ok?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div>`;if(q.askT)h+=`<div class="q-txt">Define: <b>${q.c.t}</b></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}return`<button class="${c}" onclick="chkVM(${i})"><span class="opt-ltr">${vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i)}</span><span>${o.d}</span></button>`}).join("")}</div>`;else h+=`<div class="q-txt">Which term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}return`<button class="${c}" onclick="chkVM(${i})"><span class="opt-ltr">${vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`}).join("")}</div>`;if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`}else if(q.type==="tf"){const ok=vAns&&vUA===q.isT,cc=vAns?(ok?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div><div class="q-txt"><b>${q.t}</b> — <span style="color:var(--cyn);font-style:italic">"${q.sd}"</span></div><div class="opts" style="flex-direction:row;gap:8px;margin-top:10px">`;["True","False"].forEach(l=>{const v=l==="True";let c="opt";if(vAns){c+=" done";if(v===q.isT)c+=" c-ok";else if(v===vUA)c+=" c-no"}h+=`<button class="${c}" style="flex:1;justify-content:center" onclick="chkVT(${v})">${l}</button>`});h+=`</div>`;if(vAns&&!ok)h+=`<div class="sol" style="margin-top:12px"><div class="sol-tag">Correct</div><div class="stp">${q.cd}</div></div>`;if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`}else{const cc=vAns?(vUA?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(vUA?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div>`;h+=q.askT?`<div class="q-txt">Define: <b>${q.c.t}</b></div>`:`<div class="q-txt">What term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div>`;if(!vAns)h+=`<div style="margin-top:12px"><textarea class="v-ta" id="vi" placeholder="${q.askT?"Type definition…":"Type the term…"}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chkVW()}"></textarea></div><div class="btn-row"><button class="ab" onclick="chkVW()">Check</button></div>`;else{h+=`<div class="fb ${vUA?"fb-ok":"fb-no"}" style="margin-top:8px">${vUA?"✓ Matched!":"✗ Review below"}</div><div class="sol" style="margin-top:10px"><div class="sol-tag">Answer</div>`;h+=q.askT?`<div class="stp">${q.c.d}</div>`:`<div class="stp" style="font-size:14px;font-weight:600">${q.c.t}</div>`;h+=`</div><div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`}h+=`</div>`}el.innerHTML=h}

// ========== LEARNING MODE ==========
function startL(t){lTopic=t;lIdx=0;lCPA=false;lCPU=null;lCPH=false;qzMode=false;qzIdx=0;qzS=0;qzA=false;qzU=null;renderL()}
function exitL(){lTopic=null;qzMode=false;renderL()}
function nextC(){lIdx++;lCPA=false;lCPU=null;lCPH=false;if(lIdx>=LESSONS[lTopic].cards.length){qzMode=true;qzIdx=0;qzS=0;qzA=false;qzU=null}renderL()}
function prevC(){if(lIdx>0){lIdx--;lCPA=false;lCPU=null;lCPH=false}renderL()}
function chkCP(i){const c=LESSONS[lTopic].cards[lIdx];if(lCPA)return;lCPU=i;if(c.opts[i].ok){lCPA=true;lCPH=false;nA++;nC++;streak++}else{lCPH=true;nA++;streak=0}updS();renderL()}
function retryCP(){lCPH=false;lCPU=null;renderL()}
function chkQz(i){if(qzA)return;qzA=true;qzU=i;nA++;const q=LESSONS[lTopic].quiz[qzIdx];if(q.opts[i].ok){qzS++;nC++;streak++}else streak=0;updS();renderL()}
function nextQz(){qzIdx++;qzA=false;qzU=null;renderL()}
function renderL(){const el=document.getElementById("main");if(!lTopic){el.innerHTML=`<div style="text-align:center;padding:40px 24px"><div style="font-size:44px;margin-bottom:12px">🎓</div><div style="font:400 24px/1.3 var(--s);margin-bottom:8px">Welcome to Learning Mode</div><div style="font:400 14px/1.6 var(--f);color:var(--mut);margin-bottom:20px;max-width:400px;margin-left:auto;margin-right:auto">Guided walkthrough with checkpoints and end-of-lesson quiz.</div><div class="topic-picker">${Object.entries(LESSONS).map(([k,l])=>`<button class="topic-btn" onclick="startL('${k}')"><span style="font-size:24px;display:block;margin-bottom:6px">${l.icon}</span><b>${l.title}</b><div class="topic-sub">${l.cards.length} cards + ${l.quiz.length}-Q quiz</div></button>`).join("")}</div></div>`;return}if(qzMode){const quiz=LESSONS[lTopic].quiz;if(qzIdx>=quiz.length){const pct=Math.round(qzS/quiz.length*100);el.innerHTML=`<div class="lesson-wrap"><div class="lesson-card" style="text-align:center"><div style="font:700 10px var(--m);letter-spacing:.15em;color:var(--acc);text-transform:uppercase">Complete</div><div class="quiz-score ${pct>=70?"qok":""}">${qzS}/${quiz.length}</div><div style="font:400 14px var(--f);color:var(--mut)">${pct}% · ${pct>=70?"Great! 🎉":"Keep studying 💪"}</div><div class="btn-row" style="justify-content:center;margin-top:20px"><button class="nav-btn" onclick="startL(lTopic)">🔁 Restart</button><button class="nav-btn primary" onclick="exitL()">← Topics</button></div></div></div>`;return}const q=quiz[qzIdx],prog=((qzIdx+(qzA?1:0))/quiz.length)*100;let h=`<div class="lesson-wrap"><div class="lesson-nav"><button class="nav-btn" onclick="exitL()">← Exit</button><div><div class="lesson-prog">Quiz · ${qzIdx+1}/${quiz.length}</div><div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div></div></div><div class="lesson-card"><div class="lesson-type">🎯 Quiz</div><div class="lesson-cp-q">${q.q}</div><div class="opts">`;q.opts.forEach((o,i)=>{let c="opt";if(qzA){c+=" done";if(o.ok)c+=" c-ok";else if(i===qzU)c+=" c-no"}h+=`<button class="${c}" onclick="chkQz(${i})"><span class="opt-ltr">${qzA&&o.ok?"✓":qzA&&i===qzU?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`});h+=`</div>`;if(qzA){h+=`<div class="fb ${q.opts[qzU].ok?"fb-ok":"fb-no"}" style="margin-top:10px">${q.opts[qzU].ok?"✓ Correct!":"✗ See above"}</div>`;if(q.expl)h+=`<div class="sol" style="margin-top:10px"><div class="sol-tag">Why</div><div class="stp">${q.expl}</div></div>`;h+=`<div class="btn-row" style="margin-top:12px;justify-content:flex-end"><button class="nav-btn primary" onclick="nextQz()">${qzIdx+1>=quiz.length?"Results →":"Next →"}</button></div>`}h+=`</div></div>`;el.innerHTML=h;return}const lesson=LESSONS[lTopic],card=lesson.cards[lIdx],prog=((lIdx+1)/lesson.cards.length)*100;let h=`<div class="lesson-wrap"><div class="lesson-nav"><button class="nav-btn" onclick="exitL()">← Exit</button><div style="text-align:center"><div class="lesson-prog">${lesson.icon} ${lesson.title}</div><div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div></div><div style="min-width:50px;text-align:right"><span class="lesson-prog">${lIdx+1}/${lesson.cards.length}</span></div></div><div class="lesson-card">`;if(card.type==="teach")h+=`<div class="lesson-type">📖 Lesson</div><div style="font:400 20px/1.3 var(--s);color:var(--txt);margin-bottom:14px">${card.title}</div><div class="lesson-body">${card.body}</div>`;else if(card.type==="definition")h+=`<div class="lesson-type">📚 Definition</div><div class="lesson-def"><div class="lesson-def-t">${card.term}</div><div class="lesson-def-b">${card.def}</div></div>${card.extra?`<div class="lesson-body">${card.extra}</div>`:""}`;else if(card.type==="equation")h+=`<div class="lesson-type">🔢 Key Equation</div><div style="font:400 18px/1.3 var(--s);color:var(--txt);margin-bottom:10px">${card.title}</div><div class="lesson-eq">${card.eq}</div>${card.note?`<div class="lesson-body">${card.note}</div>`:""}`;else if(card.type==="checkpoint"){h+=`<div class="lesson-checkpoint"><div class="lesson-cp-t">✓ Checkpoint</div><div class="lesson-cp-q">${card.q}</div><div class="opts">`;card.opts.forEach((o,i)=>{let c="opt";if(lCPA&&o.ok)c+=" done c-ok";else if(lCPU===i&&!o.ok&&lCPH)c+=" c-no";else if(lCPA)c+=" done";h+=`<button class="${c}" onclick="chkCP(${i})"><span class="opt-ltr">${lCPA&&o.ok?"✓":lCPU===i&&!o.ok&&lCPH?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`});h+=`</div>`;if(lCPH&&!lCPA)h+=`<div class="hint-box"><div style="font:700 9px var(--m);letter-spacing:.12em;color:var(--ylw);text-transform:uppercase;margin-bottom:4px">💡 Hint</div>${card.hint}</div><div class="btn-row"><button class="nav-btn" onclick="retryCP()">Try Again</button></div>`;if(lCPA)h+=`<div class="fb fb-ok" style="margin-top:12px">✓ Nice!</div>${card.expl?`<div class="sol" style="margin-top:8px"><div class="sol-tag">Why</div><div class="stp">${card.expl}</div></div>`:""}`;h+=`</div>`}h+=`<div class="btn-row" style="justify-content:space-between;margin-top:20px"><button class="nav-btn" onclick="prevC()" ${lIdx===0?"disabled":""}>← Prev</button>`;if(card.type==="checkpoint"&&!lCPA)h+=`<span style="font:400 11px var(--f);color:var(--dim)">Answer to continue</span>`;else h+=`<button class="nav-btn primary" onclick="nextC()">${lIdx+1>=lesson.cards.length?"Start Quiz →":"Continue →"}</button>`;h+=`</div></div></div>`;el.innerHTML=h}

// ========== CHEATSHEET ==========
function renderCS(){renderCtrls();let h=`<div class="cs-sec">💨 All Gas Law Formulas & Worked Examples</div>`;CS.forEach(c=>{h+=`<div class="cs-card"><div class="cs-title">${c.title}</div><div class="cs-fm">${c.fm.join("<br>")}</div><div class="cs-lb">Key Points</div><div class="cs-vr">${c.vr.replace(/\n/g,"<br>")}</div><div class="cs-lb">Example</div><div class="cs-ex"><div style="font:400 12px/1.5 var(--f);color:var(--mut);margin-bottom:4px">${c.ex.q}</div>${c.ex.st.map(s=>`<div class="stp">${s}</div>`).join("")}</div></div>`});h+=`<div class="cs-sec">📖 All ${VOCAB.length} Vocabulary Terms</div>`;VOCAB.forEach((v,i)=>{h+=`<div class="cs-card" style="padding:10px 12px;margin-bottom:5px"><span style="font:700 10px var(--m);color:var(--acc);margin-right:6px">${i+1}.</span><b>${v.t}</b><span style="margin:0 6px;color:var(--dim)">—</span><span style="color:var(--mut);font-size:12px">${v.d}</span></div>`});document.getElementById("main").innerHTML=h}

renderModes();renderCtrls();genP();genV();updS();
</script>
</body>
