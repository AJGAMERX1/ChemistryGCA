SYMBOLS.forEach(s=>{h+=`<div class="cs-card" style="padding:10px 14px;margin-bottom:5px;display:flex;align-items:center;gap:12px"><span style="font:700 18px var(--m);color:var(--cyn);min-width:40px;text-align:center">${s.sym}</span><span style="color:var(--mut);font-size:12px">${s.meaning}</span></div>`});
h+=`</div>`;document.getElementById("main").innerHTML=h}

// ========== CHEATSHEET ==========
function renderCS(){renderCtrls();let h=`<div class="cs-sec">ًں“گ All Formulas from the Review</div>`;CS.forEach(c=>{h+=`<div class="cs-card"><div class="cs-title">${c.title}</div><div class="cs-fm">${c.fm.join("<br>")}</div><div class="cs-vr">${c.vr.replace(/\n/g,"<br>")}</div><div class="cs-ex"><div style="font:400 12px/1.5 var(--f);color:var(--mut);margin-bottom:4px">${c.ex.q}</div>${c.ex.st.map(s=>`<div class="stp">${s}</div>`).join("")}</div></div>`});h+=`<div class="cs-sec">ًں“– All 26 Key Terms</div>`;VOCAB.forEach((v,i)=>{h+=`<div class="cs-card" style="padding:10px 12px;margin-bottom:5px"><span style="font:700 10px var(--m);color:var(--acc);margin-right:6px">${String.fromCharCode(65+i)}.</span><b>${v.t}</b><span style="margin:0 6px;color:var(--dim)">â€”</span><span style="color:var(--mut);font-size:12px">${v.d}</span></div>`});h+=`<div class="cs-sec">ًں”£ All 14 Symbols</div>`;SYMBOLS.forEach(s=>{h+=`<div class="cs-card" style="padding:10px 14px;margin-bottom:5px;display:flex;align-items:center;gap:12px"><span style="font:700 18px var(--m);color:var(--cyn);min-width:40px;text-align:center">${s.sym}</span><span style="color:var(--mut);font-size:12px">${s.meaning}</span></div>`});document.getElementById("main").innerHTML=h}

renderModes();renderCtrls();genP();genV();updS();
